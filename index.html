/* --- engine/GameState.js --- */
// Pure vanilla JS State Manager. No dependencies. Portable everywhere.

const INITIAL_STATS = {
  academics: 10,
  chinese: 10,
  wealth: 5000, // RMB
  sanity: 100, // Max 100
  digitalProficiency: 5,
  culture: 0, // Cultural Integration
};

const INITIAL_STATE = {
  currentNodeId: "start",
  turn: 1, // 1 turn = 1 week
  phase: "Application", // "Application", "Pre-Departure", "In-China"
  location: "Shanghai", // The city the player is currently in
  stats: { ...INITIAL_STATS },
  guanxi: {
    admin: 0,
    localStudents: 0,
    intlStudents: 0,
    professors: 0
  },
  inventory: [],
  flags: {}, // For story tracking, e.g. { "got_vpn": true }
  
  // New Engine Systems
  location: "Shanghai",
  relationships: {},

  // New Economy System
  jobs: {
    hasJob: false,
    jobId: null,
    weeklyIncome: 0,
    sanityCost: 0
  },
  transactions: [
    { week: 1, amount: 5000, desc: "Initial Funds", type: "income" }
  ],
  items: {
    ebike: false,
    headphones: false
  }
};

class EngineState {
  constructor() {
    this.state = JSON.parse(JSON.stringify(INITIAL_STATE));
    this.listeners = [];
  }

  // Subscribe to state changes (React will use this)
  subscribe(listener) {
    this.listeners.push(listener);
    return () => {
      this.listeners = this.listeners.filter(l => l !== listener);
    };
  }

  // Notify listeners
  notify() {
    for (const listener of this.listeners) {
      listener(this.state);
    }
  }

  // Get current state
  getState() {
    return this.state;
  }

  addMagnet(magnet) {
    if (!this.state.inventory) this.state.inventory = [];
    const exists = this.state.inventory.find(m => m.name === magnet.name);
    if (!exists) {
      this.state.inventory.push(magnet);
      this.notify();
    }
  }

  addTransaction(amount, desc) {
    this.state.transactions.push({
      week: this.state.turn,
      amount: amount,
      desc: desc,
      type: amount >= 0 ? "income" : "expense"
    });
    this.state.stats.wealth += amount;
    if (this.state.stats.wealth < 0) this.state.stats.wealth = 0;
  }

  setJob(jobId, income, sanityCost) {
    if (jobId === null) {
      this.state.jobs = { hasJob: false, jobId: null, weeklyIncome: 0, sanityCost: 0 };
    } else {
      this.state.jobs = { hasJob: true, jobId, weeklyIncome: income, sanityCost };
    }
    this.notify();
  }

  purchaseItem(itemId, cost) {
    if (this.state.stats.wealth >= cost && !this.state.items[itemId]) {
      this.addTransaction(-cost, `Purchased ${itemId}`);
      this.state.items[itemId] = true;
      this.notify();
      return true;
    }
    return false;
  }

  // Advance time by 1 week
  advanceTurn() {
    this.state.turn += 1;
    this.state.flags.has_worked_this_week = false;
    
    // Process weekly expenses
    this.addTransaction(-200, "Weekly Living Expenses");

    // Process job
    if (this.state.jobs.hasJob) {
      this.addTransaction(this.state.jobs.weeklyIncome, "Part-Time Job Income");
      this.state.stats.sanity -= this.state.jobs.sanityCost;
      if (!this.state.items.headphones) {
         // Slightly hurts academics to work without good studying equipment
         this.state.stats.academics = Math.max(0, this.state.stats.academics - 1);
      }
    }
    
    // Apply weekly decay
    let baseDrain = 2;
    if (this.state.items.ebike) baseDrain -= 1; // Ebike helps!
    this.state.stats.sanity -= baseDrain;
    
    if (this.state.stats.sanity < 0) this.state.stats.sanity = 0;
    
    // Auto-advance phase
    if (this.state.turn >= 8 && this.state.phase === "Application") {
      this.state.phase = "Pre-Departure";
    } else if (this.state.turn >= 16 && this.state.phase === "Pre-Departure") {
      this.state.phase = "In-China";
    }
    
    this.notify();
  }

  // Update multiple stats // DEPRECATED for wealth: try to use addTransaction, but keep for compatibility
  updateStats(statChanges) {
    for (const [key, value] of Object.entries(statChanges)) {
      if (this.state.stats[key] !== undefined) {
        if (key === 'wealth') {
            this.addTransaction(value, value > 0 ? "Misc Income" : "Misc Expense");
        } else {
            this.state.stats[key] += value;
        }
        // Hard bounds
        if (this.state.stats[key] < 0) this.state.stats[key] = 0;
        if (key === 'sanity' && this.state.stats[key] > 100) this.state.stats[key] = 100;
        if (key === 'academics' && this.state.stats[key] > 100) this.state.stats[key] = 100;
      }
    }
    this.notify();
  }

  // Update specific deep relationships (friendship and romance)
  updateRelationship(character, changes) {
    if (!this.state.relationships) this.state.relationships = {};
    if (!this.state.relationships[character]) {
        this.state.relationships[character] = { friendship: 0, romance: 0 };
    }
    for (const [key, value] of Object.entries(changes)) {
        this.state.relationships[character][key] += value;
        if (this.state.relationships[character][key] < 0) this.state.relationships[character][key] = 0;
        if (this.state.relationships[character][key] > 100) this.state.relationships[character][key] = 100;
    }
    this.notify();
  }

  // Update specific Guanxi faction
  updateGuanxi(faction, amount) {
    if (this.state.guanxi[faction] !== undefined) {
      this.state.guanxi[faction] += amount;
      this.notify();
    }
  }

  // Set a story flag
  setFlag(flagName, value = true) {
    this.state.flags[flagName] = value;
    this.notify();
  }

  setCurrentNode(nodeId) {
    this.state.currentNodeId = nodeId;
    this.notify();
  }

  setLocation(city) {
    this.state.location = city;
    this.notify();
  }

  // Reset Game
  reset() {
    this.state = JSON.parse(JSON.stringify(INITIAL_STATE));
    this.notify();
  }

  // Persistence
  save() {
    try {
      localStorage.setItem('sim_panda_save', JSON.stringify(this.state));
    } catch(e) { console.error("Save failed", e); }
  }

  load() {
    try {
      const data = localStorage.getItem('sim_panda_save');
      if (data) {
        const parsed = JSON.parse(data);
        this.state = { ...this.state, ...parsed }; // Merge to preserve structure
        
        // Handle migration for older saves without economy
        if (!this.state.location) this.state.location = "Shanghai";
        if (!this.state.jobs) this.state.jobs = { hasJob: false, jobId: null, weeklyIncome: 0, sanityCost: 0 };
        if (!this.state.transactions) this.state.transactions = [{ week: 1, amount: this.state.stats.wealth, desc: "Initial Funds", type: "income" }];
        if (!this.state.items) this.state.items = { ebike: false, headphones: false };
        if (!this.state.relationships) this.state.relationships = {};

        this.notify();
        return true;
      }
    } catch(e) { console.error("Load failed", e); }
    return false;
  }
}

// Export a singleton instance for simplicity, though React Context can inject it too.

/* --- engine/EventSystem.js --- */
// Evaluates conditions and triggers story nodes

class EventSystem {
  constructor(engine) {
    this.engine = engine; // Reference to GameState
    this.events = {}; // Map of all event configurations
  }

  // Load event dictionary into the generic pool
  loadEvents(newEvents) {
    this.events = { ...this.events, ...newEvents };
  }

  // Advance time by 1 week
  advanceTurn() {
    this.state.turn += 1;
    
    // Apply weekly decay
    this.state.stats.sanity -= 2;
    this.state.stats.wealth -= 200; // Weekly cost of living
    
    if (this.state.stats.sanity < 0) this.state.stats.sanity = 0;
    if (this.state.stats.wealth < 0) this.state.stats.wealth = 0;
    
    // Auto-advance phase
    if (this.state.turn > 8 && this.state.phase === "Application") {
      this.state.phase = "Pre-Departure";
    } else if (this.state.turn > 16 && this.state.phase === "Pre-Departure") {
      this.state.phase = "In-China";
    }
    
    this.notify();
  }

  // Check if a node's condition passing
  checkCondition(conditionObj) {
    if (!conditionObj) return true; // No condition = always pass
    const state = this.engine.getState();

    // Check location
    if (conditionObj.location) {
      if (state.location !== conditionObj.location) return false;
    }

    // Check stats (e.g., { stats: { academics: { min: 20 } } })
    if (conditionObj.stats) {
      for (const [stat, req] of Object.entries(conditionObj.stats)) {
        const val = state.stats[stat] || 0;
        if (req.min !== undefined && val < req.min) return false;
        if (req.max !== undefined && val > req.max) return false;
      }
    }
    
    // Check flags
    if (conditionObj.flags) {
      for (const [flag, value] of Object.entries(conditionObj.flags)) {
        if (!!state.flags[flag] !== value) return false;
      }
    }
    
    // Check guanxi
    if (conditionObj.guanxi) {
      for (const [faction, req] of Object.entries(conditionObj.guanxi)) {
        const val = state.guanxi[faction] || 0;
        if (req.min !== undefined && val < req.min) return false;
        if (req.max !== undefined && val > req.max) return false;
      }
    }

    // Check relationships
    if (conditionObj.relationships) {
      for (const [character, states] of Object.entries(conditionObj.relationships)) {
        for (const [key, req] of Object.entries(states)) {
          const val = (state.relationships && state.relationships[character]) ? state.relationships[character][key] || 0 : 0;
          if (req.min !== undefined && val < req.min) return false;
          if (req.max !== undefined && val > req.max) return false;
        }
      }
    }

    return true;
  }

  // Get available choices for a given node
  getAvailableChoices(nodeId) {
    const node = this.events[nodeId];
    if (!node || !node.choices) return [];
    
    return node.choices.filter(choice => this.checkCondition(choice.condition));
  }

  // Execute a choice's consequences
  executeChoice(choice) {
    // 1. Apply stat changes
    if (choice.effects && choice.effects.stats) {
      this.engine.updateStats(choice.effects.stats);
    }
    
    // 2. Apply guanxi changes
    if (choice.effects && choice.effects.guanxi) {
      for (const [faction, amount] of Object.entries(choice.effects.guanxi)) {
         this.engine.updateGuanxi(faction, amount);
      }
    }
    
    // 3. Set flags
    if (choice.effects && choice.effects.flags) {
       for (const [flag, value] of Object.entries(choice.effects.flags)) {
         this.engine.setFlag(flag, value);
       }
    }
    
    // 4. Update relationships
    if (choice.effects && choice.effects.relationships) {
       for (const [character, changes] of Object.entries(choice.effects.relationships)) {
         this.engine.updateRelationship(character, changes);
       }
    }
    
    // 5. Apply location changes
    if (choice.effects && choice.effects.location) {
       this.engine.setLocation(choice.effects.location);
    }
    
    // 6. Obtain Magnets
    if (choice.effects && choice.effects.magnet) {
       this.engine.addMagnet(choice.effects.magnet);
    }

    // Intercept: If returning to hub, roll for random events
    let nextNode = choice.next;
    if (nextNode === "hub") {
      const roll = Math.random();
      if (roll < 0.05) {
         nextNode = "random_sick";
      } else if (roll < 0.1) {
         nextNode = "random_exam";
      } else if (roll < 0.15) {
         nextNode = "random_subway";
      } else if (roll < 0.2) {
         nextNode = "random_lecture";
      } else if (roll < 0.25) {
         nextNode = "random_club_fair";
      } else if (roll < 0.3) {
         nextNode = "random_vpn_down";
      } else if (roll < 0.35) {
         nextNode = "random_dorm_inspection";
      }
    }

    // Return the next Node ID
    return nextNode;
  }
}

/* --- components/Dashboard.jsx --- */




// Custom lightweight Badge
function Badge({ children, className }) {
  return (
    <span className={`inline-flex items-center rounded-md border px-2.5 py-0.5 text-xs font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 ${className}`}>
      {children}
    </span>
  );
}

// Custom lightweight Progress
function Progress({ value, className, indicatorColor }) {
  return (
    <div className={`relative h-2 w-full overflow-hidden rounded-full ${className}`}>
      <div
        className={`h-full w-full flex-1 transition-all duration-500 ease-in-out ${indicatorColor}`}
        style={{ transform: `translateX(-${100 - (value || 0)}%)` }}
      />
    </div>
  );
}

function Dashboard({ state }) {
  const { stats, turn, phase, guanxi } = state;

  return (
    <div className="flex flex-col h-full z-10 space-y-6">
      <div>
        <h1 className="text-2xl font-black text-amber-500 uppercase tracking-wider mb-2">Sim Panda</h1>
        <p className="text-sm text-slate-400">Epoch 1: {phase}</p>
        <div className="mt-2 text-3xl text-white font-mono">Week {turn}</div>
      </div>

      <div className="space-y-4">
        <h2 className="text-xs uppercase tracking-widest text-slate-500 font-semibold">Primary Stats</h2>
        
        <StatBar label="📚 Academics" value={stats.academics} color="bg-blue-500" />
        <StatBar label="🗣️ Chinese" value={stats.chinese} color="bg-rose-500" />
        <StatBar label="🎭 Culture" value={stats.culture} color="bg-purple-500" />
        <StatBar label="📱 Digital Prof." value={stats.digitalProficiency} color="bg-emerald-500" />
        
        <div className="pt-2">
            <div className="flex justify-between mb-1 text-sm font-medium text-slate-200">
                <span>😌 Sanity</span>
                <span className={stats.sanity < 30 ? "text-red-400 font-bold" : ""}>{stats.sanity}/100</span>
            </div>
            <Progress value={stats.sanity} className={`h-2 ${stats.sanity < 30 ? "bg-red-950" : "bg-slate-700"}`} indicatorColor={stats.sanity < 30 ? "bg-red-500" : "bg-teal-400"} />
        </div>

        <div className="pt-4 border-t border-slate-700">
           <p className="text-sm font-bold text-slate-300">💰 Wealth: <span className="font-mono text-emerald-400">¥{stats.wealth}</span></p>
        </div>
      </div>

      <div className="space-y-2 pt-4 border-t border-slate-700">
        <h2 className="text-xs uppercase tracking-widest text-slate-500 font-semibold mb-3">Guanxi Network</h2>
        <div className="grid grid-cols-2 gap-2 text-xs">
          <Badge className="border-slate-600 bg-slate-800 text-slate-300 flex justify-between py-1 px-2">
            <span>Professors</span>
            <span className="font-mono font-bold text-amber-400">{guanxi.professors || 0}</span>
          </Badge>
          <Badge className="border-slate-600 bg-slate-800 text-slate-300 flex justify-between py-1 px-2">
            <span>Intl. Students</span>
            <span className="font-mono font-bold text-amber-400">{guanxi.intlStudents || 0}</span>
          </Badge>
          <Badge className="border-slate-600 bg-slate-800 text-slate-300 flex justify-between py-1 px-2">
            <span>Local Students</span>
            <span className="font-mono font-bold text-amber-400">{guanxi.localStudents || 0}</span>
          </Badge>
          <Badge className="border-slate-600 bg-slate-800 text-slate-300 flex justify-between py-1 px-2">
             <span>Univ. Admin</span>
             <span className="font-mono font-bold text-amber-400">{guanxi.admin || 0}</span>
          </Badge>
        </div>
      </div>

      {state.relationships && (
        <div className="space-y-2 pt-4 border-t border-slate-700">

          <div className="space-y-2 text-xs">
            {Object.entries(state.relationships).filter(([k,v]) => v.friendship > 0 || v.romance > 0).map(([character, rel]) => (
                <div key={character} className="bg-slate-800 border border-slate-600 rounded-md p-2 flex flex-col gap-1">
                    <div className="font-bold text-slate-200">{character}</div>
                    <div className="flex gap-4">
                        <span className="text-blue-300">🤝 Frnd: {rel.friendship}</span>
                        {rel.romance > 0 && <span className="text-pink-400">💖 Rom: {rel.romance}</span>}
                    </div>
                </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function StatBar({ label, value, color }) {
  return (
    <div>
      <div className="flex justify-between mb-1 text-xs font-semibold text-slate-300">
        <span>{label}</span>
        <span className="font-mono">{value}</span>
      </div>
      <div className="w-full bg-slate-700 rounded-full h-1.5 overflow-hidden">
        <div className={`${color} h-full rounded-full transition-all duration-500 ease-out`} style={{ width: `${Math.min(100, Math.max(0, value))}%` }}></div>
      </div>
    </div>
  );
}

function TimelineNode({ title, desc, active, completed, children }) {
    let dotColor = "bg-slate-700 border-slate-900";
    let textColor = "text-slate-500";
    if (completed) {
        dotColor = "bg-emerald-500 border-slate-900";
        textColor = "text-slate-300";
    } else if (active) {
        dotColor = "bg-sky-400 border-sky-900 shadow-[0_0_15px_rgba(56,189,248,0.5)]";
        textColor = "text-white";
    }

    return (
        <div className="pl-16 relative">
            <div className={`absolute left-[1.125rem] top-1.5 w-5 h-5 rounded-full border-[5px] z-10 transition-all ${dotColor}`}></div>
            <div className={`text-lg font-bold ${active ? 'text-sky-400' : (completed ? 'text-emerald-400' : 'text-slate-500')} mb-1`}>
                {title}
            </div>
            <p className={`${textColor} text-sm mb-3`}>{desc}</p>
            <div className="bg-slate-800/80 p-4 rounded-xl flex flex-col gap-2 border border-slate-700/50 shadow-inner">
                {children}
            </div>
        </div>
    );
}

function DecisionFlag({ label, value }) {
    if (!value) {
        return (
            <div className="flex justify-between items-center text-xs opacity-50">
                <span className="text-slate-500">{label}:</span>
                <span className="text-slate-600 font-mono italic">Pending...</span>
            </div>
        );
    }
    return (
        <div className="flex justify-between items-center text-sm bg-slate-900/50 p-2 rounded-lg border border-slate-700/50">
            <span className="text-slate-400">{label}:</span>
            <span className="text-sky-300 font-medium">{value}</span>
        </div>
    );
}

function ArcadeGameButton({ id, title, emoji, flags, onReplay }) {
    const isUnlocked = flags[`unlocked_minigame_${id}`];
    
    if (!isUnlocked) {
        return (
            <div className="bg-slate-800/30 border border-slate-700/50 p-4 rounded-2xl flex items-center justify-between opacity-50 grayscale">
                <div className="flex items-center gap-4">
                    <div className="w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center text-2xl">{emoji}</div>
                    <div className="font-bold text-slate-500">???</div>
                </div>
                <div className="text-slate-600 text-xl">🔒</div>
            </div>
        );
    }
    
    return (
        <button 
            onClick={() => onReplay(id)}
            className="bg-slate-800 hover:bg-slate-700 border border-slate-600 hover:border-purple-500 p-4 rounded-2xl flex items-center justify-between transition-all hover:scale-105 group text-left"
        >
            <div className="flex items-center gap-4">
                <div className="w-12 h-12 bg-purple-900/50 group-hover:bg-purple-600 rounded-xl flex items-center justify-center text-2xl transition-colors">{emoji}</div>
                <div className="font-bold text-slate-200 group-hover:text-white transition-colors">{title}</div>
            </div>
            <div className="text-purple-400 opacity-0 group-hover:opacity-100 transition-opacity font-bold">PLAY ▶</div>
        </button>
    );
}

function JobCard({ id, title, emoji, income, sanityCost, desc, onSelect, disabled }) {
    return (
        <div className={`border p-5 rounded-2xl transition-all flex flex-col md:flex-row md:items-center justify-between gap-4 bg-slate-800/50 border-slate-700/50 hover:border-slate-500`}>
            <div className="flex items-start gap-4 flex-1">
                <div className="text-4xl bg-slate-900/50 w-14 h-14 rounded-xl flex items-center justify-center shrink-0 border border-slate-700/50">{emoji}</div>
                <div>
                    <h3 className="font-bold text-lg text-slate-200">{title}</h3>
                    <p className="text-sm text-slate-400 mt-1">{desc}</p>
                    <div className="flex gap-3 mt-3">
                        <span className="text-xs font-mono bg-emerald-900/40 text-emerald-400 px-2 py-1 rounded">+{income} RMB</span>
                        <span className="text-xs font-mono bg-rose-900/40 text-rose-400 px-2 py-1 rounded">-{sanityCost} Sanity</span>
                    </div>
                </div>
            </div>
            <button 
                onClick={disabled ? null : onSelect}
                disabled={disabled}
                className={`w-full md:w-auto px-6 py-2.5 rounded-xl font-bold transition-all shrink-0 ${
                    disabled 
                        ? 'bg-slate-700 text-slate-500 cursor-not-allowed' 
                        : 'bg-amber-600 text-white hover:bg-amber-500 hover:-translate-y-0.5'
                }`}
            >
                {disabled ? 'Already Worked' : 'Start Gig'}
            </button>
        </div>
    );
}

function ItemCard({ id, title, emoji, cost, desc, isOwned, wealth, onBuy }) {
    const canAfford = wealth >= cost;
    
    return (
        <div className={`p-5 rounded-2xl border flex flex-col justify-between h-full transition-all ${isOwned ? 'bg-slate-800/80 border-orange-500/50 opacity-80' : 'bg-slate-800/50 border-slate-700/50 hover:border-slate-500'}`}>
            <div>
                <div className="flex justify-between items-start mb-3">
                    <div className="text-4xl bg-slate-900/50 w-14 h-14 rounded-xl flex items-center justify-center border border-slate-700/50">{emoji}</div>
                    <div className="font-mono font-bold text-orange-400">¥{cost}</div>
                </div>
                <h3 className="font-bold text-slate-200 leading-tight mb-2">{title}</h3>
                <p className="text-sm text-slate-400 mb-4">{desc}</p>
            </div>
            
            <button 
                onClick={onBuy}
                disabled={isOwned || (!canAfford && !isOwned)}
                className={`w-full py-2.5 rounded-xl font-bold transition-all ${isOwned ? 'bg-slate-700 text-slate-400 cursor-not-allowed' : (!canAfford ? 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed' : 'bg-orange-600 text-white hover:bg-orange-500')}`}
            >

function StoryPanel({ node, state, availableChoices, onChoice }) {
  const [showChoices, setShowChoices] = useState(false);
  const [textKey, setTextKey] = useState(0);
  const [displayText, setDisplayText] = useState("");

  useEffect(() => {
    // Reset animations when node changes
    setShowChoices(false);
    setTextKey(prev => prev + 1);
    setDisplayText("");
    
    if (!node) return;
    
    // Typewriter effect
    let currentText = "";
    
    // Setup specific character epilogues to append if we die or finish the game
    const isEndingNode = node.choices && node.choices.some(c => c.action === "reset_game");
    let epilogues = "";
    
    if (isEndingNode && state && state.relationships) {
       let addedLines = false;
       for (const [char, rel] of Object.entries(state.relationships)) {
           let charEpilogue = "";
           const flags = state.flags || {};
           
           if (char === "Xiao Chen" && flags.xiao_chen_startup) {
               charEpilogue = `The AI startup you brainstormed with Xiao Chen received Series B funding. Xiao Chen is now the CEO of a major tech unicorn, and you still hold equity as a founding partner.`;
           } else if (char === "Sophie" && flags.sophie_dated) {
               if (rel.romance >= 50) {
                   charEpilogue = `Your whirlwind romance with Sophie survived the distance. You eventually moved in together in Paris and remain deeply in love.`;
               } else {
                   charEpilogue = `You and Sophie shared an intense, memorable romance. You ultimately went your separate ways, but you always smile when you see her aesthetic posts from Europe.`;
               }
           } else if (char === "Uncle Wang" && flags.uncle_wang_drank) {
               charEpilogue = `Uncle Wang successfully expanded his BBQ cart into a full-fledged restaurant chain. He still keeps a bottle of cheap Baijiu behind the counter specifically for when you visit.`;
           } else if (char === "Dr. Mei" && flags.dr_mei_paper) {
               charEpilogue = `You were listed as a co-author on Dr. Mei's breakthrough biomedical paper. The publication single-handedly secured your acceptance into a prestigious postgraduate program at Peking University.`;
           } else if (char === "Manager Zhang" && flags.manager_zhang_job) {
               charEpilogue = `Manager Zhang was deeply impressed by your composure and understanding of both markets. He offered you a highly lucrative Management Trainee position before you even graduated.`;
           } else {
               // Default fallbacks
               if (rel.romance >= 50) {
                   charEpilogue = `Your deep romance with ${char} blossomed into a beautiful long-term partnership. The two of you remain together to this day.`;
               } else if (rel.romance >= 20) {
                   charEpilogue = `You and ${char} shared a passionate but brief connection, eventually parting ways as fond memories.`;
               } else if (rel.friendship >= 40) {
                   charEpilogue = `You and ${char} forged an unbreakable bond. You still talk regularly, navigating your drastically different lives together.`;
               } else if (rel.friendship >= 15) {
                   charEpilogue = `You remain casual acquaintances with ${char}, occasionally liking each other's WeChat moments.`;
               }
           }
           
           if (charEpilogue) {
               epilogues += `\n\n` + charEpilogue;
               addedLines = true;
           }
       }
       if (addedLines) {
           epilogues = "\n\n--- EPILOGUES ---" + epilogues;
       }
    }

    const fullText = (node.text || "") + epilogues;
    let i = 0;
    
    const interval = setInterval(() => {
      currentText += fullText.charAt(i);
      setDisplayText(currentText);
      i++;
      if (i >= fullText.length) {
        clearInterval(interval);
        setShowChoices(true);
      }
    }, 20); // 20ms per character
    
    return () => clearInterval(interval);
  }, [node]);

  useEffect(() => {
    const handleKeyDown = (e) => {
        if (!showChoices) {
           // Skip typewriter if user presses space or enter
           if (e.key === " " || e.key === "Enter") {
             setDisplayText(node?.text || "");
             setShowChoices(true);
           }
           return;
        }
        
        // Number keys for choices
        const num = parseInt(e.key);
        if (!isNaN(num) && num > 0 && availableChoices && num <= availableChoices.length) {
            onChoice(availableChoices[num - 1]);
        }
    };
    window.addEventListener("keydown", handleKeyDown);
    return () => window.removeEventListener("keydown", handleKeyDown);
  }, [showChoices, availableChoices, node, onChoice]);

  if (!node) return null;

  const speakerImages = {
    "Professor Lin": "images/simulator/characters/professor_lin.png",
    "Professor": "images/simulator/characters/professor_lin.png",
    "Professor's Table": "images/simulator/characters/professor_lin.png",
    "Language Partner": "images/simulator/characters/language_partner.png",
    "Neighbor Li": "images/simulator/characters/language_partner.png",
    "Local Friends": "images/simulator/characters/local_friend.png",
    "Meituan Delivery": "images/simulator/characters/delivery_driver.png",
    "Taxi Driver": "images/simulator/characters/delivery_driver.png",
    "Xiao Chen": "images/simulator/characters/xiao_chen.png",
    "Sophie": "images/simulator/characters/sophie.png",
    "Uncle Wang": "images/simulator/characters/uncle_wang.png",
    "Dr. Mei": "images/simulator/characters/dr_mei.png",
    "Manager Zhang": "images/simulator/characters/manager_zhang.png",
  };
  const speakerImg = node?.speaker ? speakerImages[node.speaker] : null;

  return (
    <div className="flex-1 flex flex-col justify-end p-8 pb-32 z-10 w-full max-w-4xl mx-auto relative pt-48">
       
      {/* Choice Menu */}
      <div className={`flex flex-col mb-8 gap-3 items-end transition-all duration-700 ${showChoices ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 pointer-events-none'}`}>
        {availableChoices && availableChoices.length > 0 && availableChoices.map((choice, i) => (
          <button
            key={i}
            onClick={() => onChoice(choice)}
            className="bg-slate-900/90 border border-slate-700/50 hover:bg-slate-800 hover:border-amber-500 hover:text-amber-400 text-slate-200 px-6 py-4 rounded-xl text-left w-3/4 shadow-xl backdrop-blur-md transition-all group flex flex-col relative"
          >
            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 font-mono text-sm opacity-50 group-hover:opacity-100 group-hover:text-amber-500 transition-all">[{i+1}]</div>
            <div className="font-semibold text-lg pl-6">{choice.text}</div>
            {choice.effects && <ChoicePreview effects={choice.effects} />}

        ))}
      </div>

      {/* Dialogue Box */}
      <div 
         key={textKey}
         className="bg-slate-900/95 border border-slate-700 backdrop-blur-xl p-8 rounded-2xl shadow-2xl relative animate-in fade-in slide-in-from-bottom-4 duration-500 w-full"
      >
        {speakerImg && (
            <div className="absolute bottom-full mb-[-2rem] left-8 h-[28rem] pointer-events-none drop-shadow-[0_15px_25px_rgba(0,0,0,0.8)] z-[-1] animate-in slide-in-from-bottom-12 fade-in duration-700 ease-out">
               <img src={speakerImg} alt={node.speaker} className="h-full w-auto object-contain object-bottom" />
            </div>
        )}
        <div className="absolute -top-4 left-6 flex gap-3">
          <div className="bg-amber-500 text-slate-900 font-bold px-4 py-1 rounded shadow-md uppercase tracking-wider text-sm">
            {node.speaker || "Narrator"}
          </div>
          {node.location && (

  );
}

   const previews = [];

   if (effects.guanxi) {

       });
   }
   if (effects.flags) {
       Object.entries(effects.flags).forEach(([k, v]) => {
          previews.push(<span key={`flag_${k}`} className={`text-blue-400 font-mono text-xs uppercase tracking-wider`}>Flag: {k}</span>);
       });
   }
   
   if (effects.relationships) {
        Object.entries(effects.relationships).forEach(([char, changes]) => {

               const color = v > 0 ? (type === 'romance' ? "text-pink-400" : "text-blue-400") : "text-red-400";

// 1. Bargain Market Game
function BargainMarketGame({ onComplete }) {
    const [bossOffer, setBossOffer] = useState(800);
    const [anger, setAnger] = useState(0);
    const [turn, setTurn] = useState(1);
    
    const handleCounter = () => {
        const newOffer = Math.floor(bossOffer * 0.75); // Reduce price by 25%
        const angerInc = Math.floor(Math.random() * 20) + 15; // Random anger 15-35
        setBossOffer(newOffer);
        setAnger(a => a + angerInc);
        setTurn(t => t + 1);
    };

    const handleCompliment = () => {
        setAnger(a => Math.max(0, a - 30));
        setBossOffer(Math.floor(bossOffer * 1.05)); // Boss feels confident, price goes up slightly
        setTurn(t => t + 1);
    };

    const handleWalkAway = () => {
        if (anger < 50 && turn > 2) {
            // Boss caves
            onComplete({ win: true, cost: Math.floor(bossOffer * 0.5), message: '"Wait! Come back! Special price for you."' });
        } else {
            onComplete({ win: false, cost: bossOffer, message: '"Leave then! I don\'t need your business!" Boss refuses to sell.' });
        }
    };

    const handleAccept = () => {
        onComplete({ win: true, cost: bossOffer, message: `You bought it for ¥${bossOffer}.`});
    }

    useEffect(() => {
        if (anger >= 100) {
            onComplete({ win: false, cost: bossOffer, message: '"Get out of my shop!" Boss kicked you out.' });
        }
    }, [anger]);

    return (
        <div className="text-center p-4">
            <h3 className="text-2xl font-bold text-amber-400 mb-2">Fake Market Haggling</h3>
            <p className="text-sm text-slate-400 mb-6">Convince the boss to lower the price, but don't make him too angry!</p>
            
            <div className="bg-slate-800 rounded-xl p-8 mb-6 border border-slate-700">
                <div className="text-6xl font-black text-emerald-400 mb-2">¥{bossOffer}</div>
                <div className="text-slate-500 font-mono text-sm">Boss's Current Offer</div>
            </div>

            <div className="mb-6">
                <div className="flex justify-between text-xs text-slate-400 font-bold mb-1">
                    <span>Boss Anger Meter</span>
                    <span className={anger > 80 ? "text-red-400" : ""}>{anger}%</span>
                </div>
                <div className="w-full bg-slate-800 rounded-full h-3">
                    <div className={`h-full rounded-full transition-all duration-300 ${anger > 80 ? 'bg-red-500' : 'bg-orange-500'}`} style={{width: `${Math.min(100, anger)}%`}}></div>
                </div>
            </div>

            <div className="grid grid-cols-2 gap-4">
                <button onClick={handleCounter} className="bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 rounded-lg border border-rose-400 transition-colors">
                   Counter-Offer (-25%)
                </button>
                <button onClick={handleCompliment} className="bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-lg border border-sky-400 transition-colors">
                   Compliment Boss (Reduce Anger)
                </button>
                <button onClick={handleWalkAway} className="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg transition-colors">
                   Fake Walk Away
                </button>
                <button onClick={handleAccept} className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg border border-emerald-400 transition-colors">
                   Accept Price
                </button>
            </div>
        </div>
    );
}

// 2. Subway Squeeze Game
function SubwaySqueezeGame({ onComplete }) {
    const [progress, setProgress] = useState(0);
    const [direction, setDirection] = useState(1);
    const [squeezes, setSqueezes] = useState(0);

    useEffect(() => {
        const interval = setInterval(() => {
            setProgress(prev => {
                let next = prev + (direction * 4);
                if (next > 100) { next = 100; setDirection(-1); }
                if (next < 0) { next = 0; setDirection(1); }
                return next;
            });
        }, 16);
        return () => clearInterval(interval);
    }, [direction]);

    const handleSqueeze = () => {
        // Target area is 40% to 60%
        if (progress >= 35 && progress <= 65) {
            setSqueezes(s => s + 1);
            if (squeezes + 1 >= 3) {
                onComplete({ win: true, message: "You made it onto the train!" });
            }
            // Increase speed/difficulty
            setProgress(0); 
        } else {
            onComplete({ win: false, message: "The doors closed on you!" });
        }
    };

    return (
        <div className="text-center p-4 h-64 flex flex-col justify-center items-center">
            <h3 className="text-2xl font-bold text-sky-400 mb-2">Rush Hour Squeeze</h3>
            <p className="text-sm text-slate-400 mb-8">Hit 'PUSH' when the marker is in the green zone! (3 times needed)</p>

            <div className="w-full max-w-md h-8 bg-slate-800 rounded-full relative mb-8 overflow-hidden border border-slate-600 shadow-inner">
                {/* Target Zone */}
                <div className="absolute top-0 bottom-0 left-[35%] w-[30%] bg-emerald-500/30 border-x-2 border-emerald-400"></div>
                {/* Marker */}
                <div className="absolute top-0 bottom-0 w-4 bg-white rounded-full shadow-[0_0_10px_white]" style={{ left: `calc(${progress}% - 8px)` }}></div>
            </div>

            <div className="flex justify-between items-center w-full max-w-md mb-4 text-slate-300 font-mono font-bold">
                <span>Attempt: {squeezes}/3</span>
            </div>

            <button onClick={handleSqueeze} className="w-48 h-16 bg-amber-500 hover:bg-amber-400 text-slate-900 text-2xl font-black rounded-2xl shadow-lg hover:scale-105 active:scale-95 transition-all">
                PUSH!
            </button>
        </div>
    );
}

// 3. Delivery Typer Game
function DeliveryTyperGame({ onComplete }) {
    const vocab = [
        { ch: "外卖 (Wàimài)", en: "Takeout" },
        { ch: "到了 (Dàole)", en: "Arrived" },
        { ch: "南门 (Nánmén)", en: "South Gate" },
        { ch: "放门口 (Fàng ménkǒu)", en: "Leave at door" },
        { ch: "快点 (Kuàidiǎn)", en: "Hurry up" },
        { ch: "没筷子 (Méi kuàizi)", en: "No chopsticks" }
    ];
    
    const [currentWord, setCurrentWord] = useState(vocab[0]);
    const [options, setOptions] = useState([]);
    const [score, setScore] = useState(0);
    const [timeLeft, setTimeLeft] = useState(15);

    useEffect(() => {
        nextWord();
        const timer = setInterval(() => {
            setTimeLeft(t => {
                if (t <= 1) {
                    clearInterval(timer);
                    onComplete({ win: false, message: "The delivery guy left with your food!" });
                    return 0;
                }
                return t - 1;
            });
        }, 1000);
        return () => clearInterval(timer);
    }, []);

    useEffect(() => {
        if (score >= 5) {
            onComplete({ win: true, message: "You successfully communicated your location!" });
        }
    }, [score]);

    const nextWord = () => {
        const word = vocab[Math.floor(Math.random() * vocab.length)];
        setCurrentWord(word);
        
        // Pick 3 random english words + the correct one
        let newOptions = [word.en];
        while (newOptions.length < 4) {
            const random = vocab[Math.floor(Math.random() * vocab.length)].en;
            if (!newOptions.includes(random)) newOptions.push(random);
        }
        setOptions(newOptions.sort(() => Math.random() - 0.5));
    };

    const handlePick = (en) => {
        if (en === currentWord.en) {
            setScore(s => s + 1);
            nextWord();
        } else {
            setTimeLeft(t => Math.max(0, t - 3)); // 3 second penalty
        }
    };

    return (
        <div className="text-center p-4 h-80 flex flex-col justify-center items-center relative">
            <div className="absolute top-4 right-4 text-xl font-mono text-amber-400">⏱️ {timeLeft}s</div>
            <div className="absolute top-4 left-4 text-xl font-mono text-emerald-400">✅ {score}/5</div>
            
            <h3 className="text-2xl font-bold text-blue-400 mb-8">Delivery Call Panic!</h3>
            
            <div className="text-5xl font-black text-rose-500 mb-10 bg-slate-800 px-6 py-4 rounded-xl shadow-inner border border-slate-700">
                {currentWord?.ch}
            </div>

            <div className="grid grid-cols-2 gap-4 w-full max-w-md">
                {options.map((opt, i) => (
                    <button key={i} onClick={() => handlePick(opt)} className="bg-slate-700 hover:bg-sky-600 text-white text-lg font-bold py-4 rounded-xl transition-colors">
                        {opt}
                    </button>
                ))}
            </div>
        </div>
    );
}

// 4. Tonal Rhythm Game
function TonalRhythmGame({ onComplete }) {
    const [notes, setNotes] = useState([]);
    const [score, setScore] = useState(0);
    const targetY = 250; // The hit line

    useEffect(() => {
        let spawnInterval = setInterval(() => {
            setNotes(prev => [...prev, { id: Date.now(), y: 0, tone: Math.floor(Math.random() * 4) + 1 }]);
        }, 1000);

        let moveInterval = setInterval(() => {
            setNotes(prev => {
                let activeNotes = prev.map(n => ({...n, y: n.y + 4}));
                // Check if missed
                if (activeNotes.some(n => n.y > targetY + 30)) {
                    // Missed one
                    setScore(s => s - 2);
                }
                return activeNotes.filter(n => n.y <= targetY + 30);
            });
        }, 30);

        return () => { clearInterval(spawnInterval); clearInterval(moveInterval); }
    }, []);

    useEffect(() => {
        if (score >= 10) onComplete({ win: true, message: "Perfect Pronunciation!" });
        if (score <= -6) onComplete({ win: false, message: "The teacher frowned in confusion." });
    }, [score]);

    const handleHit = (tone) => {
        setNotes(prev => {
            // Find note in target zone
            const hitIndex = prev.findIndex(n => Math.abs(n.y - targetY) < 30 && n.tone === tone);
            if (hitIndex !== -1) {
                setScore(s => s + 2);
                return prev.filter((_, i) => i !== hitIndex);
            } else {
                setScore(s => s - 1); // Wrong key or mistiming
                return prev;
            }
        });
    };

    return (
        <div className="p-4 h-96 relative flex flex-col pt-8">
            <div className="absolute top-4 right-4 text-xl font-mono text-emerald-400">Score: {score}/10</div>
            <h3 className="text-2xl font-bold text-indigo-400 text-center mb-4">Tone Matching</h3>
            
            <div className="flex-1 border bg-slate-900 border-slate-700 relative overflow-hidden rounded-t-xl mx-8 shadow-inner">
                {/* Hit Line */}

// 5. Visa Bureaucracy Game
function VisaBureaucracyGame({ onComplete }) {
    const docs = [
        "Passport", "JW202 Form", "Admission Letter", "Physical Exam", 
        "Movie Ticket", "Library Card", "Expired Visa", "Restaurant Receipt"
    ].sort(() => Math.random() - 0.5);

    const targetDocs = ["Passport", "JW202 Form", "Admission Letter"];
    const [selected, setSelected] = useState([]);
    const [timeLeft, setTimeLeft] = useState(15);

    useEffect(() => {
        const timer = setInterval(() => {
            setTimeLeft(t => {
                if (t <= 1) {
                    clearInterval(timer);
                    onComplete({ win: false, message: "The bureau closed for lunch. Come back tomorrow." });
                    return 0;
                }
                return t - 1;
            });
        }, 1000);
        return () => clearInterval(timer);
    }, []);

    const toggleDoc = (doc) => {
        if (selected.includes(doc)) setSelected(selected.filter(d => d !== doc));
        else setSelected([...selected, doc]);
    };

    const handleSubmit = () => {
        // Check if selected matches target exact
        const isCorrect = selected.length === targetDocs.length && targetDocs.every(d => selected.includes(d));
        if (isCorrect) {
            onComplete({ win: true, message: "Perfect documents! Visas approved." });
        } else {
            onComplete({ win: false, message: "Missing or incorrect documents. Application rejected." });
        }
    };

    return (
        <div className="p-4 h-80 flex flex-col justify-center items-center relative">
            <div className="absolute top-4 right-4 text-xl font-mono text-amber-400">⏱️ {timeLeft}s</div>
            <h3 className="text-2xl font-bold text-rose-400 mb-2">Bureaucracy Puzzle</h3>
            <p className="text-sm text-slate-400 mb-6">Select requested documents: Passport, JW202, Admission Letter</p>

            <div className="flex flex-wrap gap-3 justify-center mb-8 max-w-lg">
                {docs.map(doc => (
                    <button 
                       key={doc} 
                       onClick={() => toggleDoc(doc)}
                       className={`px-4 py-3 rounded-lg border-2 font-semibold transition-all ${selected.includes(doc) ? 'bg-sky-600 border-sky-400 text-white' : 'bg-slate-800 border-slate-600 text-slate-300 hover:bg-slate-700'}`}

                ))}

            <button onClick={handleSubmit} className="px-12 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl shadow-lg border border-emerald-400 text-xl transition-all hover:-translate-y-1">
                Submit to Window
            </button>
        </div>
    )
}

// 7. Banquet Balance Game
function BanquetBalanceGame({ onComplete }) {
    const [round, setRound] = useState(1);
    const [guanxi, setGuanxi] = useState(0);
    const [intox, setIntox] = useState(0);

    const playTurn = (g, i, msg) => {
        const newIntox = intox + i;
        const newGuanxi = guanxi + g;
        
        if (newIntox >= 100) {
            onComplete({ win: false, message: "You threw up under the table. Extreme loss of face." });
            return;
        }

        setIntox(newIntox);
        setGuanxi(newGuanxi);
        
        if (round >= 5) {
            if (newGuanxi >= 30) {
                onComplete({ win: true, message: "You survived the dinner and gained massive respect." });
            } else {
                onComplete({ win: false, message: "You survived, but were antisocial. Guanxi lost." });
            }
        } else {
            setRound(r => r + 1);
        }
    };

    return (
        <div className="p-4 h-96 flex flex-col items-center">
            <h3 className="text-2xl font-bold text-red-500 mb-2">The Banquet Toast</h3>
            <p className="text-sm text-slate-400 mb-6">Round {round}/5 - The boss is raising a glass of 53% Baijiu.</p>

            <div className="w-full max-w-sm space-y-4 mb-8">
                <div>
                    <div className="flex justify-between text-xs text-slate-400 font-bold mb-1">
                        <span>Intoxication</span>
                        <span className="text-purple-400">{intox}/100</span>
                    </div>
                    <div className="w-full bg-slate-800 rounded-full h-2">
                        <div className="bg-purple-500 h-full rounded-full transition-all" style={{width: `${Math.min(100, intox)}%`}}></div>
                    </div>
                </div>
                <div>
                    <div className="flex justify-between text-xs text-slate-400 font-bold mb-1">
                        <span>Guanxi Gained</span>
                        <span className="text-amber-400">{guanxi} (Goal: 30)</span>
                    </div>
                    <div className="w-full bg-slate-800 rounded-full h-2">
                        <div className="bg-amber-500 h-full rounded-full transition-all" style={{width: `${Math.min(100, (guanxi/30)*100)}%`}}></div>
                    </div>
                </div>
            </div>

            <div className="grid grid-cols-1 gap-3 w-full max-w-sm">
                <button onClick={() => playTurn(15, 25, "Ganbei")} className="bg-red-900 hover:bg-red-800 text-white font-bold py-3 rounded-xl border border-red-500 transition-colors">
                   🥂 "Ganbei!" (Drain the glass: +15 G, +25 Intox)
                </button>
                <button onClick={() => playTurn(5, 5, "Sip")} className="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl border border-slate-500 transition-colors">
                   🍷 Polite Sip (+5 G, +5 Intox)
                </button>
                <button onClick={() => playTurn(-5, -10, "Eat")} className="bg-emerald-900 hover:bg-emerald-800 text-white font-bold py-3 rounded-xl border border-emerald-500 transition-colors">
                   🥢 Eat Food (-5 G, -10 Intox)
                </button>
            </div>
        </div>
    )
}

// 9. Photo Shoot Game
function PhotoShootGame({ onComplete }) {
    const poses = [
        { id: 'smile', emoji: '😊', label: 'Smile' },
        { id: 'cool', emoji: '😎', label: 'Cool' },
        { id: 'fierce', emoji: '😠', label: 'Fierce' },
        { id: 'cute', emoji: '🥺', label: 'Cute' }
    ];
    
    const [targetPose, setTargetPose] = useState(poses[0]);
    const [score, setScore] = useState(0);
    const [timeLeft, setTimeLeft] = useState(15);

    useEffect(() => {
        nextPose();
        const timer = setInterval(() => {
            setTimeLeft(t => {
                if (t <= 1) {
                    clearInterval(timer);
                    onComplete({ win: false, message: "Too slow! The photographer left." });
                    return 0;
                }
                return t - 1;
            });
        }, 1000);
        return () => clearInterval(timer);
    }, []);

    useEffect(() => {
        if (score >= 6) {
            onComplete({ win: true, message: "Perfect shots! That's a wrap." });
        }
    }, [score]);

    const nextPose = () => {
        const pose = poses[Math.floor(Math.random() * poses.length)];
        setTargetPose(pose);
    };

    const handlePick = (id) => {
        if (id === targetPose.id) {
            setScore(s => s + 1);
            nextPose();
        } else {
            setTimeLeft(t => Math.max(0, t - 2)); // 2 second penalty
        }
    };

    return (
        <div className="text-center p-4 h-80 flex flex-col justify-center items-center relative">
            <div className="absolute top-4 right-4 text-xl font-mono text-amber-400">⏱️ {timeLeft}s</div>
            <div className="absolute top-4 left-4 text-xl font-mono text-emerald-400">📸 {score}/6</div>
            
            <h3 className="text-2xl font-bold text-pink-400 mb-8">Taobao Photo Shoot!</h3>
            
            <div className="text-4xl font-black text-rose-500 mb-10 bg-slate-800 px-8 py-6 rounded-3xl shadow-inner border border-slate-700 uppercase tracking-widest">
                {targetPose?.label}
            </div>

            <div className="flex gap-4 w-full max-w-sm justify-center">
                {poses.map((p, i) => (
                    <button key={i} onClick={() => handlePick(p.id)} className="bg-slate-700 hover:bg-pink-600 active:bg-pink-400 text-white text-5xl py-4 flex-1 rounded-xl transition-colors">
                        {p.emoji}
                    </button>
                ))}
            </div>
        </div>
    );
}

function SimulatorPage() {
  const [gameState, setGameState] = useState(gameEngine.getState());
  const [isMenuOpen, setIsMenuOpen] = useState(false);
  const [isTabletOpen, setIsTabletOpen] = useState(false);
  const [replayGameId, setReplayGameId] = useState(null);
  const [gigGameId, setGigGameId] = useState(null);
  // Combine all event nodes
  const allEvents = { ...epoch1Events, ...epoch2Events, ...epoch3Events, ...gameNodes };

  const [events] = useState(() => {
    const e = new EventSystem(gameEngine);
    e.loadEvents(allEvents);
    return e;
  });

  useEffect(() => {
    // Hide header/footer for immersive mode
    const nav = document.querySelector('nav');
    const footer = document.querySelector('footer');
    if (nav) nav.style.display = 'none';
    if (footer) footer.style.display = 'none';

    // Subscribe to engine
    const unsubscribe = gameEngine.subscribe((newState) => {
      setGameState({ ...newState });
    });

    return () => {
      if (nav) nav.style.display = '';
      if (footer) footer.style.display = '';
      unsubscribe();
    };
  }, [events]);

  const handleChoice = (choice) => {
    let nextNode = events.executeChoice(choice);
    
    if (choice.action === "reset_game") {
        gameEngine.reset();
    }
    
    // Explicit action trigger
    if (choice.action === "advance_turn") {
        gameEngine.advanceTurn();
    }
    
    // Enforce Game Over and Epoch transitions
    const state = gameEngine.getState();
    if (state.stats.sanity <= 0) nextNode = "game_over_sanity";
    else if (state.stats.wealth <= 0) nextNode = "game_over_wealth";
    else if (state.turn === 8 && choice.action === "advance_turn") nextNode = "pre_departure_start";
    else if (state.turn === 16 && choice.action === "advance_turn") nextNode = "in_china_start";
    else if (state.turn === 24 && choice.action === "advance_turn") nextNode = "epoch3_midterm";
    else if (state.turn === 28 && choice.action === "advance_turn") nextNode = "epoch3_internship";
    else if (state.turn === 32 && choice.action === "advance_turn") nextNode = "epoch3_final";
    
    // Slight delay for effect
    setTimeout(() => {
        gameEngine.setCurrentNode(nextNode);
    }, 150);
  };

  const handleGigComplete = (result) => {
    // Unlock for Arcade automatically
    gameEngine.setFlag(`unlocked_minigame_${gigGameId}`, true);
    
    // Mark as worked this week
    gameEngine.setFlag('has_worked_this_week', true);

    // Handle gig rewards
    if (gigGameId === 'tones') {
       if(result.win) {
           gameEngine.addTransaction(200, "Gig: English Tutor");
           gameEngine.updateStats({ sanity: -10, academics: -2 });
       } else {
           gameEngine.addTransaction(50, "Gig: English Tutor (Poor)");
           gameEngine.updateStats({ sanity: -15 });
       }
    } else if (gigGameId === 'delivery') {
       if(result.win) {
           gameEngine.addTransaction(300, "Gig: Campus Delivery");
           gameEngine.updateStats({ sanity: -15 });
       } else {
           gameEngine.updateStats({ sanity: -20 });
       }
    } else if (gigGameId === 'hongbao') {
       if(result.win) {
           gameEngine.addTransaction(150, "Gig: Flyer Distributor");
           gameEngine.updateStats({ sanity: -5 });
       } else {
           gameEngine.updateStats({ sanity: -10 });
       }
    } else if (gigGameId === 'model') {
       if(result.win) {
           gameEngine.addTransaction(500, "Gig: Taobao Model");
           gameEngine.updateStats({ sanity: -20 });
       } else {
           gameEngine.updateStats({ sanity: -25 });
       }
    }
    setGigGameId(null);
  };

  const handleMinigameComplete = (result) => {
    const currentNode = allEvents[gameState.currentNodeId];
    
    // Unlock the minigame for replay in the tablet
    gameEngine.setFlag(`unlocked_minigame_${currentNode.minigame}`, true);
    
    if (currentNode.minigame === 'bargain') {
        gameEngine.updateStats({ wealth: -(result.cost || 0) });
    } else if (currentNode.minigame === 'delivery') {
        if (result.win) {
            gameEngine.updateStats({ sanity: 15, wealth: -30 });
        } else {
            gameEngine.updateStats({ sanity: -10, wealth: -30 });
        }
    } else if (currentNode.minigame === 'tones') {
        if (result.win) {
            gameEngine.updateStats({ chinese: 5, academics: 2, sanity: -5 });
        } else {
            gameEngine.updateStats({ sanity: -10 });
        }
    } else if (currentNode.minigame === 'hongbao') {
        if (result.win) {
            gameEngine.updateStats({ wealth: 100, sanity: 10 });
        } else {
            gameEngine.updateStats({ sanity: -5 });
        }
    } else if (currentNode.minigame === 'banquet') {
        if (result.win) {
            gameEngine.updateGuanxi("professors", 10);
            gameEngine.updateStats({ sanity: -10 });
        } else {
            gameEngine.updateGuanxi("professors", -5);
            gameEngine.updateStats({ sanity: -20 });
        }
    } else if (currentNode.minigame === 'bike') {
        if (result.win) {
            gameEngine.updateStats({ digitalProficiency: 5, sanity: -5 });
        } else {
            gameEngine.updateStats({ sanity: -15 });
        }
    } else if (currentNode.minigame === 'subway' && !result.win) {
        gameEngine.updateStats({ sanity: -15 });

    setTimeout(() => {
        gameEngine.setCurrentNode(nextNodeId);
    }, 150);

    setIsMenuOpen(false);
    alert("Game saved!");

      alert("Game loaded!");

      alert("No save found.");

      setIsMenuOpen(false);

        console.error("Error attempting to enable fullscreen:", err);
      });
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();

      >

        {/* Top Info Bar */}

                <div className="flex items-center gap-3">
                   <span>😌 {gameState.stats.sanity}/100</span>
                   <div className={`w-32 h-2.5 rounded-full ${gameState.stats.sanity < 30 ? "bg-red-900" : "bg-slate-700"} overflow-hidden shadow-inner`}>

          state={gameState}
          onChoice={handleChoice} 
          availableChoices={events.getAvailableChoices(currentNodeId)}
        />
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SimulatorPage />);
  </script>
</body>
</html>
