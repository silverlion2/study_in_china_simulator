/* --- engine/GameState.js --- */
// Pure vanilla JS State Manager. No dependencies. Portable everywhere.

const INITIAL_STATS = {
  academics: 10,
  chinese: 10,
  wealth: 5000, // RMB
  energy: 100, // Max 100
  digitalProficiency: 5,
  culture: 0, // Cultural Integration
};

const CAPPED_STATS = new Set([
  'academics',
  'chinese',
  'energy',
  'digitalProficiency',
  'culture'
]);

const clampStat = (key, value) => {
  if (value < 0) return 0;
  if (CAPPED_STATS.has(key) && value > 100) return 100;
  return value;
};

const INITIAL_STATE = {
  currentNodeId: "start",
  turn: 1, // 1 turn = 1 week
  phase: "Application", // "Application", "Pre-Departure", "In-China"
  location: "Home Country", // The city the player is currently in
  stats: { ...INITIAL_STATS },
  guanxi: {
    admin: 0,
    localStudents: 0,
    intlStudents: 0,
    professors: 0
  },
  inventory: [],
  flags: {}, // For story tracking, e.g. { "got_vpn": true }
  
  relationships: {},

  // New Economy System
  jobs: {
    hasJob: false,
    jobId: null,
    weeklyIncome: 0,
    energyCost: 0
  },
  transactions: [
    { week: 1, amount: 5000, desc: "Initial Funds", type: "income" }
  ],
  items: {
    ebike: false,
    headphones: false,
    beddingSet: false,
    deskLamp: false,
    phraseCards: false,
    cityDataPack: false
  }
};

const NODE_UNLOCK_FLAGS = {
  money_crisis: ['money_crisis_seen'],
  game_over_wealth: ['money_crisis_seen', 'ending_out_of_money'],
  ending_scholar: ['ending_scholar'],
  ending_researcher: ['ending_researcher'],
  ending_entrepreneur: ['ending_entrepreneur'],
  ending_diplomat: ['ending_diplomat', 'ending_return_offer'],
  ending_influencer: ['ending_influencer'],
  ending_local_insider: ['ending_local_insider'],
  ending_hsk_master: ['ending_hsk_master', 'language_breakthrough'],
  ending_quiet_return: ['ending_quiet_return'],
  ending_compliance_scare: ['ending_compliance_scare'],
  ending_career_shortcut: ['ending_career_shortcut'],
  ending_unreliable_builder: ['ending_unreliable_builder'],
  ending_deportee: ['ending_deportee'],
  ending_academic_probation: ['ending_academic_probation']
};

class EngineState {
  constructor() {
    this.state = JSON.parse(JSON.stringify(INITIAL_STATE));
    this.listeners = [];
  }

  // Subscribe to state changes (React will use this)
  subscribe(listener) {
    this.listeners.push(listener);
    return () => {
      this.listeners = this.listeners.filter(l => l !== listener);
    };
  }

  // Notify listeners
  notify() {
    for (const listener of this.listeners) {
      listener(this.state);
    }
  }

  // Get current state
  getState() {
    return this.state;
  }

  addMagnet(magnet) {
    if (!this.state.inventory) this.state.inventory = [];
    const exists = this.state.inventory.find(m => m.name === magnet.name);
    if (!exists) {
      this.state.inventory.push(magnet);
      this.notify();
    }
  }

  addTransaction(amount, desc) {
    this.state.transactions.push({
      week: this.state.turn,
      amount: amount,
      desc: desc,
      type: amount >= 0 ? "income" : "expense"
    });
    this.state.stats.wealth += amount;
    if (this.state.stats.wealth < 0) this.state.stats.wealth = 0;
  }

  applyStatDelta(statChanges = {}) {
    for (const [key, value] of Object.entries(statChanges)) {
      const statKey = key === 'sanity' ? 'energy' : key;
      if (statKey === 'wealth') {
        this.addTransaction(value, value > 0 ? "Misc Income" : "Misc Expense");
      } else if (this.state.stats[statKey] !== undefined) {
        this.state.stats[statKey] = clampStat(statKey, this.state.stats[statKey] + value);
      }
    }
  }

  setJob(jobId, income, energyCost) {
    if (jobId === null) {
      this.state.jobs = { hasJob: false, jobId: null, weeklyIncome: 0, energyCost: 0 };
    } else {
      this.state.jobs = { hasJob: true, jobId, weeklyIncome: income, energyCost };
    }
    this.notify();
  }

  purchaseItem(itemId, cost, label = null, effects = {}) {
    if (this.state.stats.wealth >= cost && !this.state.items[itemId]) {
      this.addTransaction(-cost, label || `Purchased ${itemId}`);
      this.state.items[itemId] = true;
      if (effects.stats) this.applyStatDelta(effects.stats);
      if (effects.flags) {
        for (const [flag, value] of Object.entries(effects.flags)) {
          this.state.flags[flag] = value;
        }
      }
      this.notify();
      return true;
    }
    return false;
  }

  useDidiRide(rideId) {
    const rideOptions = {
      standard: {
        cost: 45,
        label: "DiDi Ride: Campus Errand",
        stats: { energy: 8, digitalProficiency: 1 }
      },
      comfort: {
        cost: 88,
        label: "DiDi Ride: Cross-Town Shortcut",
        stats: { energy: 14, digitalProficiency: 2, culture: 1 }
      },
      airport: {
        cost: 160,
        label: "DiDi Ride: Airport Transfer Practice",
        stats: { energy: 20, digitalProficiency: 3, culture: 2 }
      }
    };

    const ride = rideOptions[rideId];
    if (!ride || this.state.phase !== "In-China") return false;
    if (this.state.flags.used_didi_this_week || this.state.stats.wealth < ride.cost) return false;

    this.addTransaction(-ride.cost, ride.label);
    this.applyStatDelta(ride.stats);
    this.state.flags.used_didi_this_week = true;
    this.notify();
    return true;
  }

  useTaobaoServiceOrder(orderId) {
    const orderOptions = {
      dormFix: {
        cost: 65,
        label: "Taobao: Same-Day Dorm Fix",
        stats: { energy: 4, digitalProficiency: 1 },
        message: "The courier finds your dorm after two location pins and one awkward phone call. Your room is slightly more livable tonight."
      },
      wrongAddress: {
        cost: 35,
        label: "Taobao: Wrong-Address Recovery",
        stats: { digitalProficiency: 3, culture: 1, energy: -1 },
        message: "You untangle a delivery problem through screenshots, polite voice notes, and one very patient courier."
      },
      mealPrep: {
        cost: 120,
        label: "Taobao: Meal Prep Box",
        stats: { energy: 6, digitalProficiency: 1 },
        message: "Not glamorous, but future-you is grateful when dinner does not require another decision."
      }
    };

    const order = orderOptions[orderId];
    if (!order || this.state.phase !== "In-China") {
      return { ok: false, message: "Taobao service orders unlock after arrival in China." };
    }
    if (this.state.flags.used_taobao_service_this_week) {
      return { ok: false, message: "You already handled one service order this week." };
    }
    if (this.state.stats.wealth < order.cost) {
      return { ok: false, message: "Not enough RMB for this order." };
    }

    this.addTransaction(-order.cost, order.label);
    this.applyStatDelta(order.stats);
    this.state.flags.used_taobao_service_this_week = true;
    this.notify();
    return { ok: true, message: order.message };
  }

  sendWeChatCheckIn(character) {
    if (!character || this.state.flags.sent_wechat_ping_this_week) return false;
    if (!this.state.relationships?.[character]) return false;

    this.state.relationships[character].friendship = Math.min(100, (this.state.relationships[character].friendship || 0) + 2);
    this.applyStatDelta({ energy: -2, chinese: 1 });
    this.state.flags.sent_wechat_ping_this_week = true;
    this.addTransaction(0, `WeChat check-in: ${character}`);
    this.notify();
    return true;
  }

  // Advance time by 1 week
  advanceTurn() {
    this.state.turn += 1;
    this.state.flags.has_worked_this_week = false;
    this.state.flags.used_didi_this_week = false;
    this.state.flags.sent_wechat_ping_this_week = false;
    this.state.flags.used_taobao_service_this_week = false;
    
    // Process weekly expenses
    this.addTransaction(-200, "Weekly Living Expenses");

    // Process job
    if (this.state.jobs.hasJob) {
      this.addTransaction(this.state.jobs.weeklyIncome, "Part-Time Job Income");
      this.state.stats.energy -= this.state.jobs.energyCost;
      if (!this.state.items.headphones) {
         // Slightly hurts academics to work without good studying equipment
         this.state.stats.academics = Math.max(0, this.state.stats.academics - 1);
      }
    }
    
    // Apply weekly decay
    let baseDrain = 2;
    if (this.state.items.ebike) baseDrain -= 1; // Ebike helps!
    this.state.stats.energy -= baseDrain;
    
    if (this.state.stats.energy < 0) this.state.stats.energy = 0;
    
    // Auto-advance phase
    if (this.state.turn >= 8 && this.state.phase === "Application") {
      this.state.phase = "Pre-Departure";
    } else if (this.state.turn >= 16 && this.state.phase === "Pre-Departure") {
      this.state.phase = "In-China";
    }
    
    this.notify();
  }

  // Update multiple stats // DEPRECATED for wealth: try to use addTransaction, but keep for compatibility
  updateStats(statChanges) {
    for (const [key, value] of Object.entries(statChanges)) {
      const statKey = key === 'sanity' ? 'energy' : key;
      if (this.state.stats[statKey] !== undefined) {
        if (statKey === 'wealth') {
            this.addTransaction(value, value > 0 ? "Misc Income" : "Misc Expense");
        } else {
            this.state.stats[statKey] += value;
        }
        // Hard bounds for ability-style stats. Wealth is handled separately as RMB.
        this.state.stats[statKey] = clampStat(statKey, this.state.stats[statKey]);
      }
    }
    this.notify();
  }

  // Update specific deep relationships (friendship and romance)
  updateRelationship(character, changes) {
    if (!this.state.relationships) this.state.relationships = {};
    if (!this.state.relationships[character]) {
        this.state.relationships[character] = { friendship: 0, romance: 0 };
    }
    for (const [key, value] of Object.entries(changes)) {
        this.state.relationships[character][key] += value;
        if (this.state.relationships[character][key] < 0) this.state.relationships[character][key] = 0;
        if (this.state.relationships[character][key] > 100) this.state.relationships[character][key] = 100;
    }
    this.notify();
  }

  // Update specific Guanxi faction
  updateGuanxi(faction, amount) {
    if (this.state.guanxi[faction] !== undefined) {
      this.state.guanxi[faction] += amount;
      this.notify();
    }
  }

  // Set a story flag
  setFlag(flagName, value = true) {
    this.state.flags[flagName] = value;
    this.notify();
  }

  setCurrentNode(nodeId) {
    this.state.currentNodeId = nodeId;
    if (nodeId?.startsWith('ending_')) {
      this.state.flags[nodeId] = true;
    }
    for (const flag of NODE_UNLOCK_FLAGS[nodeId] || []) {
      this.state.flags[flag] = true;
    }
    this.notify();
  }

  setLocation(city) {
    this.state.location = city;
    this.notify();
  }

  // Reset Game
  reset() {
    this.state = JSON.parse(JSON.stringify(INITIAL_STATE));
    this.notify();
  }

  // Persistence
  save() {
    try {
      localStorage.setItem('sim_panda_save', JSON.stringify(this.state));
    } catch(e) { console.error("Save failed", e); }
  }

  load() {
    try {
      const data = localStorage.getItem('sim_panda_save');
      if (data) {
        const parsed = JSON.parse(data);
        this.state = { ...this.state, ...parsed }; // Merge to preserve structure
        // Migrate older saves from the former "sanity" stat to "energy".
        const loadedStats = this.state.stats || {};
        const migratedEnergy = loadedStats.energy !== undefined ? loadedStats.energy : loadedStats.sanity;
        this.state.stats = {
          ...INITIAL_STATS,
          ...loadedStats,
          energy: migratedEnergy !== undefined ? migratedEnergy : INITIAL_STATS.energy
        };
        for (const [statKey, value] of Object.entries(this.state.stats)) {
          this.state.stats[statKey] = clampStat(statKey, value);
        }
        delete this.state.stats.sanity;
        
        // Handle migration for older saves without economy
        if (!this.state.location) this.state.location = this.state.phase === "In-China" ? "Shanghai" : "Home Country";
        if (!this.state.jobs) this.state.jobs = { hasJob: false, jobId: null, weeklyIncome: 0, energyCost: 0 };
        if (this.state.jobs.energyCost === undefined && this.state.jobs.sanityCost !== undefined) {
          this.state.jobs.energyCost = this.state.jobs.sanityCost;
        }
        delete this.state.jobs.sanityCost;
        if (!this.state.transactions) this.state.transactions = [{ week: 1, amount: this.state.stats.wealth, desc: "Initial Funds", type: "income" }];
        if (!this.state.items) this.state.items = { ...INITIAL_STATE.items };
        else this.state.items = { ...INITIAL_STATE.items, ...this.state.items };
        if (!this.state.relationships) this.state.relationships = {};

        this.notify();
        return true;
      }
    } catch(e) { console.error("Load failed", e); }
    return false;
  }
}

// Export a singleton instance for simplicity, though React Context can inject it too.
const gameEngine = new EngineState();

/* --- engine/EventSystem.js --- */
// Evaluates conditions and triggers story nodes

class EventSystem {
  constructor(engine) {
    this.engine = engine; // Reference to GameState
    this.events = {}; // Map of all event configurations
  }

  // Load event dictionary into the generic pool
  loadEvents(newEvents) {
    this.events = { ...this.events, ...newEvents };
  }

  // Check if a node's condition passing
  checkCondition(conditionObj) {
    if (!conditionObj) return true; // No condition = always pass
    const state = this.engine.getState();

    // Check location
    if (conditionObj.location) {
      if (state.location !== conditionObj.location) return false;
    }

    // Check week/turn gates (e.g., { turn: { min: 25 } })
    if (conditionObj.turn) {
      const val = state.turn || 0;
      if (conditionObj.turn.min !== undefined && val < conditionObj.turn.min) return false;
      if (conditionObj.turn.max !== undefined && val > conditionObj.turn.max) return false;
    }

    // Check stats (e.g., { stats: { academics: { min: 20 } } })
    if (conditionObj.stats) {
      for (const [stat, req] of Object.entries(conditionObj.stats)) {
        const val = state.stats[stat] || 0;
        if (req.min !== undefined && val < req.min) return false;
        if (req.max !== undefined && val > req.max) return false;
      }
    }
    
    // Check flags
    if (conditionObj.flags) {
      for (const [flag, value] of Object.entries(conditionObj.flags)) {
        if (!!state.flags[flag] !== value) return false;
      }
    }
    
    // Check guanxi
    if (conditionObj.guanxi) {
      for (const [faction, req] of Object.entries(conditionObj.guanxi)) {
        const val = state.guanxi[faction] || 0;
        if (req.min !== undefined && val < req.min) return false;
        if (req.max !== undefined && val > req.max) return false;
      }
    }

    // Check relationships
    if (conditionObj.relationships) {
      for (const [character, states] of Object.entries(conditionObj.relationships)) {
        for (const [key, req] of Object.entries(states)) {
          const val = (state.relationships && state.relationships[character]) ? state.relationships[character][key] || 0 : 0;
          if (req.min !== undefined && val < req.min) return false;
          if (req.max !== undefined && val > req.max) return false;
        }
      }
    }

    return true;
  }

  // Get available choices for a given node
  getAvailableChoices(nodeId) {
    const node = this.events[nodeId];
    if (!node || !node.choices) return [];
    
    return node.choices.filter(choice => this.checkCondition(choice.condition));
  }

  // Execute a choice's consequences
  executeChoice(choice) {
    // 1. Apply stat changes
    if (choice.effects && choice.effects.stats) {
      this.engine.updateStats(choice.effects.stats);
    }
    
    // 2. Apply guanxi changes
    if (choice.effects && choice.effects.guanxi) {
      for (const [faction, amount] of Object.entries(choice.effects.guanxi)) {
         this.engine.updateGuanxi(faction, amount);
      }
    }
    
    // 3. Set flags
    if (choice.effects && choice.effects.flags) {
       for (const [flag, value] of Object.entries(choice.effects.flags)) {
         this.engine.setFlag(flag, value);
       }
    }
    
    // 4. Update relationships
    if (choice.effects && choice.effects.relationships) {
       for (const [character, changes] of Object.entries(choice.effects.relationships)) {
         this.engine.updateRelationship(character, changes);
       }
    }
    
    // 5. Apply location changes
    if (choice.effects && choice.effects.location) {
       this.engine.setLocation(choice.effects.location);
    }
    
    // 6. Obtain Magnets
    if (choice.effects && choice.effects.magnet) {
       this.engine.addMagnet(choice.effects.magnet);
    }

    // Intercept: If returning to hub, roll for random events
    let nextNode = choice.next;
    if (nextNode === "hub") {
      const roll = Math.random();
      if (roll < 0.05) {
         nextNode = "random_sick";
      } else if (roll < 0.1) {
         nextNode = "random_exam";
      } else if (roll < 0.15) {
         nextNode = "random_subway";
      } else if (roll < 0.2) {
         nextNode = "random_lecture";
      } else if (roll < 0.25) {
         nextNode = "random_club_fair";
      } else if (roll < 0.3) {
         nextNode = "random_vpn_down";
      } else if (roll < 0.35) {
         nextNode = "random_dorm_inspection";
      }
    }

    // Return the next Node ID
    return nextNode;
  }
}

/* --- engine/AudioManager.js --- */
class AudioManager {
  constructor(manifest = {}) {
    this.manifest = manifest;
    this.context = null;
    this.masterGain = null;
    this.bgmGain = null;
    this.ambienceGain = null;
    this.sfxGain = null;
    this.stingerGain = null;
    this.bgmTimer = null;
    this.bgmBarIndex = 0;
    this.currentBgmId = null;
    this.currentBgmElement = null;
    this.currentAmbienceElement = null;
    this.lastTypeTickAt = 0;
    this.muted = false;
    this.volumes = {
      master: 0.72,
      bgm: 0.42,
      ambience: 0.2,
      sfx: 0.7,
      type: 0.28,
      stinger: 0.75,
      ...(manifest.defaults?.volumes || {})
    };
    this.loadSettings();
  }

  loadSettings() {
    try {
      if (typeof window === "undefined" || !window.localStorage) return;
      const stored = window.localStorage.getItem("sim_panda_audio_settings");
      if (!stored) return;
      const parsed = JSON.parse(stored);
      this.muted = Boolean(parsed.muted);
      this.volumes = { ...this.volumes, ...(parsed.volumes || {}) };
    } catch (error) {
      console.warn("Audio settings could not be loaded", error);
    }
  }

  saveSettings() {
    try {
      if (typeof window === "undefined" || !window.localStorage) return;
      window.localStorage.setItem("sim_panda_audio_settings", JSON.stringify({
        muted: this.muted,
        volumes: this.volumes
      }));
    } catch (error) {
      console.warn("Audio settings could not be saved", error);
    }
  }

  ensureContext() {
    if (typeof window === "undefined") return null;
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return null;

    if (!this.context) {
      this.context = new AudioContextClass();
      this.masterGain = this.context.createGain();
      this.bgmGain = this.context.createGain();
      this.ambienceGain = this.context.createGain();
      this.sfxGain = this.context.createGain();
      this.stingerGain = this.context.createGain();

      this.masterGain.connect(this.context.destination);
      this.bgmGain.connect(this.masterGain);
      this.ambienceGain.connect(this.masterGain);
      this.sfxGain.connect(this.masterGain);
      this.stingerGain.connect(this.masterGain);

      this.applyVolumes();
    }

    return this.context;
  }

  async unlock() {
    const ctx = this.ensureContext();
    if (!ctx) return false;
    if (ctx.state === "suspended") {
      await ctx.resume();
    }
    return ctx.state === "running";
  }

  applyVolumes() {
    if (!this.masterGain) return;
    const masterVolume = this.muted ? 0 : this.volumes.master;
    this.masterGain.gain.value = masterVolume;
    this.bgmGain.gain.value = this.volumes.bgm;
    this.ambienceGain.gain.value = this.volumes.ambience;
    this.sfxGain.gain.value = this.volumes.sfx;
    this.stingerGain.gain.value = this.volumes.stinger;
  }

  setVolume(channel, value) {
    const safeValue = Math.max(0, Math.min(1, Number(value) || 0));
    this.volumes[channel] = safeValue;
    this.applyVolumes();
    this.saveSettings();
  }

  mute() {
    this.muted = true;
    this.applyVolumes();
    this.saveSettings();
  }

  unmute() {
    this.muted = false;
    this.applyVolumes();
    this.saveSettings();
  }

  isMuted() {
    return this.muted;
  }

  async start(bgmId = "title") {
    this.unmute();
    const unlocked = await this.unlock();
    if (!unlocked) return false;
    await this.playBgm(bgmId);
    return true;
  }

  stop() {
    this.stopBgm({ fadeMs: 350 });
    this.stopAmbience({ fadeMs: 250 });
  }

  async playBgm(id = "title", options = {}) {
    const unlocked = await this.unlock();
    if (!unlocked || this.muted) return unlocked;
    if (this.currentBgmId === id && (this.bgmTimer || this.currentBgmElement)) return true;

    const entry = this.manifest.bgm?.[id];
    if (entry?.ready && entry.src) {
      this.stopProceduralBgm(options);
      this.currentBgmId = id;
      this.currentBgmElement = await this.playLoopingElement(this.currentBgmElement, entry.src, this.volumes.bgm, options.fadeMs ?? 900);
      return true;
    }

    this.stopElement(this.currentBgmElement, options.fadeMs ?? 500);
    this.currentBgmElement = null;
    this.playProceduralBgm(entry?.fallback || id, options);
    return true;
  }

  stopBgm(options = {}) {
    this.stopProceduralBgm(options);
    this.stopElement(this.currentBgmElement, options.fadeMs ?? 350);
    this.currentBgmElement = null;
    this.currentBgmId = null;
  }

  async playAmbience(id, options = {}) {
    const entry = this.manifest.ambience?.[id];
    if (!entry?.ready || !entry.src || this.muted) return false;
    const unlocked = await this.unlock();
    if (!unlocked) return false;
    this.currentAmbienceElement = await this.playLoopingElement(this.currentAmbienceElement, entry.src, this.volumes.ambience, options.fadeMs ?? 700);
    return true;
  }

  stopAmbience(options = {}) {
    this.stopElement(this.currentAmbienceElement, options.fadeMs ?? 250);
    this.currentAmbienceElement = null;
  }

  playSfx(id = "uiClick") {
    if (this.muted) return;
    const entry = this.manifest.sfx?.[id];
    if (entry?.ready && entry.src) {

      return;

    this.playFallbackSfx(entry?.fallback || id);
  }

  playStinger(id = "cgUnlock") {

  async playLoopingElement(currentElement, src, volume, fadeMs) {
    this.stopElement(currentElement, fadeMs);
    const element = new Audio(src);
    element.loop = true;
    element.volume = 0;
    try {
      await element.play();
      this.fadeElement(element, volume, fadeMs);
      return element;
    } catch (error) {
      console.warn("Audio asset could not be played; using fallback if available", src, error);
      return null;
    }
  }

  playOneShotElement(src, volume) {
    const element = new Audio(src);
    element.volume = volume;
    element.play().catch((error) => {
      console.warn("SFX asset could not be played", src, error);
    });
  }

  fadeElement(element, targetVolume, fadeMs = 500) {
    if (!element) return;
    const startVolume = element.volume || 0;
    const duration = Math.max(1, fadeMs);
    const startedAt = performance.now();
    const tick = () => {
      const progress = Math.min(1, (performance.now() - startedAt) / duration);
      element.volume = startVolume + (targetVolume - startVolume) * progress;
      if (progress < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }

  stopElement(element, fadeMs = 350) {
    if (!element) return;
    const startVolume = element.volume || 0;
    const duration = Math.max(1, fadeMs);
    const startedAt = performance.now();
    const tick = () => {
      const progress = Math.min(1, (performance.now() - startedAt) / duration);
      element.volume = startVolume * (1 - progress);
      if (progress < 1) {
        requestAnimationFrame(tick);
      } else {
        element.pause();
        element.currentTime = 0;
      }
    };
    requestAnimationFrame(tick);
  }

  playProceduralBgm(id, options = {}) {
    const ctx = this.ensureContext();
    if (!ctx || !this.bgmGain) return;
    const fadeMs = options.fadeMs ?? 900;
    const preset = this.getBgmPreset(id);

    this.stopProceduralBgm({ fadeMs: 120 });
    this.currentBgmId = id;
    this.bgmBarIndex = 0;
    this.bgmGain.gain.cancelScheduledValues(ctx.currentTime);
    this.bgmGain.gain.setValueAtTime(0.0001, ctx.currentTime);
    this.bgmGain.gain.linearRampToValueAtTime(this.volumes.bgm, ctx.currentTime + fadeMs / 1000);

    const playBar = () => {
      this.playProceduralBar(preset);
      this.bgmBarIndex += 1;
    };

    playBar();
    this.bgmTimer = window.setInterval(playBar, preset.intervalMs);
  }

  stopProceduralBgm(options = {}) {
    if (this.bgmTimer) {
      window.clearInterval(this.bgmTimer);
      this.bgmTimer = null;
    }
    if (this.context && this.bgmGain) {
      const fadeSeconds = (options.fadeMs ?? 250) / 1000;
      this.bgmGain.gain.cancelScheduledValues(this.context.currentTime);
      this.bgmGain.gain.linearRampToValueAtTime(0.0001, this.context.currentTime + fadeSeconds);
    }
  }

  playProceduralBar(preset) {
    const chord = preset.progression[this.bgmBarIndex % preset.progression.length];
    chord.forEach((frequency, index) => {
      this.playTone({
        frequency,
        duration: preset.padDuration,
        type: index === 0 ? preset.bassType : preset.padType,
        gain: index === 0 ? preset.bassGain : preset.padGain,
        destination: this.bgmGain,
        delay: index * 0.035
      });
    });

    for (const accent of preset.accents) {
      const base = chord[accent.noteIndex] || chord[1] || chord[0];
      this.playTone({
        frequency: base * accent.multiplier,
        duration: accent.duration,
        type: accent.type,
        gain: accent.gain,
        destination: this.bgmGain,
        delay: accent.delay
      });
    }

    if (preset.pulse) {
      this.playTone({
        frequency: chord[0] / 2,
        duration: 0.12,
        type: "sawtooth",
        gain: preset.pulseGain,
        destination: this.bgmGain,
        delay: 0.05
      });
      this.playTone({
        frequency: chord[0] / 2,
        duration: 0.1,
        type: "sawtooth",
        gain: preset.pulseGain * 0.7,
        destination: this.bgmGain,
        delay: preset.intervalMs / 2000

    }

  playTypeTick() {
    const ctx = this.ensureContext();
    if (!ctx || !this.sfxGain) return;
    const nowMs = Date.now();
    if (nowMs - this.lastTypeTickAt < 34) return;
    this.lastTypeTickAt = nowMs;

    const sampleCount = Math.floor(ctx.sampleRate * 0.018);
    const buffer = ctx.createBuffer(1, sampleCount, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < sampleCount; i += 1) {
      const fade = 1 - i / sampleCount;
      data[i] = (Math.random() * 2 - 1) * fade;
    }

    const source = ctx.createBufferSource();
    const filter = ctx.createBiquadFilter();
    const gain = ctx.createGain();
    source.buffer = buffer;
    filter.type = "bandpass";
    filter.frequency.value = 1700 + Math.random() * 700;
    gain.gain.value = this.volumes.type * 0.065;
    source.connect(filter);
    filter.connect(gain);
    gain.connect(this.sfxGain);
    source.start();
  }

  playTone({ frequency, duration = 0.12, type = "sine", gain = 0.04, destination = this.sfxGain, delay = 0 }) {
    const ctx = this.ensureContext();
    if (!ctx || !destination) return;
    const now = ctx.currentTime + delay;
    const oscillator = ctx.createOscillator();
    const envelope = ctx.createGain();
    oscillator.type = type;
    oscillator.frequency.setValueAtTime(frequency, now);
    envelope.gain.setValueAtTime(0.0001, now);
    envelope.gain.exponentialRampToValueAtTime(Math.max(0.0002, gain), now + 0.018);
    envelope.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    oscillator.connect(envelope);
    envelope.connect(destination);
    oscillator.start(now);
    oscillator.stop(now + duration + 0.04);
  }

  "district_shanghai_fuxing": { speaker: "Fuxing Park", text: "By day, elders practice tai chi and parents push strollers. At night, the nearby blocks turn into one of Shanghai's loudest youth-culture zones.", choices: [ { text: "Observe the nightlife economy with classmates (-180 RMB)", condition: { stats: { wealth: { min: 180 } } }, next: "event_sh_ins_clubbing", action: "advance_turn", effects: { stats: { wealth: -180 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_shanghai_bund": { speaker: "The Bund", text: "The waterfront compresses a lot into one walk: treaty-port stone, tourist cameras, school groups, wedding shoots, and Pudong's skyline performing across the river.", choices: [ { text: "Take an evening reflection walk", next: "event_sh_bund_walk", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_shanghai_lujiazui": { speaker: "Lujiazui", text: "The towers are impressive, but the more useful lesson is watching how people move through work, money, time, and ambition here.", choices: [ { text: "Attend a student-friendly fintech talk (-60 RMB)", condition: { stats: { wealth: { min: 60 } } }, next: "event_sh_lujiazui_mixer", action: "advance_turn", effects: { stats: { wealth: -60 } } }, { text: "Back to district map", next: "submenu_districts" } ] },

  "district_beijing_forbidden": { speaker: "Forbidden City", text: "The palace is beautiful, crowded, and stricter than your travel fantasy expected. History here arrives with security lines and audio-guide batteries.", choices: [ { text: "Practice translating signs for your own notes", condition: { stats: { chinese: { min: 20 } } }, next: "event_beijing_tourguide", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_beijing_qianmen": { speaker: "Qianmen Street", text: "Old storefronts, new brands, tour groups, snacks, and souvenir shops all argue over what 'traditional' should look like.", choices: [ { text: "Watch Peking Opera excerpts (-100 RMB)", condition: { stats: { wealth: { min: 100 } } }, next: "event_beijing_opera", action: "advance_turn", effects: { stats: { wealth: -100 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_beijing_hutong": { speaker: "Old Hutongs", text: "The lanes are not a postcard. They are homes, deliveries, repairs, tourists, and people trying to live inside a famous place.", choices: [ { text: "Chat carefully with a taxi driver", next: "event_beijing_taxi", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },

  "district_gz_fair": { speaker: "Canton Fair Complex", text: "The trade fair is less a building than a temporary planet: badges, samples, interpreters, factories, buyers, and exhausted coffee stands.", choices: [ { text: "Shadow translation work and take market notes", condition: { stats: { chinese: { min: 30 } } }, next: "event_guangzhou_cantonfair", action: "advance_turn" }, { text: "Dim sum with a local contact (-120 RMB)", condition: { stats: { wealth: { min: 120 } } }, next: "event_guangzhou_boss", action: "advance_turn", effects: { stats: { wealth: -120 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_gz_market": { speaker: "Baima Market", text: "Floor after floor of samples, negotiation, bags, labels, livestream sellers, and people who understand supply chains in their bones.", choices: [ { text: "Compare prices and consumer habits (-120 RMB)", condition: { stats: { wealth: { min: 120 } } }, next: "event_guangzhou_market", action: "advance_turn", effects: { stats: { wealth: -120 } } }, { text: "Back to district map", next: "submenu_districts" } ] },

  "district_chengdu_panda": { speaker: "Panda Base", text: "Lush bamboo forests where conservation work, tourism, and logistics all have to share space.", choices: [ { text: "Join the visitor education route (-50 RMB)", condition: { stats: { wealth: { min: 50 } } }, next: "event_chengdu_volunteer", action: "advance_turn", effects: { stats: { wealth: -50 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_chengdu_kuanzhai": { speaker: "Kuanzhai Alley", text: "Preserved historic alleys full of spicy street food aromas.", choices: [ { text: "Try a hotpot table with locals (-50 RMB)", condition: { stats: { wealth: { min: 50 } } }, next: "event_chengdu_hotpot", action: "advance_turn", effects: { stats: { wealth: -50 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_chengdu_park": { speaker: "People's Park", text: "Locals are playing mahjong, drinking tea, and treating the park like a second living room.", choices: [ { text: "Listen to teahouse advice", next: "event_chengdu_tea", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },

  "district_xian_terra": { speaker: "Terracotta Museum", text: "Thousands of stone warriors stand guard in the massive pits.", choices: [ { text: "Tour the museum with Guide Jin (-100 RMB)", condition: { stats: { wealth: { min: 100 } } }, next: "event_xian_tour", action: "advance_turn", effects: { stats: { wealth: -100 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_xian_muslim": { speaker: "Muslim Quarter", text: "Cumin smoke, old shop signs, tourist waves, and neighborhood routines overlap until you stop trying to separate them neatly.", choices: [ { text: "Talk with a souvenir vendor about tourist rhythms", next: "event_xian_souvenirs", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_xian_wall": { speaker: "Ancient City Wall", text: "One of the oldest and best preserved Chinese city walls.", choices: [ { text: "Cycle the wall at sunset (-40 RMB)", condition: { stats: { wealth: { min: 40 } } }, next: "event_xian_cycling", action: "advance_turn", effects: { stats: { wealth: -40 } } }, { text: "Back to district map", next: "submenu_districts" } ] },

  "district_hz_tech": { speaker: "Binjiang District", text: "Glass offices, bike lanes, delivery riders, and campus recruiters make Hangzhou's tech scene feel less mythical and more procedural.", choices: [ { text: "Attend a public tech-career info session", condition: { stats: { academics: { min: 30 } } }, next: "event_hangzhou_alibaba", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_hz_lake": { speaker: "West Lake", text: "A UNESCO heritage site famous for poetry and tea.", choices: [ { text: "Rent a quiet boat (-100 RMB)", condition: { stats: { wealth: { min: 100 } } }, next: "event_hangzhou_boat", action: "advance_turn", effects: { stats: { wealth: -100 } } }, { text: "Join a Longjing tea session", next: "event_hangzhou_tea", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },

  "district_sanya_houhai": { speaker: "Houhai Surf Village", text: "A fishing village, surf schools, guesthouses, and influencer cafes share the same beach. It is relaxing and visibly commercial at the same time.", choices: [ { text: "Take a beginner surf lesson (-180 RMB)", condition: { stats: { wealth: { min: 180 } } }, next: "event_sanya_surf", action: "advance_turn", effects: { stats: { wealth: -180 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_sanya_yalong": { speaker: "Yalong Bay", text: "The resort strip is beautiful, expensive, and a little unreal after campus life. You can enjoy it without pretending it is the whole country.", choices: [ { text: "Observe resort tourism from the public beach (-160 RMB)", condition: { stats: { wealth: { min: 160 } } }, next: "event_sanya_yacht", action: "advance_turn", effects: { stats: { wealth: -160 } } }, { text: "Ask staff how seasonal tourism work feels", next: "event_sanya_bartender", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },

function TimelineNode({ title, desc, active, completed, children }) {
    let dotColor = "bg-slate-700 border-slate-900";
    let textColor = "text-slate-500";
    if (completed) {
        dotColor = "bg-emerald-500 border-slate-900";
        textColor = "text-slate-300";
    } else if (active) {
        dotColor = "bg-sky-400 border-sky-900 shadow-[0_0_15px_rgba(56,189,248,0.5)]";
        textColor = "text-white";
    }

    return (
        <div className="pl-12 relative">
            <div className={`absolute left-[0.85rem] top-1.5 w-4 h-4 rounded-full border-[4px] z-10 transition-all ${dotColor}`}></div>
            <div className={`text-base font-bold ${active ? 'text-sky-400' : (completed ? 'text-emerald-400' : 'text-slate-500')} mb-1`}>
                {title}
            </div>
            <p className={`${textColor} text-xs mb-2`}>{desc}</p>
            <div className="bg-slate-800/80 p-3 rounded-xl flex flex-col gap-1.5 border border-slate-700/50 shadow-inner">
                {children}
            </div>
        </div>
    );
}

function getCalendarItems(state) {
    const flags = state.flags || {};
    const items = [];

    const addItem = (id, week, title, desc) => {
        const weeksAway = week - state.turn;
        const tone = weeksAway <= 0 ? "urgent" : weeksAway <= 2 ? "soon" : "future";
        const weekLabel = weeksAway <= 0 ? `Week ${week} • due now` : `Week ${week} • in ${weeksAway} week${weeksAway === 1 ? "" : "s"}`;
        items.push({ id, week, title, desc, tone, weekLabel });
    };

    if (state.phase === "Application") {
        if (!flags.completed_application) {
            addItem("application_deadline", 8, "Minghai Application Deadline", "Statement, school research, documents, interview prep, and final submission all converge here.");
        }
        if (!flags.decision_e1_plan) {
            addItem("statement_draft", 5, "Statement Draft Lock", "A credible study plan should explain why China, why Minghai, and why this major now.");
        }
        if (!flags.finance_scholarship && !flags.finance_rich && !flags.finance_working) {
            addItem("funding_plan", 6, "Funding Plan Check", "Your first serious economic choice shapes pressure for the whole year.");
        }
    }

    if (state.phase === "Pre-Departure") {
        if (!flags.got_visa) {
            addItem("x1_visa", 12, "X1 Visa Appointment", "Passport, Admission Letter, JW202, copies, photos, and one careful queue.");
        }
        if (!flags.decision_e2_wechat) {
            addItem("phone_payment", 13, "Digital Setup", "WeChat, Alipay, maps, translation backups, and ride-hailing preparation make later arrival choices possible.");
        }
        if (!flags.departed_for_shanghai) {
            addItem("flight_week", 16, "Boarding Week", "Shanghai stops being a plan and becomes a place.");
        }
    }

    if (state.phase === "In-China") {
        if (!flags.decision_e3_registration) {
            addItem("registration", 18, "Registration Window", "Student card, account setup, campus systems, and residence-permit rhythm.");
        }
        if (state.turn < 24) {
            addItem("midterm", 24, "Midterm Checkpoint", "Your habits start showing receipts: classes, energy, relationships, and money all speak at once.");
        }
        if (state.turn < 28) {
            addItem("future_direction", 28, "Future Direction", "Research, career, local integration, student support, or city opportunity becomes more than a vibe.");
        }
        if (state.turn < 32) {
            addItem("year_end_review", 32, "Year-End Review", "Routes, relationships, and pressure turn into an ending.");
        }
    }

    if (items.length === 0) {
        items.push({
            id: "open_week",
            week: state.turn,
            title: "Open Week",
            desc: "No critical deadline is screaming right now. This is a good week to invest in a route, repair a relationship, or recover Energy.",
            tone: "ready",
            weekLabel: `Week ${state.turn} • flexible`
        });
    }

    return items.sort((a, b) => a.week - b.week).slice(0, 5);
}

function getRelationshipStage(name, data, flags) {
    const friendship = data.friendship || 0;
    const commitmentFlags = {
        "Professor Lin": flags.lin_recommendation_ready,
        "Dr. Mei": flags.dr_mei_project_commitment,
        "Sophie": flags.sophie_orientation_committee,
        "Neighbor Li": flags.neighbor_li_festival_invite,
        "Uncle Wang": flags.uncle_wang_regular,
        "Manager Zhang": flags.manager_zhang_referral_ready,
        "Xiao Chen": flags.xiao_chen_demo_day
    };
    const tensionFlags = {
        "Professor Lin": flags.lin_midterm_tension_resolved,
        "Dr. Mei": flags.dr_mei_midterm_tension_resolved,
        "Sophie": flags.sophie_midterm_tension_resolved,
        "Neighbor Li": flags.neighbor_li_midterm_tension_resolved,
        "Uncle Wang": flags.uncle_wang_midterm_tension_resolved,
        "Manager Zhang": flags.manager_zhang_midterm_tension_resolved,
        "Xiao Chen": flags.xiao_chen_midterm_tension_resolved
    };
    const trustFlags = {
        "Professor Lin": flags.lin_academic_method,
        "Dr. Mei": flags.dr_mei_project_trust,
        "Sophie": flags.sophie_support_circle,
        "Neighbor Li": flags.neighbor_li_local_trust,
        "Uncle Wang": flags.uncle_wang_neighborhood_story,
        "Manager Zhang": flags.manager_zhang_career_trust,
        "Xiao Chen": flags.xiao_chen_city_prototype
    };

    if (commitmentFlags[name]) {
        return { label: "Commitment", order: 4, className: "bg-amber-50 border-amber-300 text-amber-700", barClass: "bg-amber-400" };
    }
    if (tensionFlags[name]) {
        return { label: "Tension Resolved", order: 3, className: "bg-orange-50 border-orange-300 text-orange-700", barClass: "bg-orange-400" };
    }
    if (trustFlags[name] || friendship >= 12) {
        return { label: "Trust", order: 2, className: "bg-sky-50 border-sky-300 text-sky-700", barClass: "bg-sky-400" };
    }
    if (friendship > 0) {
        return { label: "Contact", order: 1, className: "bg-emerald-50 border-emerald-300 text-emerald-700", barClass: "bg-emerald-400" };
    }
    return { label: "Unknown", order: 0, className: "bg-gray-50 border-gray-300 text-gray-500", barClass: "bg-gray-300" };
}

function StoryPanel({ node, state, availableChoices, onChoice, onTextTick }) {
  const [showChoices, setShowChoices] = useState(false);
  const [textKey, setTextKey] = useState(0);
  const [displayText, setDisplayText] = useState("");
  const fullTextRef = useRef("");
  const onTextTickRef = useRef(onTextTick);

  useEffect(() => {
    onTextTickRef.current = onTextTick;
  }, [onTextTick]);

  const revealFullText = () => {
    setDisplayText(fullTextRef.current || node?.text || "");
    setShowChoices(true);
  };

  useEffect(() => {
    // Reset animations when node changes
    setShowChoices(false);
    setTextKey(prev => prev + 1);
    setDisplayText("");

    if (!node) return;

    // Typewriter effect
    let currentText = "";

    // Append a grounded personal afterword for endings, based on the strongest relationship arc.
    const isEndingNode = node.choices && node.choices.some(c => c.action === "reset_game");
    const epilogues = isEndingNode ? buildEndingAfterword(state) : "";

    const fullText = (node.text || "") + epilogues;
    fullTextRef.current = fullText;
    let i = 0;

    const interval = setInterval(() => {
      const nextChar = fullText.charAt(i);
      currentText += nextChar;
      setDisplayText(currentText);
      if (nextChar.trim() && i % 3 === 0) {
        onTextTickRef.current?.();
      }
      i++;
      if (i >= fullText.length) {
        clearInterval(interval);
        setShowChoices(true);
      }
    }, 20); // 20ms per character

    return () => clearInterval(interval);
  }, [node]);

  useEffect(() => {
    const handleKeyDown = (e) => {
        if (e.target?.closest?.('[data-week-transition]')) return;

        const isSpace = e.key === " " || e.key === "Spacebar" || e.key === "Space" || e.code === "Space";
        const isEnter = e.key === "Enter";

        if (isSpace || isEnter) {
            e.preventDefault();

            if (!showChoices) {
              revealFullText();
            }

            return;
        }

        if (!showChoices) {
           return;
        }

        // Number keys for choices
        const num = parseInt(e.key);
        if (!isNaN(num) && num > 0 && availableChoices && num <= availableChoices.length) {
            e.preventDefault();
            onChoice(availableChoices[num - 1]);
        }
    };
    document.addEventListener("keydown", handleKeyDown, true);
    return () => document.removeEventListener("keydown", handleKeyDown, true);
  }, [showChoices, availableChoices, node, onChoice]);

  if (!node) return null;

  return (

function buildEndingAfterword(state) {
   if (!state || !state.relationships) return "";

   const flags = state.flags || {};
   const strongest = getStrongestRelationship(state.relationships);
   const relationshipLine = strongest ? getRelationshipAfterword(strongest.name, strongest.rel, flags) : "";
   const personalLine = getPersonalReflection(flags);
   const lines = [relationshipLine, personalLine].filter(Boolean);

   if (lines.length === 0) return "";
   return `\n\n--- PERSONAL AFTERWORD ---\n\n${lines.join("\n\n")}`;
}

function getStrongestRelationship(relationships) {
   const candidates = Object.entries(relationships)
      .filter(([, rel]) => (rel.friendship || 0) > 0 || (rel.romance || 0) > 0)
      .map(([name, rel]) => ({
         name,
         rel,
         score: (rel.friendship || 0) + (rel.romance || 0) * 1.25
      }))
      .sort((a, b) => b.score - a.score);

   return candidates[0] || null;
}

function getRelationshipAfterword(name, rel, flags) {
   if (!name || !rel) return "";

   const friendship = rel.friendship || 0;
   const romance = rel.romance || 0;

   if (name === "Professor Lin") {
      if (flags.lin_recommendation_ready) {
         return "Professor Lin's recommendation arrives in an envelope with the university seal, but the real prize is the sentence he writes by hand at the bottom: 'This student learned how to think under pressure.' You keep a photo of it on your phone long after the paper is filed away.";
      }
      if (flags.lin_feedback_repaired) {
         return "You still remember Professor Lin's harshest comments because they became the hinge of the year. Every serious draft after that carries his invisible red pen, and somehow that starts to feel like armor.";
      }
      return "Professor Lin remains one of the voices you hear when a first draft feels convincing too early, which is annoying, useful, and probably the closest thing academia has to a haunting.";
   }

   if (name === "Dr. Mei") {
      if (flags.dr_mei_project_commitment) {
         return "Dr. Mei adds your name to the project workspace, then to the forum poster, then to a draft that suddenly feels far too real. The project does not make you famous, but it gives you something better: a question sharp enough to follow into the next chapter.";
      }
      if (flags.dr_mei_ethics_reframed) {
         return "Dr. Mei's question about responsibility follows you like a second passport. It changes how you write about people, places, and every too-clean explanation you once trusted.";
      }
      return "Dr. Mei leaves you with the sense that good questions are rarely comfortable at first, and the dangerous suspicion that comfort was never the point.";
   }

   if (name === "Sophie") {
      if (romance >= 20) {
         return "Sophie remains complicated in the way real closeness often is: half timing, half courage, half unread messages at 1:17 a.m. The math does not work, but neither did most of the year, and somehow that is why it matters.";
      }
      if (flags.sophie_orientation_committee) {
         return "Sophie sends you a screenshot from the next orientation: your guide is on the projector, your jokes are still in the margins, and a room full of new students is laughing before they panic. Somewhere along the way, arrival notes became infrastructure.";
      }
      if (flags.sophie_bridge_plan) {
         return "Sophie keeps teasing you about the bridge activity, then posts the next signup link before you can protest. The international circle does not vanish; it grows doors.";
      }
      return "Sophie stays pinned near the top of WeChat, proof that sometimes the first person who admits they are lost becomes the map everyone else follows.";
   }

   if (name === "Neighbor Li") {
      if (flags.neighbor_li_festival_invite) {
         return "Neighbor Li still sends photos from the neighborhood festival group chat. You are in the corner of three of them, carrying boxes under red lanterns, looking too busy to realize you had already been accepted.";
      }
      if (flags.neighbor_li_boundary_repaired) {
         return "The dorm never became effortless, but after the misunderstanding with Neighbor Li, people stopped treating you like a guest passing through. Belonging, apparently, can begin with a properly repaired mistake.";
      }
      return "Neighbor Li remains the person who taught you that local life is mostly made of unwritten rules, repeated kindness, and someone yelling your name from across the courtyard.";
   }

   if (name === "Uncle Wang") {
      if (flags.uncle_wang_regular) {
         return "Uncle Wang never calls it friendship too loudly. He just saves your usual seat, slides extra skewers onto the plate, and introduces you to regulars as 'our Minghai student' like the title means something official.";
      }
      if (flags.uncle_wang_honest_answer) {
         return "You are not sure Uncle Wang understood every word of your answer, but he understood enough to pour tea instead of advice. Sometimes that is the highest level of fluency.";
      }
      return "Uncle Wang's table becomes one of the places you think of when people ask what Shanghai felt like after the postcards faded: smoke, jokes, traffic, and a plastic stool that somehow felt like a throne.";
   }

   if (name === "Manager Zhang") {
      if (flags.manager_zhang_referral_ready) {
         return "Manager Zhang's referral comes with conditions, paperwork, and a badge that takes three attempts to print correctly. When the return offer arrives months later, he only sends one message: 'Told you usefulness beats decoration.' It sounds cold until you realize it is his version of cheering.";
      }
      if (flags.manager_zhang_boundaries_accepted) {
         return "Manager Zhang's lesson about boundaries becomes part of how you read every opportunity after Minghai: relationship first, shortcut never. It saves you from at least one shiny disaster later.";
      }
      return "Manager Zhang leaves you with a professional skill no resume line can fully explain: how to stay useful when a cross-cultural room gets confusing and everyone pretends it is not.";
   }

   if (name === "Xiao Chen") {
      if (flags.xiao_chen_demo_day) {
         return "Xiao Chen still argues too fast, but now he brings data before excitement. After demo day, the angel investor's WeChat message lands at 11:46 p.m.: a first check, three months of runway, and one sentence that makes both of you scream quietly in the dorm hallway.";
      }
      if (flags.xiao_chen_responsible_pace) {
         return "You and Xiao Chen never fully agree about speed, but the first time a stranger says the service saved their week, even he goes quiet. A service people trust beats a pitch people applaud.";
      }
      if (flags.city_speed_over_care) {
         return "The messy launch with Xiao Chen becomes one of your sharpest lessons: Shanghai rewards motion, but it keeps receipts. The city lets you sprint, then makes you read the invoice.";
      }
      return "Xiao Chen makes Shanghai feel like a city of prototypes: unfinished, risky, neon-lit, and hard to stop thinking about once it gets into your bloodstream.";
   }

   if (name === "Family") {
      if (friendship >= 10) {
         return "Your family does not understand every detail of Minghai life, but they learn the rhythm of your check-ins: short messages, strange photos, and one airport hug that lasts long enough to say everything nobody translated properly.";
      }
      return "Home becomes quieter in your story, but it never disappears. It waits at the edge of every departure gate.";
   }

   if (romance >= 20) {
      return `${name} remains part of the story in a tender, unfinished way: a message thread, a song, a route through campus you still avoid for no practical reason. Not every important connection needs to become a destination.`;
   }
   if (friendship >= 15) {
      return `${name} remains in your WeChat contacts, no longer just a name from one semester but a witness to the version of you China forced into the open.`;
   }
   return "";
}

function getPersonalReflection(flags) {
   const major = flags.major_business
      ? "Business and Management"
      : flags.major_stem
        ? "Engineering and Computing"
        : flags.major_humanities
          ? "Humanities and China Studies"
          : null;

   if (flags.motive_curiosity) {
      return `You came because China felt like a question written in lights across a map. By the end, ${major ? major + " is no longer just a major, and " : ""}the question has teeth, names, subway lines, and a reason to keep answering.`;
   }
   if (flags.motive_scholarship) {
      return `You came with a practical calculation, and the calculation was real. What surprised you was the part no spreadsheet predicted: the year became expensive in courage, not just money.`;
   }
   if (flags.motive_restart) {
      return `You came looking for a restart. China did not erase the old version of you; it put that version under Shanghai lights and made it fight for an upgrade.`;
   }
   if (flags.motive_degree) {
      return `You came for a degree, and you earned one kind of education on paper. The other kind does not fit in a transcript, which is exactly why it follows you home.`;
   }
   return "";
}

function ChoicePreview({ effects }) {
   if (!effects) return null;

   const previews = [];
   const statNames = {
       digitalProficiency: "Digital",
       academics: "Academics",
       chinese: "Chinese",
       energy: "Energy",
       culture: "Culture",
       wealth: "Wealth"
   };

   if (effects.stats) {
       Object.entries(effects.stats).forEach(([k, v]) => {
          const color = v > 0 ? "text-emerald-400" : "text-red-400";
          const sign = v > 0 ? "+" : "";
          const name = statNames[k] || (k.charAt(0).toUpperCase() + k.slice(1));
          previews.push(<span key={k} className={`${color} font-mono text-xs uppercase tracking-wider`}>{name} {sign}{v}</span>);
       });
   }
   const guanxiNames = {
       admin: "Admin",
       professors: "Professors",
       localStudents: "Locals",
       intlStudents: "Intl"
   };

   if (effects.guanxi) {
       Object.entries(effects.guanxi).forEach(([k, v]) => {
           const gSign = v > 0 ? "+" : "";
           previews.push(<span key={`guanxi_${k}`} className={`text-amber-400 font-mono text-xs uppercase tracking-wider`}>Network({guanxiNames[k] || k}) {gSign}{v}</span>);
       });
   }
   if (effects.flags && Object.keys(effects.flags).length > 0) {
       previews.push(<span key="story_updated" className="text-blue-400 font-mono text-xs uppercase tracking-wider">Story Updated</span>);
   }

   if (effects.relationships) {
        Object.entries(effects.relationships).forEach(([char, changes]) => {
           Object.entries(changes).forEach(([type, v]) => {
               const color = v > 0 ? (type === 'romance' ? "text-pink-400" : "text-blue-400") : "text-red-400";
               const sign = v > 0 ? "+" : "";
               const emoji = type === 'romance' ? "💖 " : "🤝 ";
               const label = type === 'romance' ? "Closeness" : "Bond";
               previews.push(<span key={`${char}-${type}`} className={`${color} font-mono text-xs uppercase tracking-wider`}>{emoji}{char} {label} {sign}{v}</span>);
           });
        });
   }

   if (previews.length === 0) return null;

   return (
       <div className="flex flex-wrap gap-2 mt-1.5 opacity-60 group-hover:opacity-100 transition-opacity">
           {previews}
       </div>
   )
}

function MiniGameOverlay({ gameId, onComplete }) {

// 1. Bargain Market Game
function BargainMarketGame({ onComplete }) {
    const [bossOffer, setBossOffer] = useState(800);
    const [anger, setAnger] = useState(0);
    const [turn, setTurn] = useState(1);
    
    const handleCounter = () => {
        const newOffer = Math.floor(bossOffer * 0.75); // Reduce price by 25%
        const angerInc = Math.floor(Math.random() * 20) + 15; // Random anger 15-35
        setBossOffer(newOffer);
        setAnger(a => a + angerInc);
        setTurn(t => t + 1);
    };

    const handleCompliment = () => {
        setAnger(a => Math.max(0, a - 30));
        setBossOffer(Math.floor(bossOffer * 1.05)); // Boss feels confident, price goes up slightly
        setTurn(t => t + 1);
    };

    const handleWalkAway = () => {
        if (anger < 50 && turn > 2) {
            // Boss caves
            onComplete({ win: true, cost: Math.floor(bossOffer * 0.5), message: '"Wait! Come back! Special price for you."' });
        } else {
            onComplete({ win: false, cost: bossOffer, message: '"Leave then! I don\'t need your business!" Boss refuses to sell.' });
        }
    };

    const handleAccept = () => {
        onComplete({ win: true, cost: bossOffer, message: `You bought it for ¥${bossOffer}.`});
    }

    useEffect(() => {
        if (anger >= 100) {
            onComplete({ win: false, cost: bossOffer, message: '"Get out of my shop!" Boss kicked you out.' });
        }
    }, [anger]);

    return (
        <div className="text-center p-4">
            <h3 className="text-2xl font-bold text-amber-400 mb-2">Fake Market Haggling</h3>
            <p className="text-sm text-slate-400 mb-6">Convince the boss to lower the price, but don't make him too angry!</p>
            
            <div className="bg-slate-800 rounded-xl p-8 mb-6 border border-slate-700">
                <div className="text-6xl font-black text-emerald-400 mb-2">¥{bossOffer}</div>
                <div className="text-slate-500 font-mono text-sm">Boss's Current Offer</div>
            </div>

            <div className="mb-6">
                <div className="flex justify-between text-xs text-slate-400 font-bold mb-1">
                    <span>Boss Anger Meter</span>
                    <span className={anger > 80 ? "text-red-400" : ""}>{anger}%</span>
                </div>
                <div className="w-full bg-slate-800 rounded-full h-3">
                    <div className={`h-full rounded-full transition-all duration-300 ${anger > 80 ? 'bg-red-500' : 'bg-orange-500'}`} style={{width: `${Math.min(100, anger)}%`}}></div>
                </div>
            </div>

            <div className="grid grid-cols-2 gap-4">
                <button onClick={handleCounter} className="bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 rounded-lg border border-rose-400 transition-colors">
                   Counter-Offer (-25%)
                </button>
                <button onClick={handleCompliment} className="bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-lg border border-sky-400 transition-colors">
                   Compliment Boss (Reduce Anger)
                </button>
                <button onClick={handleWalkAway} className="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg transition-colors">
                   Fake Walk Away
                </button>
                <button onClick={handleAccept} className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg border border-emerald-400 transition-colors">
                   Accept Price
                </button>
            </div>
        </div>
    );
}

// 2. Subway Squeeze Game
function SubwaySqueezeGame({ onComplete }) {
    const [progress, setProgress] = useState(0);
    const [direction, setDirection] = useState(1);
    const [squeezes, setSqueezes] = useState(0);

    useEffect(() => {
        const interval = setInterval(() => {
            setProgress(prev => {
                let next = prev + (direction * 4);
                if (next > 100) { next = 100; setDirection(-1); }
                if (next < 0) { next = 0; setDirection(1); }
                return next;
            });
        }, 16);
        return () => clearInterval(interval);
    }, [direction]);

    const handleSqueeze = () => {
        // Target area is 40% to 60%
        if (progress >= 35 && progress <= 65) {
            setSqueezes(s => s + 1);
            if (squeezes + 1 >= 3) {

function DeliveryTyperGame({ onComplete }) {
    const vocab = [

        { ch: "南门 (Nánmén)", en: "South Gate" },
        { ch: "放门口 (Fàng ménkǒu)", en: "Leave at door" },
        { ch: "快点 (Kuàidiǎn)", en: "Hurry up" },
        { ch: "没筷子 (Méi kuàizi)", en: "No chopsticks" }
    ];
    
    const [currentWord, setCurrentWord] = useState(vocab[0]);
    const [options, setOptions] = useState([]);
    const [score, setScore] = useState(0);
    const [timeLeft, setTimeLeft] = useState(15);

    useEffect(() => {
        nextWord();
        const timer = setInterval(() => {
            setTimeLeft(t => {
                if (t <= 1) {
                    clearInterval(timer);
                    onComplete({ win: false, message: "The delivery guy left with your food!" });
                    return 0;
                }
                return t - 1;
            });
        }, 1000);
        return () => clearInterval(timer);
    }, []);

    useEffect(() => {
        if (score >= 5) {
            onComplete({ win: true, message: "You successfully communicated your location!" });
        }
    }, [score]);

    const nextWord = () => {
        const word = vocab[Math.floor(Math.random() * vocab.length)];
        setCurrentWord(word);
        
        // Pick 3 random english words + the correct one
        let newOptions = [word.en];
        while (newOptions.length < 4) {
            const random = vocab[Math.floor(Math.random() * vocab.length)].en;
            if (!newOptions.includes(random)) newOptions.push(random);
        }
        setOptions(newOptions.sort(() => Math.random() - 0.5));
    };

    const handlePick = (en) => {
        if (en === currentWord.en) {
            setScore(s => s + 1);
            nextWord();
        } else {
            setTimeLeft(t => Math.max(0, t - 3)); // 3 second penalty
        }
    };

    return (
        <div className="text-center p-4 h-80 flex flex-col justify-center items-center relative">
            <div className="absolute top-4 right-4 text-xl font-mono text-amber-400">⏱️ {timeLeft}s</div>

                {currentWord?.ch}

            <div className="grid grid-cols-2 gap-4 w-full max-w-md">
                {options.map((opt, i) => (
                    <button key={i} onClick={() => handlePick(opt)} className="bg-slate-700 hover:bg-sky-600 text-white text-lg font-bold py-4 rounded-xl transition-colors">
                        {opt}
                    </button>
                ))}
            </div>
        </div>
    );
}

// 4. Tonal Rhythm Game
function TonalRhythmGame({ onComplete }) {
    const [notes, setNotes] = useState([]);
    const [score, setScore] = useState(0);
    const targetY = 250; // The hit line

    useEffect(() => {
        let spawnInterval = setInterval(() => {
            setNotes(prev => [...prev, { id: Date.now(), y: 0, tone: Math.floor(Math.random() * 4) + 1 }]);
        }, 1000);

        let moveInterval = setInterval(() => {
            setNotes(prev => {
                let activeNotes = prev.map(n => ({...n, y: n.y + 4}));
                // Check if missed
                if (activeNotes.some(n => n.y > targetY + 30)) {
                    // Missed one
                    setScore(s => s - 2);
                }
                return activeNotes.filter(n => n.y <= targetY + 30);
            });
        }, 30);

        return () => { clearInterval(spawnInterval); clearInterval(moveInterval); }
    }, []);

    useEffect(() => {
        if (score >= 10) onComplete({ win: true, message: "Perfect Pronunciation!" });
        if (score <= -6) onComplete({ win: false, message: "The teacher frowned in confusion." });
    }, [score]);

    const handleHit = (tone) => {
        setNotes(prev => {
            // Find note in target zone
            const hitIndex = prev.findIndex(n => Math.abs(n.y - targetY) < 30 && n.tone === tone);
            if (hitIndex !== -1) {
                setScore(s => s + 2);
                return prev.filter((_, i) => i !== hitIndex);
            } else {
                setScore(s => s - 1); // Wrong key or mistiming
                return prev;
            }
        });
    };

    return (
        <div className="p-4 h-96 relative flex flex-col pt-8">
            <div className="absolute top-4 right-4 text-xl font-mono text-emerald-400">Score: {score}/10</div>
            <h3 className="text-2xl font-bold text-indigo-400 text-center mb-4">Tone Matching</h3>
            
            <div className="flex-1 border bg-slate-900 border-slate-700 relative overflow-hidden rounded-t-xl mx-8 shadow-inner">
                {/* Hit Line */}
                <div className="absolute w-full h-1 bg-amber-500/80 shadow-[0_0_10px_orange]" style={{top: targetY}}></div>
                
                {/* Notes */}
                {notes.map(note => (
                    <div key={note.id} className="absolute text-center font-black rounded-full" 
                         style={{top: note.y, left: `${(note.tone - 1) * 25}%`, width: '25%'}}>
                        <div className="inline-flex justify-center items-center w-10 h-10 bg-slate-100 text-indigo-600 rounded-lg shadow-lg border-b-4 border-slate-400">
                           {note.tone === 1 && "—"}
                           {note.tone === 2 && "／"}
                           {note.tone === 3 && "V"}
                           {note.tone === 4 && "＼"}
                        </div>
                    </div>
                ))}
            </div>
            
            <div className="flex h-20 mx-8 gap-2 mt-2">
                {[1, 2, 3, 4].map(t => (
                    <button key={t} onClick={() => handleHit(t)} className="flex-1 bg-slate-800 hover:bg-indigo-600 text-white font-bold rounded-b-xl border-t border-slate-600 active:bg-indigo-400 transition-colors">
                        Tone {t}
                    </button>
                ))}
            </div>
            <p className="text-center text-slate-500 text-xs mt-2">Click the buttons when the tones hit the orange line.</p>
        </div>
    );
}

    const playTurn = (trust, i, msg) => {

function HongbaoSnatchGame({ onComplete }) {
    const [pos, setPos] = useState(null);
    const [waiting, setWaiting] = useState(true);

    const completedRef = useRef(false);

    useEffect(() => {
        // Wait random time between 1 and 3 seconds
        const waitTime = Math.random() * 2000 + 1000;
        const wTimer = setTimeout(() => {
            setWaiting(false);
            setPos({ 
                top: `${Math.floor(Math.random() * 60) + 10}%`, 
                left: `${Math.floor(Math.random() * 60) + 10}%` 
            });
            
            // Disappear after 1 second
            failTimerRef.current = setTimeout(() => {
                if (!completedRef.current) {
                    completedRef.current = true;
                    onComplete({ win: false, message: "A step too late. The envelope is empty." });
                }
            }, 1000);

        }, waitTime);

        return () => {
            clearTimeout(wTimer);
            if (failTimerRef.current) clearTimeout(failTimerRef.current);
        };
    }, []);

    const handleClick = () => {
        if (!waiting && !completedRef.current) {
            completedRef.current = true;
            if (failTimerRef.current) clearTimeout(failTimerRef.current);
            onComplete({ win: true, message: "You snatched ¥100 from the group chat!" });

    } else if (state.phase === "In-China" && !flags.decision_e3_internship && state.turn < 32) {

        questDesc = "Turn your China experience toward research, career, local integration, student support, or city opportunity.";

        questTitle = "Finish the Year";
        questDesc = "Bring your studies, relationships, and future direction into the final review.";
    } else if (state.turn >= 32) {
        questTitle = "Epilogue";
        questDesc = "Your journey is coming to an end.";
    }

        <div className="absolute top-14 left-4 z-40 bg-slate-900/80 border border-slate-700/50 backdrop-blur-md p-3 rounded-lg shadow-[0_4px_20px_rgba(0,0,0,0.5)] w-64 pointer-events-none transition-all duration-300">

};

const cloneStateForSummary = (state) => JSON.parse(JSON.stringify(state || {}));

const getSummaryDelta = (beforeState, afterState, key, label, tone = "slate") => {
    const beforeValue = beforeState?.stats?.[key] ?? 0;
    const afterValue = afterState?.stats?.[key] ?? 0;
    const delta = afterValue - beforeValue;
    return {
        key,
        label,
        beforeValue,
        afterValue,
        delta,
        tone
    };
};

const buildWeekTransition = (beforeState, state, nextNode) => {
    const milestoneTitles = {
        pre_departure_start: "Pre-Departure Begins",
        in_china_start: "Arrival in China",
        epoch3_midterm: "Midterm Week",
        epoch3_internship: "Future Direction Week",
        epoch3_final: "Year-End Review",
        forced_recovery_week: "Forced Recovery",
        money_crisis: "Financial Emergency",
        game_over_wealth: "Out of Money"
    };

    const phaseCopy = {
        Application: "Application work continues: documents, decisions, and the future taking shape one deadline at a time.",
        "Pre-Departure": "Departure preparation continues: visa details, digital setup, packing, and the emotional weight of leaving.",
        "In-China": "Campus life moves forward: classes, relationships, city routines, and the version of you Minghai is shaping."
    };

    const specialCopy = {
        forced_recovery_week: "Your energy has hit zero. The next scene pauses the normal plan so you can recover before the year breaks you.",
        money_crisis: "Your funds have run out. The next scene gives you one chance to find emergency support.",
        game_over_wealth: "There is no emergency option left. The next scene closes the route.",
        pre_departure_start: "The application is no longer an idea. Now you have an offer to decode and a departure to prepare.",
        in_china_start: "The plane has landed. Shanghai is no longer research, screenshots, or imagination.",
        epoch3_midterm: "The semester reaches its first serious checkpoint. Your habits are about to show their receipts.",
        epoch3_internship: "The year opens toward what comes next: research, work, service, community, or a bigger city gamble.",
        epoch3_final: "Everything you built this year is ready to become an ending."
    };

    return {
        previousWeek: beforeState.turn,
        week: state.turn,
        phase: state.phase,
        title: milestoneTitles[nextNode] || `Week ${state.turn}`,
        body: specialCopy[nextNode] || phaseCopy[state.phase] || "A new week begins.",

};

const getSceneBgmId = (state, node, screenMode) => {
    if (screenMode !== "game") return "title";

    const phase = state?.phase || "Application";
    const nodeId = state?.currentNodeId || "";
    const speaker = node?.speaker || "";
    const location = node?.location || "";
    const text = node?.text || "";
    const context = `${nodeId} ${speaker} ${location} ${text}`;

    if (/Out of Money|Financial Emergency|money crisis|ending_out_of_money|quiet return|game_over_wealth/i.test(context)) {
        return "crisisMoney";
    }
    if (/ending_/i.test(nodeId)) {
        if (/out_of_money|quiet|failed|bad/i.test(nodeId)) return "quietEnding";
        return "goodEnding";
    }
    if (/Xiao Chen|incubator|demo|prototype|startup|angel/i.test(context)) return "startupDemo";
    if (/Manager Zhang|Career Office|internship|office badge|return offer|alumni dinner/i.test(context)) return "careerOffice";
    if (/Uncle Wang|Neighbor Li|BBQ|barbecue|skewer|festival|neighborhood/i.test(context)) return "localLife";
    if (/Sophie|International Student|support circle|common room|orientation/i.test(context)) return "socialWarm";
    if (/Professor Lin|Dr\\. Mei|Library|research|classroom|midterm|academic|office hours/i.test(context)) return "studyLibrary";
    if (/Bund|Metro|Line 2|Lujiazui|Shanghai city|Fuxing|nightlife|city/i.test(context)) return "shanghaiCity";

    if (phase === "Application") {
        if (/deadline|interview|submit|feedback|decision|result/i.test(context)) return "applicationPressure";
        return "applicationLateNight";
    }
    if (phase === "Pre-Departure") {
        if (/JW202|visa|document|admission package|paperwork/i.test(context)) return "documentsAdmin";
        if (/flight|boarding|airplane|arrival|Pudong/i.test(context)) return "flightArrival";
        return "predepartureHome";
    }
    if (phase === "In-China" && !state?.flags?.arrived_in_china) {
        return "flightArrival";
    }

    return "campusDaily";
};

                                <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/10 to-transparent"></div>
                                <div className="absolute bottom-4 left-4 right-4 grid grid-cols-3 gap-3 text-xs">
                                    <div>

                                    className="w-full rounded-xl border border-fuchsia-300/35 bg-fuchsia-300/10 px-5 py-4 text-left font-black text-fuchsia-50 transition hover:-translate-y-0.5 hover:bg-fuchsia-300/18"
                                >
                                    CG Gallery
                                    <span className="block text-xs font-semibold uppercase tracking-[0.18em] text-fuchsia-100/75">View memory unlocks from your save</span>
                                </button>

                            {titleMessage && (
                                <div className="mt-4 rounded-2xl border border-amber-200/30 bg-amber-200/10 px-4 py-3 text-sm text-amber-100">
                                    {titleMessage}
                                </div>
                            )}
                            <div className="mt-5 text-[11px] leading-relaxed text-slate-500">
