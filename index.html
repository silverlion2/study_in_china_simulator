  <style>
    /* Prevent scroll bouncing and fill window exactly */
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body { overflow: hidden; background: #0f172a; color: white; font-family: sans-serif; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .ending-scrollbar { scrollbar-width: thin; scrollbar-color: rgba(148, 163, 184, 0.45) rgba(15, 23, 42, 0.55); }
    .ending-scrollbar::-webkit-scrollbar { width: 10px; }
    .ending-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.55); border-radius: 999px; }
    .ending-scrollbar::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.45); border-radius: 999px; border: 2px solid rgba(15, 23, 42, 0.85); }
  </style>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    
/* --- engine/GameState.js --- */
// Pure vanilla JS State Manager. No dependencies. Portable everywhere.

const INITIAL_STATS = {
  academics: 10,
  chinese: 10,
  wealth: 5000, // RMB
  energy: 100, // Max 100
  digitalProficiency: 5,
  culture: 0, // Cultural Integration
};

const CAPPED_STATS = new Set([
  'academics',
  'chinese',
  'energy',
  'digitalProficiency',
  'culture'
]);

const clampStat = (key, value) => {
  if (value < 0) return 0;
  if (CAPPED_STATS.has(key) && value > 100) return 100;
  return value;
};

const INITIAL_STATE = {
  currentNodeId: "start",
  turn: 1, // 1 turn = 1 week
  phase: "Application", // "Application", "Pre-Departure", "In-China"
  location: "Home Country", // The city the player is currently in
  stats: { ...INITIAL_STATS },
  guanxi: {
    admin: 0,
    localStudents: 0,
    intlStudents: 0,
    professors: 0
  },
  inventory: [],
  flags: {}, // For story tracking, e.g. { "got_vpn": true }
  
  relationships: {},

  weeklyActions: {
    weekday: 3,
    weekend: 1
  },

  routeCommitments: {
    academic: 0,
    career: 0,
    local: 0,
    intl: 0,
    city: 0,
    survival: 0
  },

  lifeChecks: {
    last: null,
    history: []
  },

  metaProgress: {
    completedRuns: 0,
    endingsSeen: {},
    rememberedChecks: []
  },

  // New Economy System
  jobs: {
    hasJob: false,
    jobId: null,
    weeklyIncome: 0,
    energyCost: 0
  },
  transactions: [
    { week: 1, amount: 5000, desc: "Initial Funds", type: "income" }
  ],
  items: {
    ebike: false,
    headphones: false,
    beddingSet: false,
    deskLamp: false,
    phraseCards: false,
    cityDataPack: false
  }
};

const NODE_UNLOCK_FLAGS = {
  money_crisis: ['money_crisis_seen'],
  game_over_wealth: ['money_crisis_seen', 'ending_out_of_money'],
  ending_scholar: ['ending_scholar'],
  ending_researcher: ['ending_researcher'],
  ending_entrepreneur: ['ending_entrepreneur'],
  ending_diplomat: ['ending_diplomat', 'ending_return_offer'],
  ending_influencer: ['ending_influencer'],
  ending_local_insider: ['ending_local_insider'],
  ending_hsk_master: ['ending_hsk_master', 'language_breakthrough'],
  ending_quiet_return: ['ending_quiet_return'],
  ending_compliance_scare: ['ending_compliance_scare'],
  ending_career_shortcut: ['ending_career_shortcut'],
  ending_unreliable_builder: ['ending_unreliable_builder'],
  ending_deportee: ['ending_deportee'],
  ending_academic_probation: ['ending_academic_probation'],
  e3_w18_lin_yue_intro: ['met_lin_yue', 'lin_yue_role_known', 'wechat_lin_yue_added'],
  event_contact_lin_yue_talk_1: ['contact_lin_yue_talk_1'],
  event_request_lin_yue_presentation: ['request_lin_yue_presentation'],
  event_lin_yue_library_presentation: ['lin_yue_presentation_partner'],
  event_lin_yue_boundary_tension: ['lin_yue_midterm_tension_resolved'],
  event_lin_yue_family_pressure: ['lin_yue_family_pressure'],
  event_lin_yue_riverside_walk: ['lin_yue_riverside_walk']
};

const LIFE_CHECK_PREP_CARDS = [
  {
    id: 'calendar_focus',
    title: 'Pinned Calendar',
    tags: ['admin', 'academic', 'career', 'arrival'],
    bonus: 2,
    isActive: (state) => Boolean(state.flags?.calendar_focus)
  },
  {
    id: 'calendar_admin_prepped',
    title: 'Admin Checklist',
    tags: ['admin', 'visa', 'registration'],
    bonus: 3,
    isActive: (state) => Boolean(state.flags?.calendar_admin_prepped || state.flags?.calendar_application_prepped)
  },
  {
    id: 'professor_notes',
    title: 'Professor Notes',
    tags: ['academic', 'explanation'],
    bonus: 3,
    isActive: (state) => Boolean(state.flags?.contact_professor_lin_talk_1 || state.flags?.lin_academic_method)
  },
  {
    id: 'field_note_care',
    title: 'Field-Note Care',
    tags: ['academic', 'research'],
    bonus: 3,
    isActive: (state) => Boolean(state.flags?.dr_mei_field_note_care || state.flags?.contact_dr_mei_talk_1)
  },
  {
    id: 'sophie_arrival_guide',
    title: 'Arrival Guide Draft',
    tags: ['arrival', 'social', 'intl'],
    bonus: 3,
    isActive: (state) => Boolean(state.flags?.sophie_arrival_helper || state.flags?.sophie_orientation_committee)
  },
  {
    id: 'manager_feedback',
    title: 'Evidence Feedback',
    tags: ['career', 'interview'],
    bonus: 3,
    isActive: (state) => Boolean(state.flags?.manager_zhang_evidence_answer || state.flags?.manager_zhang_usefulness_frame)
  },
  {
    id: 'neighbor_rules',
    title: 'Unwritten Dorm Rules',
    tags: ['local', 'delivery', 'housing'],
    bonus: 3,
    isActive: (state) => Boolean(state.flags?.neighbor_li_parcel_mediator || state.flags?.contact_neighbor_li_talk_1)
  },
  {
    id: 'uncle_wang_bridge',
    title: 'Order Bridge',
    tags: ['local', 'language', 'social'],
    bonus: 3,
    isActive: (state) => Boolean(state.flags?.uncle_wang_order_bridge || state.flags?.contact_uncle_wang_talk_1)
  },
  {
    id: 'phrase_cards',
    title: 'Phrase Cards',
    tags: ['language', 'arrival', 'local'],
    bonus: 2,
    isActive: (state) => Boolean(state.items?.phraseCards)
  },
  {
    id: 'city_data_pack',
    title: 'City Data Pack',
    tags: ['digital', 'arrival', 'delivery'],
    bonus: 2,
    isActive: (state) => Boolean(state.items?.cityDataPack)
  },
  {
    id: 'wechat_repair',
    title: 'WeChat Repair Habit',
    tags: ['social', 'career', 'local', 'academic'],
    bonus: 1,
    isActive: (state) => Boolean(state.flags?.wechat_repair_messages_sent || state.flags?.sent_wechat_ping_this_week)
  },
  {
    id: 'second_run_memory',
    title: 'Previous Run Memory',
    tags: ['admin', 'visa', 'registration', 'academic', 'career', 'local', 'social', 'intl', 'survival'],
    bonus: 1,
    isActive: (state) => Boolean(state.flags?.second_run_memory)
  }
];

class EngineState {
  constructor() {
    this.state = JSON.parse(JSON.stringify(INITIAL_STATE));
    this.listeners = [];
  }

  // Subscribe to state changes (React will use this)
  subscribe(listener) {
    this.listeners.push(listener);
    return () => {
      this.listeners = this.listeners.filter(l => l !== listener);
    };
  }

  // Notify listeners
  notify() {
    for (const listener of this.listeners) {
      listener(this.state);
    }
  }

  // Get current state
  getState() {
    return this.state;
  }

  addMagnet(magnet) {
    if (!this.state.inventory) this.state.inventory = [];
    const exists = this.state.inventory.find(m => m.name === magnet.name);
    if (!exists) {
      this.state.inventory.push(magnet);
      this.notify();
    }
  }

  addTransaction(amount, desc) {
    this.state.transactions.push({
      week: this.state.turn,
      amount: amount,
      desc: desc,
      type: amount >= 0 ? "income" : "expense"
    });
    this.state.stats.wealth += amount;
    if (this.state.stats.wealth < 0) this.state.stats.wealth = 0;
  }

  applyStatDelta(statChanges = {}) {
    for (const [key, value] of Object.entries(statChanges)) {
      const statKey = key === 'sanity' ? 'energy' : key;
      if (statKey === 'wealth') {
        this.addTransaction(value, value > 0 ? "Misc Income" : "Misc Expense");
      } else if (this.state.stats[statKey] !== undefined) {
        this.state.stats[statKey] = clampStat(statKey, this.state.stats[statKey] + value);
      }
    }
  }

  setJob(jobId, income, energyCost) {
    if (jobId === null) {
      this.state.jobs = { hasJob: false, jobId: null, weeklyIncome: 0, energyCost: 0 };
    } else {
      this.state.jobs = { hasJob: true, jobId, weeklyIncome: income, energyCost };
    }
    this.notify();
  }

  purchaseItem(itemId, cost, label = null, effects = {}) {
    if (this.state.stats.wealth >= cost && !this.state.items[itemId]) {
      this.addTransaction(-cost, label || `Purchased ${itemId}`);
      this.state.items[itemId] = true;
      this.state.flags.first_taobao_used = true;
      this.state.flags[`taobao_item_${itemId}`] = true;
      if (effects.stats) this.applyStatDelta(effects.stats);
      if (effects.flags) {
        for (const [flag, value] of Object.entries(effects.flags)) {
          this.state.flags[flag] = value;
        }
      }
      this.notify();
      return true;
    }
    return false;
  }

  useDidiRide(rideId) {
    const rideOptions = {
      standard: {
        cost: 45,
        label: "DiDi Ride: Campus Errand",
        stats: { energy: 8, digitalProficiency: 1 },
        message: "The short ride buys back enough energy to make the next task feel possible."
      },
      comfort: {
        cost: 88,
        label: "DiDi Ride: Cross-Town Shortcut",
        stats: { energy: 14, digitalProficiency: 2, culture: 1 },
        message: "The shortcut is expensive, but Shanghai feels smaller for one afternoon."
      },
      airport: {
        cost: 160,
        label: "DiDi Ride: Airport Transfer Practice",
        stats: { energy: 20, digitalProficiency: 3, culture: 2 },
        message: "You rehearse the pickup-zone logic before a real travel day can punish you for improvising."
      }
    };

    const ride = rideOptions[rideId];
    if (!ride || this.state.phase !== "In-China") {
      return { ok: false, message: "DiDi becomes active after arrival in Shanghai." };
    }
    if (this.state.flags.used_didi_this_week) {
      return { ok: false, message: "You already used DiDi this week." };
    }
    const airportGateActive = Boolean(this.state.flags.airport_didi_required && rideId === "airport");
    if (this.state.stats.wealth < ride.cost && !airportGateActive) {
      return { ok: false, message: "Not enough RMB for this ride." };
    }

    this.addTransaction(-ride.cost, ride.label);
    const stats = { ...ride.stats };
    if (airportGateActive && this.state.flags.didi_airport_mode === "pressure") {
      stats.energy = (stats.energy || 0) - 12;
      stats.digitalProficiency = (stats.digitalProficiency || 0) + 3;
    }
    if (!this.state.items.cityDataPack && !this.state.flags.didi_pickup_zone_lesson) {
      stats.energy = Math.max(0, (stats.energy || 0) - 4);
      this.state.flags.didi_pickup_friction = true;
      this.state.flags.didi_pickup_friction_ready = true;
    }
    this.applyStatDelta(stats);
    this.state.flags.used_didi_this_week = true;
    this.state.flags.first_didi_used = true;
    this.state.flags[`didi_${rideId}_used`] = true;
    if (airportGateActive) {
      this.state.flags.airport_didi_required = false;
      this.state.flags.airport_didi_confirmed = true;
      this.state.flags.didi_pickup_zone_lesson = true;
      this.state.flags.route_shared_to_minghai_chat = true;
      this.state.flags.decision_e3_transport = this.state.flags.didi_airport_mode === "pressure"
        ? "Airport DiDi setup in SimPad"
        : "Prepared DiDi from Pudong via SimPad";
      this.state.currentNodeId = "didi_pickup_lesson";
    }
    this.notify();
    const friction = this.state.flags.didi_pickup_friction_ready ? " The pickup point costs extra focus because your city app setup is still thin." : "";
    const storyProgress = airportGateActive ? " Story advanced to the pickup-zone lesson." : "";
    return { ok: true, message: `${ride.message}${friction}${storyProgress}` };
  }

  useTaobaoServiceOrder(orderId) {
    const orderOptions = {
      dormFix: {
        cost: 65,
        label: "Taobao: Same-Day Dorm Fix",
        stats: { energy: 4, digitalProficiency: 1 },
        message: "The courier finds your dorm after two location pins and one awkward phone call. Your room is slightly more livable tonight."
      },
      wrongAddress: {
        cost: 35,
        label: "Taobao: Wrong-Address Recovery",
        stats: { digitalProficiency: 3, culture: 1, energy: -1 },
        message: "You untangle a delivery problem through screenshots, polite voice notes, and one very patient courier."
      },
      mealPrep: {
        cost: 120,
        label: "Taobao: Meal Prep Box",
        stats: { energy: 6, digitalProficiency: 1 },
        message: "Not glamorous, but future-you is grateful when dinner does not require another decision."
      }
    };

    const order = orderOptions[orderId];
    if (!order || this.state.phase !== "In-China") {
      return { ok: false, message: "Taobao service orders unlock after arrival in China." };
    }
    if (this.state.flags.used_taobao_service_this_week) {
      return { ok: false, message: "You already handled one service order this week." };
    }
    if (this.state.stats.wealth < order.cost) {
      return { ok: false, message: "Not enough RMB for this order." };
    }

    this.addTransaction(-order.cost, order.label);
    this.applyStatDelta(order.stats);
    this.state.flags.used_taobao_service_this_week = true;
    this.state.flags.first_taobao_used = true;
    this.state.flags[`taobao_service_${orderId}`] = true;
    if (orderId === "wrongAddress") this.state.flags.taobao_wrong_address_recovery_used = true;
    if (orderId === "mealPrep") this.state.flags.taobao_meal_prep_buffer = true;
    if (orderId === "dormFix") this.state.flags.taobao_dorm_fix_used = true;
    this.notify();
    return { ok: true, message: order.message };
  }

  sendWeChatCheckIn(character) {
    if (!character) return false;
    if (this.state.flags.sent_wechat_ping_this_week && !this.state.flags.wechat_simpad_required) return false;
    if (!this.state.relationships?.[character]) return false;

    this.state.relationships[character].friendship = Math.min(100, (this.state.relationships[character].friendship || 0) + 2);
    this.applyStatDelta({ energy: -2, chinese: 1 });
    this.state.flags.sent_wechat_ping_this_week = true;
    this.state.flags.wechat_silence_weeks = 0;
    this.state.flags[`wechat_ping_${character.replace(/\s+/g, '_').toLowerCase()}`] = true;
    this.addTransaction(0, `WeChat check-in: ${character}`);
    this.notify();
    return true;
  }

  pinCalendarFocus(title) {
    if (!title) return { ok: false, message: "No calendar item selected." };
    this.state.flags.calendar_focus = title;
    this.state.flags.calendar_focus_pinned_week = this.state.turn;
    this.state.flags.calendar_focus_used_this_week = true;
    this.addTransaction(0, `Calendar pinned: ${title}`);
    this.notify();
    return { ok: true, message: `Pinned: ${title}. The next weekly transition will respect this focus.` };
  }

  applyCalendarFocusOutcome() {
    const focus = this.state.flags.calendar_focus || "";
    if (!focus || this.state.flags.calendar_focus_last_applied_week === this.state.turn) return;

    const lower = focus.toLowerCase();
    let stats = null;
    let flag = null;
    let message = null;

    if (lower.includes("application")) {
      stats = { academics: 3, energy: -1 };
      flag = "calendar_application_prepped";
      message = "Calendar prep converts application panic into a cleaner checklist.";
    } else if (lower.includes("statement")) {
      stats = { academics: 3, digitalProficiency: 1, energy: -1 };
      flag = "calendar_statement_prepped";
      message = "Pinned statement time makes the draft less foggy.";
    } else if (lower.includes("funding")) {
      stats = { digitalProficiency: 2, energy: -1 };
      flag = "calendar_funding_prepped";
      message = "Budget prep catches one future expense before it bites.";
    } else if (lower.includes("visa") || lower.includes("registration")) {
      stats = { digitalProficiency: 2, culture: 1 };
      flag = "calendar_admin_prepped";
      message = "Admin prep turns one office visit from panic into sequence.";
    } else if (lower.includes("digital")) {
      stats = { digitalProficiency: 3 };
      flag = "calendar_digital_prepped";
      message = "Digital prep makes the phone feel more like a tool and less like a trap.";
    } else if (lower.includes("midterm")) {
      stats = { academics: 4, energy: -2 };
      flag = "calendar_midterm_prepped";
      message = "Midterm prep pays off before the library becomes a battlefield.";
    } else if (lower.includes("future")) {
      stats = { digitalProficiency: 2, culture: 1 };
      flag = "calendar_future_prepped";
      message = "Future-direction prep makes the next opportunity easier to judge.";
    } else if (lower.includes("year-end") || lower.includes("review")) {
      stats = { academics: 2, culture: 2 };
      flag = "calendar_final_prepped";
      message = "Year-end prep helps the ending remember more than raw stats.";
    }

    if (!stats) return;
    this.applyStatDelta(stats);
    this.state.flags[flag] = true;
    this.state.flags.calendar_focus_last_applied_week = this.state.turn;
    this.state.flags.calendar_focus_last_message = message;
    this.addTransaction(0, `Calendar focus payoff: ${focus}`);
  }

  applyPhoneLayerConsequences() {
    if (this.state.phase !== "In-China") return;

    if (this.state.flags.taobao_meal_prep_buffer) {
      this.applyStatDelta({ energy: 3 });
      this.state.flags.taobao_meal_prep_buffer = false;
      this.state.flags.taobao_meal_prep_paid_off = true;
      this.addTransaction(0, "Meal prep saved an evening");
    }

    const relationshipEntries = Object.entries(this.state.relationships || {})
      .filter(([, rel]) => (rel.friendship || 0) >= 12);
    if (relationshipEntries.length > 0) {
      if (this.state.flags.sent_wechat_ping_this_week) {
        this.state.flags.wechat_silence_weeks = 0;
      } else {
        this.state.flags.wechat_silence_weeks = (this.state.flags.wechat_silence_weeks || 0) + 1;
        if (this.state.flags.wechat_silence_weeks >= 2) {
          for (const [name, rel] of relationshipEntries.slice(0, 3)) {
            rel.friendship = Math.max(0, (rel.friendship || 0) - 1);
            this.state.flags[`wechat_drift_${name.replace(/\s+/g, '_').toLowerCase()}`] = true;
          }
          this.state.flags.wechat_silence_consequence_ready = true;
          this.addTransaction(0, "Missed WeChat check-ins created distance");
        }
      }
    }
  }

  spendWeeklyAction(slot = 'auto') {
    if (!this.state.weeklyActions) {
      this.state.weeklyActions = { weekday: 3, weekend: 1 };
    }

    const actions = this.state.weeklyActions;
    let spentSlot = null;

    if (slot === 'weekday' && actions.weekday > 0) {
      actions.weekday -= 1;
      spentSlot = 'weekday';
    } else if (slot === 'weekend' && actions.weekend > 0) {
      actions.weekend -= 1;
      spentSlot = 'weekend';
    } else if (actions.weekday > 0) {
      actions.weekday -= 1;
      spentSlot = 'weekday';
    } else if (actions.weekend > 0) {
      actions.weekend -= 1;
      spentSlot = 'weekend';
    }

    if (!spentSlot) return { spent: false, weekComplete: true, slot: null };

    this.state.flags.last_action_slot = spentSlot;
    this.notify();
    return {
      spent: true,
      weekComplete: (actions.weekday + actions.weekend) <= 0,
      slot: spentSlot
    };
  }

  getWeeklyActionsRemaining() {
    const actions = this.state.weeklyActions || { weekday: 0, weekend: 0 };
    return (actions.weekday || 0) + (actions.weekend || 0);
  }

  getActivePrepCards(tags = []) {
    const wantedTags = new Set(tags);
    return LIFE_CHECK_PREP_CARDS
      .filter(card => card.isActive(this.state))
      .map(card => ({
        ...card,
        matched: card.tags.filter(tag => wantedTags.has(tag))
      }))
      .filter(card => card.matched.length > 0);
  }

  getLifeCheckScore(config = {}) {
    const stats = this.state.stats || {};
    const guanxi = this.state.guanxi || {};
    const relationships = this.state.relationships || {};
    const routeCommitments = this.state.routeCommitments || {};
    const tags = config.tags || [];
    const statWeights = config.stats || {};
    const guanxiWeights = config.guanxi || {};
    const routeWeights = config.routes || {};
    const prepCards = this.getActivePrepCards(tags);

    let score = Number(config.base || 0);
    const parts = [];

    for (const [stat, weight] of Object.entries(statWeights)) {
      const statKey = stat === 'sanity' ? 'energy' : stat;
      const value = Number(stats[statKey] || 0);
      const contribution = Math.floor(value * Number(weight || 0));
      if (contribution) {
        score += contribution;
        parts.push({ label: statKey, value: contribution });
      }
    }

    for (const [faction, weight] of Object.entries(guanxiWeights)) {
      const value = Number(guanxi[faction] || 0);
      const contribution = Math.floor(value * Number(weight || 0));
      if (contribution) {
        score += contribution;
        parts.push({ label: `${faction} guanxi`, value: contribution });
      }
    }

    if (config.character) {
      const friendship = Number(relationships[config.character]?.friendship || 0);
      const relationshipContribution = Math.floor(friendship * Number(config.relationshipWeight ?? 0.35));
      if (relationshipContribution) {
        score += relationshipContribution;
        parts.push({ label: `${config.character} trust`, value: relationshipContribution });
      }
    }

    for (const [route, weight] of Object.entries(routeWeights)) {
      const value = Number(routeCommitments[route] || 0);
      const contribution = Math.floor(value * Number(weight || 0));
      if (contribution) {
        score += contribution;
        parts.push({ label: `${route} route`, value: contribution });
      }
    }

    const prepBonus = prepCards.reduce((total, card) => total + Number(card.bonus || 0), 0);
    if (prepBonus) {
      score += prepBonus;
      parts.push({ label: 'prep cards', value: prepBonus });
    }

    return {
      score,
      dc: Number(config.dc || 0),
      prepCards: prepCards.map(card => ({ id: card.id, title: card.title, bonus: card.bonus })),
      parts
    };
  }

  runLifeCheck(config = {}) {
    if (!config.id) return null;

    const check = this.getLifeCheckScore(config);
    const success = check.score >= check.dc;
    const outcome = success ? (config.success || {}) : (config.failure || {});
    const result = {
      id: config.id,
      label: config.label || config.id,
      route: config.route || null,
      score: check.score,
      dc: check.dc,
      success,
      margin: check.score - check.dc,
      prepCards: check.prepCards,
      parts: check.parts,
      message: outcome.message || (success ? 'Preparation carries the moment.' : 'The missing preparation shows up at the worst time.'),
      week: this.state.turn
    };

    if (!this.state.lifeChecks) this.state.lifeChecks = { last: null, history: [] };
    this.state.lifeChecks.last = result;
    this.state.lifeChecks.history = [...(this.state.lifeChecks.history || []), result].slice(-12);
    this.state.flags[`life_check_${config.id}_${success ? 'success' : 'failure'}`] = true;
    this.state.flags.last_life_check_id = config.id;
    this.state.flags.last_life_check_success = success;
    this.state.flags.last_life_check_label = result.label;

    if (outcome.stats) this.applyStatDelta(outcome.stats);
    if (outcome.guanxi) {
      for (const [faction, amount] of Object.entries(outcome.guanxi)) {
        if (this.state.guanxi[faction] !== undefined) {
          this.state.guanxi[faction] += amount;
        }
      }
    }
    if (outcome.relationships) {
      for (const [character, changes] of Object.entries(outcome.relationships)) {
        if (!this.state.relationships[character]) this.state.relationships[character] = { friendship: 0, romance: 0 };
        for (const [key, value] of Object.entries(changes)) {
          this.state.relationships[character][key] = Math.max(0, Math.min(100, (this.state.relationships[character][key] || 0) + value));
        }
      }
    }
    if (outcome.flags) {
      for (const [flag, value] of Object.entries(outcome.flags)) {
        this.state.flags[flag] = value;
      }
    }
    this.addTransaction(0, `Life Check: ${result.label} ${success ? 'passed' : 'strained'}`);
    this.notify();
    return result;
  }

  // Advance time by 1 week
  advanceTurn() {
    this.applyCalendarFocusOutcome();
    this.applyPhoneLayerConsequences();

    this.state.turn += 1;
    this.state.weeklyActions = { weekday: 3, weekend: 1 };
    this.state.flags.has_worked_this_week = false;
    this.state.flags.used_didi_this_week = false;
    this.state.flags.sent_wechat_ping_this_week = false;
    this.state.flags.used_taobao_service_this_week = false;
    
    // Process weekly expenses
    this.addTransaction(-200, "Weekly Living Expenses");
    const housingRent = Number(this.state.flags.housing_rent_weekly || 0);
    if (housingRent > 0) {
      this.addTransaction(-housingRent, `Weekly Housing Rent: ${this.state.flags.housing_choice || "Shanghai Housing"}`);
      const commute = this.state.flags.housing_commute || "";
      if (/35|long/i.test(commute)) {
        this.state.stats.energy = Math.max(0, this.state.stats.energy - 3);
      } else if (/25|moderate/i.test(commute)) {
        this.state.stats.energy = Math.max(0, this.state.stats.energy - 1);
      }
    }

    // Process job
    if (this.state.jobs.hasJob) {
      this.addTransaction(this.state.jobs.weeklyIncome, "Part-Time Job Income");
      this.state.stats.energy -= this.state.jobs.energyCost;
      if (!this.state.items.headphones) {
         // Slightly hurts academics to work without good studying equipment
         this.state.stats.academics = Math.max(0, this.state.stats.academics - 1);
      }
    }
    
    // Apply weekly decay
    let baseDrain = 2;
    if (this.state.items.ebike) baseDrain -= 1; // Ebike helps!
    this.state.stats.energy -= baseDrain;
    
    if (this.state.stats.energy < 0) this.state.stats.energy = 0;
    
    // Auto-advance phase
    if (this.state.turn >= 8 && this.state.phase === "Application") {
      this.state.phase = "Pre-Departure";
    } else if (this.state.turn >= 16 && this.state.phase === "Pre-Departure") {
      this.state.phase = "In-China";
    }
    
    this.notify();
  }

  // Update multiple stats // DEPRECATED for wealth: try to use addTransaction, but keep for compatibility
  updateStats(statChanges) {
    for (const [key, value] of Object.entries(statChanges)) {
      const statKey = key === 'sanity' ? 'energy' : key;
      if (this.state.stats[statKey] !== undefined) {
        if (statKey === 'wealth') {
            this.addTransaction(value, value > 0 ? "Misc Income" : "Misc Expense");
        } else {
            this.state.stats[statKey] += value;
        }
        // Hard bounds for ability-style stats. Wealth is handled separately as RMB.
        this.state.stats[statKey] = clampStat(statKey, this.state.stats[statKey]);
      }
    }
    this.notify();
  }

  updateRouteCommitment(route, amount = 1) {
    if (!this.state.routeCommitments) {
      this.state.routeCommitments = { ...INITIAL_STATE.routeCommitments };
    }
    if (this.state.routeCommitments[route] === undefined) return;
    this.state.routeCommitments[route] = Math.max(0, this.state.routeCommitments[route] + amount);

    const labels = {
      academic: "Academic / Research route",
      career: "Career / Internship route",
      local: "Local Life route",
      intl: "Social / International route",
      city: "Shanghai Opportunity route",
      survival: "Survival / Budget route"
    };
    const strongest = Object.entries(this.state.routeCommitments)
      .sort((a, b) => b[1] - a[1])[0];
    if (strongest && strongest[1] >= 4) {
      this.state.flags.route_commitment = strongest[0];
      this.state.flags.route_commitment_label = labels[strongest[0]];
    }
  }

  // Update specific deep relationships (friendship and romance)
  updateRelationship(character, changes) {
    if (!this.state.relationships) this.state.relationships = {};
    if (!this.state.relationships[character]) {
        this.state.relationships[character] = { friendship: 0, romance: 0 };
    }
    for (const [key, value] of Object.entries(changes)) {
        this.state.relationships[character][key] += value;
        if (this.state.relationships[character][key] < 0) this.state.relationships[character][key] = 0;
        if (this.state.relationships[character][key] > 100) this.state.relationships[character][key] = 100;
    }
    this.notify();
  }

  // Update specific Guanxi faction
  updateGuanxi(faction, amount) {
    if (this.state.guanxi[faction] !== undefined) {
      this.state.guanxi[faction] += amount;
      this.notify();
    }
  }

  // Set a story flag
  setFlag(flagName, value = true) {
    this.state.flags[flagName] = value;
    if (value === true) {
      const routeFlagMap = {
        route_academic: "academic",
        academic_seed: "academic",
        route_career: "career",
        career_seed: "career",
        route_local: "local",
        local_seed: "local",
        route_intl: "intl",
        intl_seed: "intl",
        route_city: "city",
        city_seed: "city",
        route_survival: "survival",
        finance_working: "survival",
        background_working_budget: "survival",
        emergency_funding_used: "survival",
        budget_reviewed: "survival",
        housing_energy_scar: "survival"
      };
      if (routeFlagMap[flagName]) {
        this.updateRouteCommitment(routeFlagMap[flagName], 1);
      }
    }
    this.notify();
  }

  setCurrentNode(nodeId) {
    this.state.currentNodeId = nodeId;
    if (nodeId?.startsWith('ending_')) {
      this.state.flags[nodeId] = true;
      if (!this.state.metaProgress) this.state.metaProgress = { completedRuns: 0, endingsSeen: {}, rememberedChecks: [] };
      if (!this.state.metaProgress.endingsSeen[nodeId]) {
        this.state.metaProgress.completedRuns += 1;
        this.state.metaProgress.endingsSeen[nodeId] = true;
      }
      const rememberedChecks = (this.state.lifeChecks?.history || [])
        .filter(check => check.id)
        .slice(-8)
        .map(check => ({
          id: check.id,
          label: check.label,
          success: check.success,
          route: check.route || null
        }));
      this.state.metaProgress.rememberedChecks = rememberedChecks;
    }
    for (const flag of NODE_UNLOCK_FLAGS[nodeId] || []) {
      this.state.flags[flag] = true;
    }
    this.notify();
  }

  setLocation(city) {
    this.state.location = city;
    this.notify();
  }

  // Reset Game
  reset() {
    const metaProgress = this.state.metaProgress || { completedRuns: 0, endingsSeen: {}, rememberedChecks: [] };
    this.state = JSON.parse(JSON.stringify(INITIAL_STATE));
    this.state.metaProgress = {
      completedRuns: metaProgress.completedRuns || 0,
      endingsSeen: { ...(metaProgress.endingsSeen || {}) },
      rememberedChecks: Array.isArray(metaProgress.rememberedChecks) ? metaProgress.rememberedChecks.slice(-8) : []
    };
    if (this.state.metaProgress.completedRuns > 0) {
      this.state.flags.second_run_memory = true;
      this.state.flags.second_run_memory_count = this.state.metaProgress.completedRuns;
      this.state.stats.digitalProficiency = clampStat('digitalProficiency', this.state.stats.digitalProficiency + 2);
      this.state.stats.energy = clampStat('energy', this.state.stats.energy + 3);
      this.state.transactions.push({
        week: 1,
        amount: 0,
        desc: "Second-run memory: you remember a few traps before they happen",
        type: "income"
      });
    }
    this.notify();
  }

  // Persistence
  save() {
    try {
      localStorage.setItem('sim_panda_save', JSON.stringify(this.state));
    } catch(e) { console.error("Save failed", e); }
  }

  load() {
    try {
      const data = localStorage.getItem('sim_panda_save');
      if (data) {
        const parsed = JSON.parse(data);
        this.state = { ...this.state, ...parsed }; // Merge to preserve structure
        // Migrate older saves from the former "sanity" stat to "energy".
        const loadedStats = this.state.stats || {};
        const migratedEnergy = loadedStats.energy !== undefined ? loadedStats.energy : loadedStats.sanity;
        this.state.stats = {
          ...INITIAL_STATS,
          ...loadedStats,
          energy: migratedEnergy !== undefined ? migratedEnergy : INITIAL_STATS.energy
        };
        for (const [statKey, value] of Object.entries(this.state.stats)) {
          this.state.stats[statKey] = clampStat(statKey, value);
        }
        delete this.state.stats.sanity;
        
        // Handle migration for older saves without economy
        if (!this.state.location) this.state.location = this.state.phase === "In-China" ? "Shanghai" : "Home Country";
        if (!this.state.jobs) this.state.jobs = { hasJob: false, jobId: null, weeklyIncome: 0, energyCost: 0 };
        if (this.state.jobs.energyCost === undefined && this.state.jobs.sanityCost !== undefined) {
          this.state.jobs.energyCost = this.state.jobs.sanityCost;
        }
        delete this.state.jobs.sanityCost;
        if (!this.state.transactions) this.state.transactions = [{ week: 1, amount: this.state.stats.wealth, desc: "Initial Funds", type: "income" }];
        if (!this.state.items) this.state.items = { ...INITIAL_STATE.items };
        else this.state.items = { ...INITIAL_STATE.items, ...this.state.items };
        if (!this.state.relationships) this.state.relationships = {};
        if (!this.state.weeklyActions) this.state.weeklyActions = { weekday: 3, weekend: 1 };
        else this.state.weeklyActions = {
          weekday: Math.max(this.state.weeklyActions.weekday ?? 3, 3),
          weekend: this.state.weeklyActions.weekend ?? 1
        };
        if (!this.state.routeCommitments) this.state.routeCommitments = { ...INITIAL_STATE.routeCommitments };
        else this.state.routeCommitments = { ...INITIAL_STATE.routeCommitments, ...this.state.routeCommitments };
        if (!this.state.lifeChecks) this.state.lifeChecks = { last: null, history: [] };
        else this.state.lifeChecks = {
          last: this.state.lifeChecks.last || null,
          history: Array.isArray(this.state.lifeChecks.history) ? this.state.lifeChecks.history.slice(-12) : []
        };
        if (!this.state.metaProgress) this.state.metaProgress = { completedRuns: 0, endingsSeen: {}, rememberedChecks: [] };
        else this.state.metaProgress = {
          completedRuns: this.state.metaProgress.completedRuns || 0,
          endingsSeen: { ...(this.state.metaProgress.endingsSeen || {}) },
          rememberedChecks: Array.isArray(this.state.metaProgress.rememberedChecks) ? this.state.metaProgress.rememberedChecks.slice(-8) : []
        };

        this.notify();
        return true;
      }
    } catch(e) { console.error("Load failed", e); }
    return false;
  }
}

const buildDialogueResolvedFlag = (nodeId) => `dialogue_resolved_${nodeId}`;

const buildDialogueFlag = (nodeId, index) => `dialogue_choice_${nodeId}_${index + 1}`;

const buildDefaultDialogueChoices = (nodeId, node) => {
  const defaults = CHARACTER_DIALOGUE_DEFAULTS[node?.speaker];
  if (!defaults) return [];

  return defaults.choices.map((choice, index) => ({
    text: choice.text,
    reply: choice.reply,
    effects: {
      stats: choice.stats,
      guanxi: defaults.guanxi,
      relationships: { [node.speaker]: { friendship: choice.friendship } },
      flags: {
        [defaults.routeFlag]: true,
        [buildDialogueFlag(nodeId, index)]: true
      }
    }
  }));
};

const withDialogueResolvedFlag = (nodeId, choice) => ({
  ...choice,
  effects: {
    ...(choice.effects || {}),
    flags: {
      ...((choice.effects && choice.effects.flags) || {}),
      [buildDialogueResolvedFlag(nodeId)]: true
    }
  }
});

class EventSystem {
  constructor(engine) {
    this.engine = engine; // Reference to GameState
    this.events = {}; // Map of all event configurations
  }

  // Load event dictionary into the generic pool
  loadEvents(newEvents) {
    this.events = { ...this.events, ...newEvents };
  }

  // Check if a node's condition passing
  checkCondition(conditionObj) {
    if (!conditionObj) return true; // No condition = always pass
    const state = this.engine.getState();

    // Check location
    if (conditionObj.location) {
      if (state.location !== conditionObj.location) return false;
    }

    // Check week/turn gates (e.g., { turn: { min: 25 } })
    if (conditionObj.turn) {
      const val = state.turn || 0;
      if (conditionObj.turn.min !== undefined && val < conditionObj.turn.min) return false;
      if (conditionObj.turn.max !== undefined && val > conditionObj.turn.max) return false;
    }

    // Check stats (e.g., { stats: { academics: { min: 20 } } })
    if (conditionObj.stats) {
      for (const [stat, req] of Object.entries(conditionObj.stats)) {
        const val = state.stats[stat] || 0;
        if (req.min !== undefined && val < req.min) return false;
        if (req.max !== undefined && val > req.max) return false;
      }
    }
    
    // Check flags
    if (conditionObj.flags) {
      for (const [flag, value] of Object.entries(conditionObj.flags)) {
        if (!!state.flags[flag] !== value) return false;
      }
    }
    
    // Check guanxi
    if (conditionObj.guanxi) {
      for (const [faction, req] of Object.entries(conditionObj.guanxi)) {
        const val = state.guanxi[faction] || 0;
        if (req.min !== undefined && val < req.min) return false;
        if (req.max !== undefined && val > req.max) return false;
      }
    }

    // Check relationships
    if (conditionObj.relationships) {
      for (const [character, states] of Object.entries(conditionObj.relationships)) {
        for (const [key, req] of Object.entries(states)) {
          const val = (state.relationships && state.relationships[character]) ? state.relationships[character][key] || 0 : 0;
          if (req.min !== undefined && val < req.min) return false;
          if (req.max !== undefined && val > req.max) return false;
        }
      }
    }

    return true;
  }

  // Get available choices for a given node
  getAvailableChoices(nodeId) {
    const node = this.events[nodeId];
    if (!node || !node.choices) return [];
    
    return node.choices.filter(choice => this.checkCondition(choice.condition));
  }

  getAvailableDialogueChoices(nodeId) {
    const node = this.events[nodeId];
    if (!node) return [];
    if (node.suppressDialogueChoices) return [];
    const state = this.engine.getState();
    if (state.flags?.[buildDialogueResolvedFlag(nodeId)]) return [];

    const dialogueChoices = node.dialogueChoices || CHARACTER_DIALOGUE_BY_NODE[nodeId] || buildDefaultDialogueChoices(nodeId, node);
    return dialogueChoices
      .filter(choice => this.checkCondition(choice.condition))
      .map(choice => withDialogueResolvedFlag(nodeId, choice));
  }

  // Apply a choice's consequences without moving to another node.
  applyChoiceEffects(choice) {
    // 1. Apply stat changes
    if (choice.effects && choice.effects.stats) {
      this.engine.updateStats(choice.effects.stats);
    }
    
    // 2. Apply guanxi changes
    if (choice.effects && choice.effects.guanxi) {
      for (const [faction, amount] of Object.entries(choice.effects.guanxi)) {
         this.engine.updateGuanxi(faction, amount);
      }
    }
    
    // 3. Set flags
    if (choice.effects && choice.effects.flags) {
       for (const [flag, value] of Object.entries(choice.effects.flags)) {
         this.engine.setFlag(flag, value);
       }
    }
    
    // 4. Update relationships
    if (choice.effects && choice.effects.relationships) {
       for (const [character, changes] of Object.entries(choice.effects.relationships)) {
         this.engine.updateRelationship(character, changes);
       }
    }
    
    // 5. Apply location changes
    if (choice.effects && choice.effects.location) {
       this.engine.setLocation(choice.effects.location);
    }
    
    // 6. Obtain Magnets
    if (choice.effects && choice.effects.magnet) {
       this.engine.addMagnet(choice.effects.magnet);
    }

    // 7. Run a deterministic Life Check after the choice has shaped the moment.
    if (choice.effects && choice.effects.lifeCheck) {
       this.engine.runLifeCheck(choice.effects.lifeCheck);
    }
  }

  // Execute a choice's consequences
  executeChoice(choice) {
    this.applyChoiceEffects(choice);

    // Intercept: If returning to hub, roll for random events
    let nextNode = choice.next;
    if (nextNode === "hub") {
      const roll = Math.random();
      if (roll < 0.05) {
         nextNode = "random_sick";
      } else if (roll < 0.1) {
         nextNode = "random_exam";
      } else if (roll < 0.15) {
         nextNode = "random_subway";
      } else if (roll < 0.2) {
         nextNode = "random_lecture";
      } else if (roll < 0.25) {
         nextNode = "random_club_fair";
      } else if (roll < 0.3) {
         nextNode = "random_vpn_down";
      } else if (roll < 0.35) {
         nextNode = "random_dorm_inspection";
      }
    }

    // Return the next Node ID
    return nextNode;
  }
}

/* --- engine/AudioManager.js --- */
class AudioManager {
  constructor(manifest = {}) {
    this.manifest = manifest;
    this.context = null;
    this.masterGain = null;
    this.bgmGain = null;
    this.ambienceGain = null;
    this.sfxGain = null;
    this.stingerGain = null;
    this.bgmTimer = null;
    this.bgmBarIndex = 0;
    this.currentBgmId = null;
    this.currentBgmElement = null;
    this.currentAmbienceElement = null;
    this.lastTypeTickAt = 0;
    this.muted = false;
    this.volumes = {
      master: 0.72,
      bgm: 0.42,
      ambience: 0.2,
      sfx: 0.7,
      type: 0.28,
      stinger: 0.75,
      ...(manifest.defaults?.volumes || {})
    };
    this.loadSettings();
  }

  loadSettings() {
    try {
      if (typeof window === "undefined" || !window.localStorage) return;
      const stored = window.localStorage.getItem("sim_panda_audio_settings");
      if (!stored) return;
      const parsed = JSON.parse(stored);
      this.muted = Boolean(parsed.muted);
      this.volumes = { ...this.volumes, ...(parsed.volumes || {}) };
    } catch (error) {
      console.warn("Audio settings could not be loaded", error);
    }
  }

  saveSettings() {
    try {
      if (typeof window === "undefined" || !window.localStorage) return;
      window.localStorage.setItem("sim_panda_audio_settings", JSON.stringify({
        muted: this.muted,
        volumes: this.volumes
      }));
    } catch (error) {
      console.warn("Audio settings could not be saved", error);
    }
  }

  ensureContext() {
    if (typeof window === "undefined") return null;
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return null;

    if (!this.context) {
      this.context = new AudioContextClass();
      this.masterGain = this.context.createGain();
      this.bgmGain = this.context.createGain();
      this.ambienceGain = this.context.createGain();
      this.sfxGain = this.context.createGain();
      this.stingerGain = this.context.createGain();

      this.masterGain.connect(this.context.destination);
      this.bgmGain.connect(this.masterGain);
      this.ambienceGain.connect(this.masterGain);
      this.sfxGain.connect(this.masterGain);
      this.stingerGain.connect(this.masterGain);

      this.applyVolumes();
    }

    return this.context;
  }

  async unlock() {
    const ctx = this.ensureContext();
    if (!ctx) return false;
    if (ctx.state === "suspended") {
      await ctx.resume();
    }
    return ctx.state === "running";
  }

  applyVolumes() {
    if (!this.masterGain) return;
    const masterVolume = this.muted ? 0 : this.volumes.master;
    this.masterGain.gain.value = masterVolume;
    this.bgmGain.gain.value = this.volumes.bgm;
    this.ambienceGain.gain.value = this.volumes.ambience;
    this.sfxGain.gain.value = this.volumes.sfx;
    this.stingerGain.gain.value = this.volumes.stinger;
  }

  setVolume(channel, value) {
    const safeValue = Math.max(0, Math.min(1, Number(value) || 0));
    this.volumes[channel] = safeValue;
    this.applyVolumes();
    this.saveSettings();
  }

  mute() {
    this.muted = true;
    this.applyVolumes();
    this.saveSettings();
  }

  unmute() {
    this.muted = false;
    this.applyVolumes();
    this.saveSettings();
  }

  isMuted() {
    return this.muted;
  }

  async start(bgmId = "title") {
    this.unmute();
    const unlocked = await this.unlock();
    if (!unlocked) return false;
    await this.playBgm(bgmId);
    return true;
  }

  stop() {
    this.stopBgm({ fadeMs: 350 });
    this.stopAmbience({ fadeMs: 250 });
  }

  async playBgm(id = "title", options = {}) {
    const unlocked = await this.unlock();
    if (!unlocked || this.muted) return unlocked;
    if (this.currentBgmId === id && (this.bgmTimer || this.currentBgmElement)) return true;

    const entry = this.manifest.bgm?.[id];
    if (entry?.ready && entry.src) {
      this.stopProceduralBgm(options);
      this.currentBgmId = id;
      const nextElement = await this.playLoopingElement(this.currentBgmElement, entry.src, this.volumes.bgm, options.fadeMs ?? 900);
      if (nextElement) {
        this.currentBgmElement = nextElement;
        return true;
      }
      this.currentBgmElement = null;
      this.playProceduralBgm(entry.fallback || id, options);
      return true;
    }

    this.stopElement(this.currentBgmElement, options.fadeMs ?? 500);
    this.currentBgmElement = null;
    this.playProceduralBgm(entry?.fallback || id, options);
    return true;
  }

  stopBgm(options = {}) {
    this.stopProceduralBgm(options);
    this.stopElement(this.currentBgmElement, options.fadeMs ?? 350);
    this.currentBgmElement = null;
    this.currentBgmId = null;
  }

  async playAmbience(id, options = {}) {
    const entry = this.manifest.ambience?.[id];
    if (!entry?.ready || !entry.src || this.muted) return false;
    const unlocked = await this.unlock();
    if (!unlocked) return false;
    this.currentAmbienceElement = await this.playLoopingElement(this.currentAmbienceElement, entry.src, this.volumes.ambience, options.fadeMs ?? 700);
    return true;
  }

  stopAmbience(options = {}) {
    this.stopElement(this.currentAmbienceElement, options.fadeMs ?? 250);
    this.currentAmbienceElement = null;
  }

  playSfx(id = "uiClick") {
    if (this.muted) return;
    const entry = this.manifest.sfx?.[id];
    if (entry?.ready && entry.src) {
      this.playOneShotElement(entry.src, this.volumes.sfx);
      return;
    }
    this.playFallbackSfx(entry?.fallback || id);
  }

  playStinger(id = "cgUnlock") {
    if (this.muted) return;
    const entry = this.manifest.stingers?.[id];
    if (entry?.ready && entry.src) {
      this.playOneShotElement(entry.src, this.volumes.stinger);
      return;
    }
    this.playFallbackSfx(entry?.fallback || id, true);
  }

  ui() {
    this.playSfx("uiClick");
  }

  week() {
    this.playSfx("calendarFlip");
  }

  typeTick() {
    this.playSfx("typeTick");
  }

  async playLoopingElement(currentElement, src, volume, fadeMs) {
    this.stopElement(currentElement, fadeMs);
    const element = new Audio(src);
    element.loop = true;
    element.volume = 0;
    try {
      await element.play();
      this.fadeElement(element, volume, fadeMs);
      return element;
    } catch (error) {
      console.warn("Audio asset could not be played; using fallback if available", src, error);
      return null;
    }
  }

  playOneShotElement(src, volume) {
    const element = new Audio(src);
    element.volume = volume;
    element.play().catch((error) => {
      console.warn("SFX asset could not be played", src, error);
    });
  }

  fadeElement(element, targetVolume, fadeMs = 500) {
    if (!element) return;
    const startVolume = element.volume || 0;
    const duration = Math.max(1, fadeMs);
    const startedAt = performance.now();
    const tick = () => {
      const progress = Math.min(1, (performance.now() - startedAt) / duration);
      element.volume = startVolume + (targetVolume - startVolume) * progress;
      if (progress < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }

  stopElement(element, fadeMs = 350) {
    if (!element) return;
    const startVolume = element.volume || 0;
    const duration = Math.max(1, fadeMs);
    const startedAt = performance.now();
    const tick = () => {
      const progress = Math.min(1, (performance.now() - startedAt) / duration);
      element.volume = startVolume * (1 - progress);
      if (progress < 1) {
        requestAnimationFrame(tick);
      } else {
        element.pause();
        element.currentTime = 0;
      }
    };
    requestAnimationFrame(tick);
  }

  playProceduralBgm(id, options = {}) {
    const ctx = this.ensureContext();
    if (!ctx || !this.bgmGain) return;
    const fadeMs = options.fadeMs ?? 900;
    const preset = this.getBgmPreset(id);

    this.stopProceduralBgm({ fadeMs: 120 });
    this.currentBgmId = id;
    this.bgmBarIndex = 0;
    this.bgmGain.gain.cancelScheduledValues(ctx.currentTime);
    this.bgmGain.gain.setValueAtTime(0.0001, ctx.currentTime);
    this.bgmGain.gain.linearRampToValueAtTime(this.volumes.bgm, ctx.currentTime + fadeMs / 1000);

    const playBar = () => {
      this.playProceduralBar(preset);
      this.bgmBarIndex += 1;
    };

    playBar();
    this.bgmTimer = window.setInterval(playBar, preset.intervalMs);
  }

  stopProceduralBgm(options = {}) {
    if (this.bgmTimer) {
      window.clearInterval(this.bgmTimer);
      this.bgmTimer = null;
    }
    if (this.context && this.bgmGain) {
      const fadeSeconds = (options.fadeMs ?? 250) / 1000;
      this.bgmGain.gain.cancelScheduledValues(this.context.currentTime);
      this.bgmGain.gain.linearRampToValueAtTime(0.0001, this.context.currentTime + fadeSeconds);
    }
  }

  playProceduralBar(preset) {
    const chord = preset.progression[this.bgmBarIndex % preset.progression.length];
    chord.forEach((frequency, index) => {
      this.playTone({
        frequency,
        duration: preset.padDuration,
        type: index === 0 ? preset.bassType : preset.padType,
        gain: index === 0 ? preset.bassGain : preset.padGain,
        destination: this.bgmGain,
        delay: index * 0.035
      });
    });

    for (const accent of preset.accents) {
      const base = chord[accent.noteIndex] || chord[1] || chord[0];
      this.playTone({
        frequency: base * accent.multiplier,
        duration: accent.duration,
        type: accent.type,
        gain: accent.gain,
        destination: this.bgmGain,
        delay: accent.delay
      });
    }

    if (preset.pulse) {
      this.playTone({
        frequency: chord[0] / 2,
        duration: 0.12,
        type: "sawtooth",
        gain: preset.pulseGain,
        destination: this.bgmGain,
        delay: 0.05

      this.playTone({
        frequency: chord[0] / 2,
        duration: 0.1,
        type: "sawtooth",
        gain: preset.pulseGain * 0.7,
        destination: this.bgmGain,
        delay: preset.intervalMs / 2000

    const buffer = ctx.createBuffer(1, sampleCount, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < sampleCount; i += 1) {
      const fade = 1 - i / sampleCount;
      data[i] = (Math.random() * 2 - 1) * fade;
    }

    const source = ctx.createBufferSource();
    const filter = ctx.createBiquadFilter();
    const gain = ctx.createGain();
    source.buffer = buffer;
    filter.type = "bandpass";
    filter.frequency.value = 1700 + Math.random() * 700;
    gain.gain.value = this.volumes.type * 0.065;
    source.connect(filter);
    filter.connect(gain);
    gain.connect(this.sfxGain);

  "ending_scholar": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_scholar.png',
    text: "ENDING: The Minghai Scholar.\n\nProfessor Lin does not smile when he hands you the sealed recommendation. That would make it too easy.\n\nProfessor Lin: 'You still overwrite your first paragraph.'\n\nYou: 'That is the feedback?'\n\nProfessor Lin: 'No. The feedback is that I sent your portfolio to the summer research committee.'\n\nFor a second the office loses sound: traffic outside, paper under your hand, your own breath arriving late.\n\nProfessor Lin: 'You learned how to think under pressure. Do not waste that by only looking for approval.'\n\nYour final portfolio is passed from one professor to another until your name appears on the department's honors shortlist. The year ends with a red-stamped form, a new academic path, and the strange realization that China was not a detour. It was the door.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "ending_entrepreneur": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_entrepreneur.png',
    text: "ENDING: The Shanghai Builder.\n\nXiao Chen refreshes the dashboard so many times the browser starts looking tired.\n\nXiao Chen: 'Three hundred users. Not installs. Users.'\n\nYou: 'The refund button still looks terrifying.'\n\nXiao Chen: 'Good. Fear means we are alive.'\n\nAt demo day, he talks too fast until you touch the laptop and slow the room down with the numbers users actually care about: late fees avoided, dorm errands solved, support tickets answered.\n\nXiao Chen: 'Say the part about trust.'\n\nYou do. The room changes.\n\nOne angel investor does not offer a fantasy empire; she offers something better: the first check, a three-month runway, and a reason to stay in Shanghai long enough to find out what this can become.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "ending_diplomat": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_diplomat.png',
    text: "ENDING: The Career Bridge.\n\nManager Zhang checks your badge, then your shoes, then the timestamp on the approval email.\n\nManager Zhang: 'Good. Legal first. Ambition second.'\n\nYou: 'That sounds like a warning.'\n\nManager Zhang: 'It is a compliment. You listened before you moved.'\n\nThe first meeting is bilingual and too fast. He lets you answer one practical question, then another. Nobody applauds. The spreadsheet simply keeps moving because your answer worked.\n\nManager Zhang: 'Useful beats impressive.'\n\nMonths later, the internship ends with a full-time return offer, a manager who trusts you in complicated rooms, and the strange thrill of realizing your China year has become a career bridge people can actually cross.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "ending_influencer": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_influencer.png',
    text: "ENDING: The Student Voice.\n\nSophie sends you a screenshot from orientation. Your guide is on the projector. Your typo is also on the projector.\n\nSophie: 'Congratulations. You are now institutional knowledge with bad punctuation.'\n\nYou: 'Please tell me they fixed the typo.'\n\nSophie: 'No. It makes you approachable.'\n\nNew students laugh before they panic. Someone asks the exact question you were once ashamed to ask, and Sophie points them to the section you wrote at 2 a.m. after getting lost near the wrong gate.\n\nSophie: 'See? International-student okay became actually okay.'\n\nYou never became a flawless model student; you became something more useful, the person who turned confusion into a map.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "ending_quiet_return": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_quiet_return.png',
    text: "ENDING: The Quiet Transformation.\n\nAt the airport, your family asks the impossible question too soon.\n\nFamily: 'So. How was China?'\n\nYou look at the suitcase: receipts, metro cards, saved screenshots, half-understood jokes, and one tiny packet of snacks you forgot to eat.\n\nYou: 'I do not know how to make it short yet.'\n\nFamily: 'Then do not make it short.'\n\nNo trophy waits at the gate. No dramatic headline explains what happened to you. But the version of yourself that leaves Minghai is not the one who arrived. When people ask again, you realize the answer is no longer a story. It is an archive.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "ending_researcher": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_researcher.png',
    text: "ENDING: The Research Apprentice.\n\nDr. Mei adjusts one sticky note on the poster, then steps back like the whole year depends on three centimeters.\n\nDr. Mei: 'What is the weakest part of your argument?'\n\nYou: 'You ask that five minutes before the forum?'\n\nDr. Mei: 'Especially five minutes before the forum.'\n\nYou answer honestly. She nods, not because the answer is perfect, but because you finally stop hiding uncertainty like a stain.\n\nDr. Mei: 'Good. Now you sound like someone doing research.'\n\nYour name appears in the acknowledgements of a project you once barely understood. The applause is brief. The aftershock is not. A professor trusts you with work that matters, and you are no longer just studying China from the outside.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "ending_local_insider": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_local_insider.png',
    text: "ENDING: The Local Regular.\n\nUncle Wang starts your order before you reach the plastic stool.\n\nYou: 'I did not say anything yet.'\n\nUncle Wang: 'You were going to say the same thing.'\n\nNeighbor Li drops a festival-cleanup list onto the table and taps your name already written near the top.\n\nNeighbor Li: 'Do not look so honored. You are carrying boxes.'\n\nYou are not 'basically local,' and the game refuses that easy lie. But someone in the group chat calls you when a foreign student needs help finding the right gate. Shanghai is no longer a backdrop. It is a set of people who notice when you are missing.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "ending_hsk_master": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_hsk_master.png',
    text: "ENDING: The Language Breakthrough.\n\nThe score report arrives first, clean and official. Neighbor Li cares less about the number than your next sentence.\n\nNeighbor Li: 'Say the joke again. Slower.'\n\nYou try. The timing lands this time. People laugh in the right place, not because they are being kind, but because the joke actually works.\n\nYou: 'That counted?'\n\nNeighbor Li: 'That counted more than the certificate.'\n\nFor the first time, Chinese is not a wall you climb with flashcards. It is a room you enter, rearrange, and somehow make your own.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "ending_compliance_scare": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_compliance_scare.png',
    text: "ENDING: The Compliance Scare.\n\nManager Zhang reads the notice twice before speaking.\n\nManager Zhang: 'This is fixable because you stopped early. Do you understand the difference?'\n\nYou: 'Fixable is not the same as fine.'\n\nManager Zhang: 'Good. Write that feeling into the explanation letter.'\n\nThe meeting with the international office is quiet, which somehow makes it worse. Nobody destroys your year. They hand you forms, deadlines, and one very serious reminder.\n\nManager Zhang: 'In China, paperwork is not background noise.'\n\nYou stay at Minghai because someone helped you correct course in time. The victory is quieter than a trophy: you learn that the road has rules even when nobody is shouting.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "ending_career_shortcut": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_career_shortcut.png',
    text: "ENDING: The Shortcut Tax.\n\nManager Zhang does not scold you. He opens the email thread and lets the silence do most of the work.\n\nManager Zhang: 'What did you ask for?'\n\nYou: 'An introduction.'\n\nManager Zhang: 'No. You asked for trust before showing judgment.'\n\nThe fastest introductions leave fingerprints. One promising conversation becomes a polite noncommittal email. Your resume still improves, but the room cools around you.\n\nManager Zhang: 'Networks are not elevators. Stop pressing buttons.'\n\nBy the end, you have a sharper resume and a harder lesson: relationship networks can open doors, but if people suspect you are only looking for doors, they stop inviting you into rooms.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "ending_unreliable_builder": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_unreliable_builder.png',
    text: "ENDING: The Unstable Launch.\n\nXiao Chen scrolls through the complaint screenshots without making jokes.\n\nXiao Chen: 'They are using it enough to hate it.'\n\nYou: 'That is not a pitch deck.'\n\nXiao Chen: 'No. It is better. It is evidence.'\n\nMinghai's incubator still invites you to talk, partly because the idea is useful and partly because the failure is educational. You do not get the clean angel-check moment this time.\n\nXiao Chen: 'Next version, slower.'\n\nYou get something less glamorous and more valuable: users who tell you exactly why trust is harder to build than traffic.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "ending_deportee": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_deportee.png',
    text: "ENDING: The Visa Line You Crossed.\n\nSophie waits outside the office because she has already guessed too much from your messages.\n\nSophie: 'How bad?'\n\nYou: 'Flight-home bad.'\n\nShe does not offer a speech. That would make the hallway feel fake.\n\nSophie: 'Do you need help packing, or do you need someone to sit here first?'\n\nThe money solved one problem and created a larger one: screenshots, transfers, a job that was never properly approved. Your flight home is not cinematic. That is what makes it brutal. Every shortcut becomes paperwork eventually.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "ending_academic_probation": {
    speaker: "System",
    bgImage: './images/simulator/cg/cg_ending_academic_probation.png',
    text: "ENDING: Academic Probation.\n\nProfessor Lin places the warning letter beside your draft instead of on top of it.\n\nProfessor Lin: 'This is not the end. It is also not a metaphor.'\n\nYou: 'What is it?'\n\nProfessor Lin: 'A schedule. Retakes, attendance checks, advising. You will hate how practical recovery is.'\n\nThe warning arrives with polite language and a very sharp consequence: scholarship review, mandatory advising, and a transcript that no longer lets you pretend the semester was only 'difficult.' Minghai gives you one narrow path to continue, paved with the uncomfortable knowledge that opportunity can be lost quietly.",
    choices: [{ text: "Start Over", action: "reset_game", next: "start" }]
  },

  "event_contact_professor_lin_talk_1": {
    speaker: "Professor Lin",
    bgImage: './images/simulator/cg/cg_professor_lin_office_hours.jpg',
    text: "Professor Lin closes your draft and sets his pen beside it, exactly parallel to the desk edge.\n\nProfessor Lin: 'You booked twenty minutes. Good. Twenty honest minutes are better than two hours of performance.'\n\nYou: 'I thought we were talking about the assignment.'\n\nProfessor Lin: 'We are.' He taps the margin where your argument collapses into description. 'But the assignment is not the only thing avoiding clarity.'\n\nYou look at the red comments. None of them are cruel. Somehow that makes them harder to survive.\n\nProfessor Lin: 'Tell me which part of studying here has made you feel least competent. Not the polite answer. The useful one.'",
    dialogueChoices: [
      {
        text: "I keep doing tasks so I do not have to admit I am confused.",
        reply: "That is honest. Confusion is not the failure. Building a routine that hides it is the failure.",
        effects: {
          stats: { academics: 2, energy: -1 },
          relationships: { "Professor Lin": { friendship: 2 } },
          flags: { dialogue_professor_lin_admitted_confusion: true, route_academic: true }
        }
      },
      {
        text: "I understand pieces, but I cannot make them become an argument.",
        reply: "Good. Then we work on structure, not panic. Panic is rarely a useful bibliography.",
        effects: {
          stats: { academics: 3 },
          relationships: { "Professor Lin": { friendship: 1 } },
          flags: { dialogue_professor_lin_argument_gap: true, route_academic: true }
        }
      },
      {
        text: "I am afraid if I say the real answer, you will think I do not belong here.",
        reply: "Belonging is not proven by pretending. It is proven by staying teachable when pretending would be easier.",
        effects: {
          stats: { academics: 1, culture: 2, energy: 2 },
          relationships: { "Professor Lin": { friendship: 3 } },
          flags: { dialogue_professor_lin_belonging_fear: true, route_academic: true }
        }
      }
    ],
    choices: [
      {
        text: "Admit you keep confusing busyness with progress.",
        action: "advance_turn",
        next: "hub",
        effects: {
          stats: { academics: 7, culture: 2, energy: -3 },
          guanxi: { professors: 5 },
          relationships: { "Professor Lin": { friendship: 7 } },
          flags: { weekly_focus: "Professor Lin honest office hour", route_academic: true, contact_professor_lin_talk_1: true }
        }
      },
      {
        text: "Keep the conversation on technique and protect your pride.",
        action: "advance_turn",
        next: "hub",
        effects: {
          stats: { academics: 5, energy: -1 },
          guanxi: { professors: 2 },
          relationships: { "Professor Lin": { friendship: 2 } },
          flags: { weekly_focus: "Professor Lin technique check", route_academic: true, contact_professor_lin_talk_1: true }

      }

    bgImage: './images/simulator/backgrounds/bg_campus_cafe.jpg',
    text: "Dr. Mei arrives with coffee, a notebook, and no patience for vague fascination.\n\nDr. Mei: 'You said Shanghai feels complicated.'\n\nYou: 'It does.'\n\nDr. Mei opens the notebook but does not write yet.\n\nDr. Mei: 'Complicated how? If the answer can fit on a postcard, it is probably not research.'\n\nThe cafe machine hisses behind you. A student at the next table laughs into a voice message.\n\nYou: 'I am not sure I know how to say it without sounding naive.'\n\nDr. Mei: 'Good. Naive can be a starting point. Vague cannot.'",
    dialogueChoices: [
      {
        text: "People say everything is convenient, but I keep seeing who has to make it convenient.",

    text: "The dorm common room is quiet except for the kettle clicking itself off.\n\nSophie sits cross-legged on the sofa, phone face-down for once.\n\nSophie: 'Before everyone arrives, can I ask you something without doing the group-chat version of caring?'\n\nYou: 'That sounds dangerous.'\n\nSophie: 'It is only medium dangerous.' She tries to smile, then lets it go. 'Are you okay, or are you doing international-student okay?'\n\nYou look at the empty cups on the table, the half-translated campus notice, the city outside the window refusing to become simple.\n\nSophie: 'You do not have to make it inspiring. I am tired of everyone making survival sound like a brochure.'",
    dialogueChoices: [

        text: "International-student okay. Functional in public, weirdly fragile after midnight.",
        reply: "That is the most accurate definition anyone has given me. Come sit here. No fixing for five minutes.",

        reply: "You are allowed to need things before you become an emergency. That is literally the point of friendship.",
        effects: {
          stats: { energy: 5, culture: 1 },
          relationships: { Sophie: { friendship: 4 } },

  "district_shanghai_fuxing": { speaker: "Fuxing Park", text: "By day, elders practice tai chi and parents push strollers. At night, the nearby blocks turn into one of Shanghai's loudest youth-culture zones.", choices: [ { text: "Observe the nightlife economy with classmates (-180 RMB)", condition: { stats: { wealth: { min: 180 } } }, next: "event_sh_ins_clubbing", action: "advance_turn", effects: { stats: { wealth: -180 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_shanghai_bund": { speaker: "The Bund", text: "The waterfront compresses a lot into one walk: treaty-port stone, tourist cameras, school groups, wedding shoots, and Pudong's skyline performing across the river.", choices: [ { text: "Take an evening reflection walk", next: "event_sh_bund_walk", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_shanghai_lujiazui": { speaker: "Lujiazui", text: "The towers are impressive, but the more useful lesson is watching how people move through work, money, time, and ambition here.", choices: [ { text: "Attend a student-friendly fintech talk (-60 RMB)", condition: { stats: { wealth: { min: 60 } } }, next: "event_sh_lujiazui_mixer", action: "advance_turn", effects: { stats: { wealth: -60 } } }, { text: "Back to district map", next: "submenu_districts" } ] },

  "district_beijing_forbidden": { speaker: "Forbidden City", text: "The palace is beautiful, crowded, and stricter than your travel fantasy expected. History here arrives with security lines and audio-guide batteries.", choices: [ { text: "Practice translating signs for your own notes", condition: { stats: { chinese: { min: 20 } } }, next: "event_beijing_tourguide", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_beijing_qianmen": { speaker: "Qianmen Street", text: "Old storefronts, new brands, tour groups, snacks, and souvenir shops all argue over what 'traditional' should look like.", choices: [ { text: "Watch Peking Opera excerpts (-100 RMB)", condition: { stats: { wealth: { min: 100 } } }, next: "event_beijing_opera", action: "advance_turn", effects: { stats: { wealth: -100 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_beijing_hutong": { speaker: "Old Hutongs", text: "The lanes are not a postcard. They are homes, deliveries, repairs, tourists, and people trying to live inside a famous place.", choices: [ { text: "Chat carefully with a taxi driver", next: "event_beijing_taxi", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },

  "district_gz_fair": { speaker: "Canton Fair Complex", text: "The trade fair is less a building than a temporary planet: badges, samples, interpreters, factories, buyers, and exhausted coffee stands.", choices: [ { text: "Shadow translation work and take market notes", condition: { stats: { chinese: { min: 30 } } }, next: "event_guangzhou_cantonfair", action: "advance_turn" }, { text: "Dim sum with a local contact (-120 RMB)", condition: { stats: { wealth: { min: 120 } } }, next: "event_guangzhou_boss", action: "advance_turn", effects: { stats: { wealth: -120 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_gz_market": { speaker: "Baima Market", text: "Floor after floor of samples, negotiation, bags, labels, livestream sellers, and people who understand supply chains in their bones.", choices: [ { text: "Compare prices and consumer habits (-120 RMB)", condition: { stats: { wealth: { min: 120 } } }, next: "event_guangzhou_market", action: "advance_turn", effects: { stats: { wealth: -120 } } }, { text: "Back to district map", next: "submenu_districts" } ] },

  "district_chengdu_panda": { speaker: "Panda Base", text: "Lush bamboo forests where conservation work, tourism, and logistics all have to share space.", choices: [ { text: "Join the visitor education route (-50 RMB)", condition: { stats: { wealth: { min: 50 } } }, next: "event_chengdu_volunteer", action: "advance_turn", effects: { stats: { wealth: -50 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_chengdu_kuanzhai": { speaker: "Kuanzhai Alley", text: "Preserved historic alleys full of spicy street food aromas.", choices: [ { text: "Try a hotpot table with locals (-50 RMB)", condition: { stats: { wealth: { min: 50 } } }, next: "event_chengdu_hotpot", action: "advance_turn", effects: { stats: { wealth: -50 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_chengdu_park": { speaker: "People's Park", text: "Locals are playing mahjong, drinking tea, and treating the park like a second living room.", choices: [ { text: "Listen to teahouse advice", next: "event_chengdu_tea", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },

  "district_xian_terra": { speaker: "Terracotta Museum", text: "Thousands of stone warriors stand guard in the massive pits.", choices: [ { text: "Tour the museum with Guide Jin (-100 RMB)", condition: { stats: { wealth: { min: 100 } } }, next: "event_xian_tour", action: "advance_turn", effects: { stats: { wealth: -100 } } }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_xian_muslim": { speaker: "Muslim Quarter", text: "Cumin smoke, old shop signs, tourist waves, and neighborhood routines overlap until you stop trying to separate them neatly.", choices: [ { text: "Talk with a souvenir vendor about tourist rhythms", next: "event_xian_souvenirs", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },
  "district_xian_wall": { speaker: "Ancient City Wall", text: "One of the oldest and best preserved Chinese city walls.", choices: [ { text: "Cycle the wall at sunset (-40 RMB)", condition: { stats: { wealth: { min: 40 } } }, next: "event_xian_cycling", action: "advance_turn", effects: { stats: { wealth: -40 } } }, { text: "Back to district map", next: "submenu_districts" } ] },

  "district_hz_tech": { speaker: "Binjiang District", text: "Glass offices, bike lanes, delivery riders, and campus recruiters make Hangzhou's tech scene feel less mythical and more procedural.", choices: [ { text: "Attend a public tech-career info session", condition: { stats: { academics: { min: 30 } } }, next: "event_hangzhou_alibaba", action: "advance_turn" }, { text: "Back to district map", next: "submenu_districts" } ] },

  "event_language_exchange": {
    speaker: "Mixer Organizer",
    text: "The mixer is loud enough to make everyone forgive mistakes. You trade campus phrases, delivery-call scripts, and the kind of slang that never appears in textbooks.",
