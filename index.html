  "event_xiao_chen": {
    speaker: "Xiao Chen",
    text: "Xiao Chen waves you over before your coffee number is called.\n\nXiao Chen: 'Tell me three things international students complain about but never report officially.'\n\nYou: 'That is your opening question?'\n\nXiao Chen: 'Small problems are honest. Big visions lie.'\n\nHe talks fast, but the useful part is not startup glamour. It is how quickly he notices friction other people accept as normal.",
    choices: [
      {
        text: "Turn one campus complaint into a testable idea.",
        next: "hub",
        effects: { stats: { digitalProficiency: 6, culture: 3, energy: -5 }, guanxi: { localStudents: 4 }, relationships: { "Xiao Chen": { friendship: 6 } } }
      }
    ]
  },
  "event_xiao_chen_business": {
    speaker: "Xiao Chen",
    text: "Xiao Chen sends you a prototype link, then immediately sends three corrections to his own message.\n\nXiao Chen: 'You know the international-student side better than I do. Help me test this with real users? Tiny pilot. No co-founder fantasy.'\n\nYou: 'Define tiny.'\n\nXiao Chen: 'Tiny enough to survive. Big enough to prove I am not imagining the problem.'\n\nIt is a small experiment with real users, real friction, and very little sleep.",
    choices: [
      {
        text: "Agree to a tiny, measurable pilot.",
        next: "hub",
        effects: { stats: { digitalProficiency: 8, culture: 4, energy: -10 }, guanxi: { localStudents: 6, intlStudents: 4 }, relationships: { "Xiao Chen": { friendship: 8 } }, flags: { xiao_chen_startup: true, xiao_chen_city_prototype: true } }
      }
    ]
  },
  "event_sophie": {
    speaker: "Sophie",
    text: "Sophie claims the quiet corner table before the common room fills up.\n\nSophie: 'Status check. Are you okay, or are you doing the thing where you say okay because explaining would take too long?'\n\nYou: 'The second one, probably.'\n\nSophie: 'Good. Then we skip the performance.'\n\nYou trade payment failures, homesickness, and the weird relief of being understood without explaining every detail first.",
    choices: [
      {
        text: "Trade coping notes and promise to check in again.",
        next: "hub",
        effects: { stats: { energy: 8 }, guanxi: { intlStudents: 8 }, relationships: { "Sophie": { friendship: 8 } } }
      }
    ]
  },
  "event_sophie_date": {
    speaker: "Sophie",
    text: "Sophie stops by the railing and watches the river traffic cut light across the water.\n\nSophie: 'I like that this does not have to be dramatic.'\n\nYou: 'A very bold review of a date.'\n\nSophie: 'Maybe that is the point. Here, everything is already intense. I like when something can just be honest.'\n\nIf there is affection here, it grows out of shared context, not fireworks.",
    choices: [
      {
        text: "Let the moment stay gentle and honest.",
        next: "hub",
        effects: { stats: { energy: 6, culture: 3 }, relationships: { "Sophie": { romance: 6, friendship: 6 } }, flags: { sophie_dated: true } }
      }
    ]
  },
  "event_uncle_wang": {
    speaker: "Uncle Wang",
    text: "Uncle Wang points at the tiny plastic stool like he is assigning you an important position.\n\nUncle Wang: 'Sit. Your Chinese is better when you are eating.'\n\nYou: 'That may be because my mouth is full and I make fewer mistakes.'\n\nUncle Wang: 'Exactly. Very advanced strategy.'\n\nHe adds extra lamb to your plate and keeps the jokes coming until the street feels less anonymous.",
    choices: [
      {
        text: "Enjoy the authentic street culture.",
        next: "hub",
        effects: { stats: { energy: +30, culture: +15, chinese: +5 }, relationships: { "Uncle Wang": { friendship: +10 } } }
      }
    ]
  },
  "event_uncle_wang_baijiu": {
    speaker: "Uncle Wang",
    text: "Uncle Wang lifts the baijiu bottle with theatrical seriousness, then sees your face and bursts out laughing.\n\nUncle Wang: 'Relax. I am not trying to destroy the foreign student tonight.'\n\nYou: 'I appreciate being preserved.'\n\nUncle Wang pours tea instead. 'Belonging is not a test,' he says. 'Drink this. Eat more.'\n\nThe real ritual is being included without being pushed past your limits.",
    choices: [
      {
        text: "Accept the tea, the joke, and the belonging.",
        next: "hub",
        effects: { stats: { energy: 4, culture: 8, chinese: 4 }, relationships: { "Uncle Wang": { friendship: 8 } }, flags: { uncle_wang_drank: true } }
      }
    ]
  },
  "event_dr_mei": {
    speaker: "Dr. Mei",
    text: "After the lecture, Dr. Mei erases one diagram and leaves the messier one on the board.\n\nDr. Mei: 'The clean model is for exams. The messy model is for reality.'\n\nYou: 'So which one should I ask about?'\n\nDr. Mei: 'Ask about the contradiction. That is usually where the research begins.'\n\nYour question lands well enough that she pauses, then answers as if you are worth the extra time.",
    choices: [
      {
        text: "Ask a smart question.",
        next: "hub",
        effects: { stats: { academics: +10, energy: -5 }, relationships: { "Dr. Mei": { friendship: +10 } } }
      }
    ]
  },
  "event_dr_mei_lab": {
    speaker: "Dr. Mei",
    text: "Dr. Mei opens a shared folder full of notes that look calm only from a distance.\n\nDr. Mei: 'I need someone careful. Clean the interview notes, flag unclear translations, prepare a small appendix.'\n\nYou: 'No dramatic research breakthrough?'\n\nDr. Mei: 'The breakthrough is learning not to invent one.'\n\nIt is not instant co-authorship. It is trust measured in careful tasks.",

        text: "Take furious notes and format citations.",

      }
    ]
  },
  "event_manager_zhang": {
    speaker: "Manager Zhang",
    text: "Manager Zhang finishes the panel with the calm of someone who has answered the same internship question four hundred times.\n\nManager Zhang: 'Most students ask how to look impressive. Fewer ask how to be useful legally and consistently.'\n\nYou: 'Then I should ask the second one.'\n\nManager Zhang: 'Good. Start with your Chinese introduction. Short, clear, no inflated adjectives.'\n\nThe handshake is brief, but he remembers your name.",

  "event_manager_zhang_dinner": {
    speaker: "Manager Zhang",
    text: "At the alumni dinner, Manager Zhang listens without smiling too early.\n\nManager Zhang: 'Tell me your plan without application language.'\n\nYou: 'That removes about half my vocabulary.'\n\nManager Zhang: 'Excellent. Now we can start.'\n\nHe asks direct questions, marks which parts sound real, and explains what a legal internship path would actually require.",

const getSceneBgmId = (state, node, screenMode) => {
    if (screenMode !== "game") return "title";

    const phase = state?.phase || "Application";
    const nodeId = state?.currentNodeId || "";
    const speaker = node?.speaker || "";
    const location = node?.location || "";
    const text = node?.text || "";
    const context = `${nodeId} ${speaker} ${location} ${text}`;

    if (/Out of Money|Financial Emergency|money crisis|ending_out_of_money|quiet return|game_over_wealth/i.test(context)) {
        return "crisisMoney";
    }
    if (/ending_/i.test(nodeId)) {
        if (/out_of_money|quiet|failed|bad/i.test(nodeId)) return "quietEnding";
        return "goodEnding";
    }
    if (/Xiao Chen|incubator|demo|prototype|startup|angel/i.test(context)) return "startupDemo";
    if (/Manager Zhang|Career Office|internship|office badge|return offer|alumni dinner/i.test(context)) return "careerOffice";
    if (/Uncle Wang|Neighbor Li|BBQ|barbecue|skewer|festival|neighborhood/i.test(context)) return "localLife";
    if (/Sophie|International Student|support circle|common room|orientation/i.test(context)) return "socialWarm";
    if (/Professor Lin|Dr\\. Mei|Library|research|classroom|midterm|academic|office hours/i.test(context)) return "studyLibrary";
    if (/Bund|Metro|Line 2|Lujiazui|Shanghai city|Fuxing|nightlife|city/i.test(context)) return "shanghaiCity";

    if (phase === "Application") {
        if (/deadline|interview|submit|feedback|decision|result/i.test(context)) return "applicationPressure";
        return "applicationLateNight";
    }
    if (phase === "Pre-Departure") {
        if (/JW202|visa|document|admission package|paperwork/i.test(context)) return "documentsAdmin";
        if (/flight|boarding|airplane|arrival|Pudong/i.test(context)) return "flightArrival";
        return "predepartureHome";
    }
    if (phase === "In-China" && !state?.flags?.arrived_in_china) {
        return "flightArrival";
    }

    return "campusDaily";
};

const getSceneAmbienceId = (state, node, screenMode) => {
    if (screenMode !== "game") return null;

    const phase = state?.phase || "Application";
    const speaker = node?.speaker || "";
    const location = node?.location || "";
    const text = node?.text || "";
    const bgImage = node?.bgImage || "";
    const context = `${speaker} ${location} ${text} ${bgImage}`;

    if (/Pudong|airport|arrival hall|arrivals|flight|boarding|airplane/i.test(context)) return "airportArrivals";
    if (/canteen|first meal|Alipay|meal card|food court/i.test(context)) return "canteen";
    if (/Library|midterm|study group|lecture|classroom|research notes/i.test(context)) return "library";
    if (/Career Office|office badge|Manager Zhang|internship|alumni dinner|office tower/i.test(context)) return "office";
    if (/Incubator|startup|prototype|demo|Xiao Chen|telemetry/i.test(context)) return "incubator";
    if (/Metro|Line 2|subway|DiDi|pickup zone|Bund|Lujiazui|Fuxing|street|gate/i.test(context)) return "streetNight";
    if (/Uncle Wang|BBQ|barbecue|skewer|stall|hotpot/i.test(context)) return "bbqStall";
    if (/Dorm|roommate|housing|parcel|common room|Sophie|International Student/i.test(context)) return "dormRoom";

};

function TimelineNode({ title, desc, active, completed, children }) {
    let dotColor = "bg-slate-700 border-slate-900";
    let textColor = "text-slate-500";
    if (completed) {
        dotColor = "bg-emerald-500 border-slate-900";
        textColor = "text-slate-300";
    } else if (active) {
        dotColor = "bg-sky-400 border-sky-900 shadow-[0_0_15px_rgba(56,189,248,0.5)]";
        textColor = "text-white";
    }

    return (
        <div className="pl-12 relative">
            <div className={`absolute left-[0.85rem] top-1.5 w-4 h-4 rounded-full border-[4px] z-10 transition-all ${dotColor}`}></div>
            <div className={`text-base font-bold ${active ? 'text-sky-400' : (completed ? 'text-emerald-400' : 'text-slate-500')} mb-1`}>
                {title}
            </div>
            <p className={`${textColor} text-xs mb-2`}>{desc}</p>
            <div className="bg-slate-800/80 p-3 rounded-xl flex flex-col gap-1.5 border border-slate-700/50 shadow-inner">
                {children}
            </div>
        </div>
    );
}

function DecisionFlag({ label, value }) {
    if (!value) {
        return (
            <div className="flex justify-between items-center text-xs opacity-50">
                <span className="text-slate-500">{label}:</span>
                <span className="text-slate-600 font-mono italic">Pending...</span>
            </div>
        );
    }
    return (
        <div className="flex justify-between items-center text-xs bg-slate-900/50 p-1.5 px-2 rounded-lg border border-slate-700/50">
            <span className="text-slate-400 shrink-0 mr-3">{label}:</span>
            <span className="text-sky-300 font-medium text-right break-words">{value}</span>
        </div>
    );
}

function getCalendarItems(state) {
    const flags = state.flags || {};
    const items = [];

    const addItem = (id, week, title, desc) => {
        const weeksAway = week - state.turn;
        const tone = weeksAway <= 0 ? "urgent" : weeksAway <= 2 ? "soon" : "future";
        const weekLabel = weeksAway <= 0 ? `Week ${week} • due now` : `Week ${week} • in ${weeksAway} week${weeksAway === 1 ? "" : "s"}`;
        items.push({ id, week, title, desc, tone, weekLabel });
    };

    if (state.phase === "Application") {
        if (!flags.completed_application) {
            addItem("application_deadline", 8, "Minghai Application Deadline", "Statement, school research, documents, interview prep, and final submission all converge here.");
        }
        if (!flags.decision_e1_plan) {
            addItem("statement_draft", 5, "Statement Draft Lock", "A credible study plan should explain why China, why Minghai, and why this major now.");
        }
        if (!flags.finance_scholarship && !flags.finance_rich && !flags.finance_working) {
            addItem("funding_plan", 6, "Funding Plan Check", "Your first serious economic choice shapes pressure for the whole year.");
        }
    }

    if (state.phase === "Pre-Departure") {
        if (!flags.got_visa) {
            addItem("x1_visa", 12, "X1 Visa Appointment", "Passport, Admission Letter, JW202, copies, photos, and one careful queue.");
        }
        if (!flags.decision_e2_wechat) {
            addItem("phone_payment", 13, "Digital Setup", "WeChat, Alipay, maps, translation backups, and ride-hailing preparation make later arrival choices possible.");
        }
        if (!flags.departed_for_shanghai) {
            addItem("flight_week", 16, "Boarding Week", "Shanghai stops being a plan and becomes a place.");
        }
    }

    if (state.phase === "In-China") {
        if (!flags.decision_e3_registration) {
            addItem("registration", 18, "Registration Window", "Student card, account setup, campus systems, and residence-permit rhythm.");
        }
        if (state.turn < 24) {
            addItem("midterm", 24, "Midterm Checkpoint", "Your habits start showing receipts: classes, energy, relationships, and money all speak at once.");
        }
        if (state.turn < 28) {
            addItem("future_direction", 28, "Future Direction", "Research, career, local integration, student support, or city opportunity becomes more than a vibe.");
        }
        if (state.turn < 32) {
            addItem("year_end_review", 32, "Year-End Review", "Routes, relationships, and pressure turn into an ending.");
        }
    }

    if (items.length === 0) {
        items.push({
            id: "open_week",
            week: state.turn,
            title: "Open Week",
            desc: "No critical deadline is screaming right now. This is a good week to invest in a route, repair a relationship, or recover Energy.",
            tone: "ready",
            weekLabel: `Week ${state.turn} • flexible`
        });
    }

    return items.sort((a, b) => a.week - b.week).slice(0, 5);
}

function CharacterArcCard({ arc }) {
    const meta = getContactMeta(arc.name);
    const pct = Math.round((arc.completedStages / arc.stages.length) * 100);
    const tone = arc.completedStages >= 4
        ? "border-amber-300/40 bg-amber-300/10 text-amber-100"
        : arc.completedStages >= 2
          ? "border-sky-300/35 bg-sky-300/10 text-sky-100"
          : arc.completedStages >= 1
            ? "border-emerald-300/35 bg-emerald-300/10 text-emerald-100"
            : "border-slate-700 bg-slate-900/80 text-slate-300";

    return (
        <div className={`rounded-xl border p-3 ${tone}`}>
            <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <div className="flex items-center gap-3">
                    <div className="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-slate-950/60 text-2xl">{meta.emoji}</div>
                    <div>
                        <div className="font-black text-white">{arc.name}</div>
                        <div className="text-[10px] font-bold uppercase tracking-[0.16em] opacity-70">{meta.route} / {arc.stageLabel}</div>
                    </div>
                </div>
                <div className="text-right font-mono text-xs">
                    <div className="font-black">{arc.completedStages}/{arc.stages.length}</div>
                    <div className="opacity-70">Bond {arc.bond}</div>
                </div>
            </div>
            <div className="mt-3 h-2 overflow-hidden rounded-full bg-slate-950/60">
                <div className="h-full rounded-full bg-current transition-all duration-500" style={{ width: `${pct}%` }}></div>
            </div>
            <div className="mt-3 grid grid-cols-2 gap-2 sm:grid-cols-4">
                {arc.stages.map(stage => (
                    <div key={stage.label} className={`rounded-lg border px-2 py-1 text-[10px] font-semibold ${stage.done ? "border-current bg-white/10 text-white" : "border-slate-700 bg-slate-950/45 text-slate-500"}`}>
                        {stage.done ? "✓ " : ""}{stage.label}
                    </div>
                ))}
            </div>
        </div>
    );
}

function getWeChatMeetup(name, flags, phase, turn) {
    if (phase !== "In-China") return null;

    const firstMeetups = {};

    if (!flags.contact_professor_lin_talk_1) {
        firstMeetups["Professor Lin"] = { label: "Talk", nodeId: "event_contact_professor_lin_talk_1" };
    } else if (!flags.request_professor_lin_class_question) {
        firstMeetups["Professor Lin"] = { label: "Request", nodeId: "event_request_professor_lin_class_question" };
    }

    if (flags.met_dr_mei && !flags.contact_dr_mei_talk_1) {
        firstMeetups["Dr. Mei"] = { label: "Coffee", nodeId: "event_contact_dr_mei_talk_1" };
    } else if (flags.contact_dr_mei_talk_1 && !flags.request_dr_mei_field_notes) {
        firstMeetups["Dr. Mei"] = { label: "Request", nodeId: "event_request_dr_mei_field_notes" };
    }

    if (!flags.contact_sophie_talk_1) {
        firstMeetups.Sophie = { label: "Check-in", nodeId: "event_contact_sophie_talk_1" };
    } else if (!flags.request_sophie_new_student) {
        firstMeetups.Sophie = { label: "Request", nodeId: "event_request_sophie_new_student" };
    }

    if (flags.met_lin_yue && !flags.contact_lin_yue_talk_1) {
        firstMeetups["Lin Yue"] = { label: "Talk", nodeId: "event_contact_lin_yue_talk_1" };
    } else if (flags.contact_lin_yue_talk_1 && !flags.request_lin_yue_presentation) {
        firstMeetups["Lin Yue"] = { label: "Request", nodeId: "event_request_lin_yue_presentation" };
    }

    if (flags.met_neighbor_li && !flags.contact_neighbor_li_talk_1) {
        firstMeetups["Neighbor Li"] = { label: "Dorm map", nodeId: "event_contact_neighbor_li_talk_1" };
    } else if (flags.contact_neighbor_li_talk_1 && !flags.request_neighbor_li_parcel) {
        firstMeetups["Neighbor Li"] = { label: "Request", nodeId: "event_request_neighbor_li_parcel" };
    }

    if (flags.met_uncle_wang && !flags.contact_uncle_wang_talk_1) {
        firstMeetups["Uncle Wang"] = { label: "Stall talk", nodeId: "event_contact_uncle_wang_talk_1" };
    } else if (flags.contact_uncle_wang_talk_1 && !flags.request_uncle_wang_order_help) {
        firstMeetups["Uncle Wang"] = { label: "Request", nodeId: "event_request_uncle_wang_order_help" };
    }

    if (flags.met_manager_zhang && !flags.contact_manager_zhang_talk_1) {
        firstMeetups["Manager Zhang"] = { label: "Career chat", nodeId: "event_contact_manager_zhang_talk_1" };
    } else if (flags.contact_manager_zhang_talk_1 && !flags.request_manager_zhang_answer) {
        firstMeetups["Manager Zhang"] = { label: "Request", nodeId: "event_request_manager_zhang_answer" };
    }

    if (flags.met_xiao_chen && !flags.contact_xiao_chen_talk_1) {
        firstMeetups["Xiao Chen"] = { label: "Walk", nodeId: "event_contact_xiao_chen_talk_1" };
    } else if (flags.contact_xiao_chen_talk_1 && !flags.request_xiao_chen_onboarding) {
        firstMeetups["Xiao Chen"] = { label: "Request", nodeId: "event_request_xiao_chen_onboarding" };
    }

    if (firstMeetups[name]) return firstMeetups[name];
    if (turn < 21) return null;

    const meetups = {
        "Professor Lin": flags.lin_academic_method && !flags.lin_recommendation_ready && {
            label: "Office hours",
            nodeId: "event_academic_lin_recommendation"
        },
        "Dr. Mei": flags.dr_mei_research_question && !flags.dr_mei_project_commitment && {
            label: "Project meet",
            nodeId: "event_academic_dr_mei_project_commitment"

        "Sophie": flags.sophie_support_circle && !flags.sophie_orientation_committee && {

            label: "Boundary talk",
            nodeId: "event_lin_yue_boundary_tension"
        } : flags.request_lin_yue_presentation && !flags.lin_yue_presentation_partner ? {
            label: "Practice",
            nodeId: "event_lin_yue_library_presentation"
        } : flags.lin_yue_midterm_tension_resolved && !flags.lin_yue_family_pressure ? {
            label: "Check in",
            nodeId: "event_lin_yue_family_pressure",
            cost: 20
        } : null,
        "Neighbor Li": flags.neighbor_li_local_trust && !flags.neighbor_li_festival_invite && {
            label: "Festival prep",
            nodeId: "event_local_neighbor_li_festival",
            cost: 20
        },
        "Uncle Wang": flags.uncle_wang_neighborhood_story && !flags.uncle_wang_regular && {
            label: "Regular table",
            nodeId: "event_local_uncle_wang_regular",

            label: "Demo day",

    return meetups[name] || null;

                { label: "Real Reason", done: flags.uncle_wang_midterm_tension_resolved || flags.uncle_wang_honest_answer || flags.uncle_wang_polite_answer },
                { label: "Regular Table", done: flags.uncle_wang_regular }
            ]
        },
        {
            name: "Manager Zhang",
            stages: [
                { label: "Career Chat", done: flags.contact_manager_zhang_talk_1 || flags.met_manager_zhang },

                { label: "Referral", done: flags.manager_zhang_referral_ready }
            ]
        },
        {
            name: "Xiao Chen",
            stages: [
                { label: "Market Walk", done: flags.contact_xiao_chen_talk_1 || flags.wechat_xiao_chen_added },
                { label: "Prototype Trust", done: flags.xiao_chen_city_prototype || flags.request_xiao_chen_onboarding },
                { label: "Reliability Conflict", done: flags.xiao_chen_midterm_tension_resolved || flags.xiao_chen_responsible_pace || flags.city_speed_over_care },
                { label: "Demo Day", done: flags.xiao_chen_demo_day }
            ]
        }
    ];

    return arcs.map(arc => {
        const rel = relationships[arc.name] || {};
        const completedStages = arc.stages.filter(stage => stage.done).length;
        return {
            ...arc,
            completedStages,
            bond: rel.friendship || 0,
            stageLabel: completedStages >= 4 ? "Complete" : completedStages >= 3 ? "Conflict" : completedStages >= 2 ? "Trust" : completedStages >= 1 ? "Contact" : "Unknown"
        };

function getWeChatPriorityMessages(state) {
    const flags = state.flags || {};
    const relationships = state.relationships || {};
    const phase = state.phase;
    const turn = state.turn || 1;
    if (phase !== "In-China") return [];

    const messages = Object.keys(relationships)
        .map(name => {
            const meetup = getWeChatMeetup(name, flags, phase, turn);
            if (!meetup) return null;
            const meta = getContactMeta(name);
            const stage = getRelationshipStage(name, relationships[name] || {}, flags);
            return {
                from: name,
                emoji: meta.emoji,
                route: meta.route,
                nodeId: meetup.nodeId,
                cost: meetup.cost || 0,
                effects: meetup.effects || {},
                actionLabel: meetup.label,
                stage: stage.label,
                preview: getWeChatMessagePreview(name, meetup.nodeId, flags)
            };
        })
        .filter(Boolean);

    return messages.slice(0, 6);
}

function getRelationshipStage(name, data, flags) {
    const friendship = data.friendship || 0;
    const commitmentFlags = {
        "Professor Lin": flags.lin_recommendation_ready,
        "Dr. Mei": flags.dr_mei_project_commitment,
        "Sophie": flags.sophie_orientation_committee,
        "Lin Yue": flags.lin_yue_riverside_walk,
        "Neighbor Li": flags.neighbor_li_festival_invite,
        "Uncle Wang": flags.uncle_wang_regular,
        "Manager Zhang": flags.manager_zhang_referral_ready,
        "Xiao Chen": flags.xiao_chen_demo_day
    };
    const tensionFlags = {
        "Professor Lin": flags.lin_midterm_tension_resolved,
        "Dr. Mei": flags.dr_mei_midterm_tension_resolved,
        "Sophie": flags.sophie_midterm_tension_resolved,
        "Lin Yue": flags.lin_yue_midterm_tension_resolved,
        "Neighbor Li": flags.neighbor_li_midterm_tension_resolved,
        "Uncle Wang": flags.uncle_wang_midterm_tension_resolved,
        "Manager Zhang": flags.manager_zhang_midterm_tension_resolved,
        "Xiao Chen": flags.xiao_chen_midterm_tension_resolved
    };
    const trustFlags = {
        "Professor Lin": flags.lin_academic_method,
        "Dr. Mei": flags.dr_mei_project_trust,
        "Sophie": flags.sophie_support_circle,
        "Lin Yue": flags.lin_yue_presentation_partner || flags.lin_yue_family_pressure,
        "Neighbor Li": flags.neighbor_li_local_trust,
        "Uncle Wang": flags.uncle_wang_neighborhood_story,
        "Manager Zhang": flags.manager_zhang_career_trust,
        "Xiao Chen": flags.xiao_chen_city_prototype
    };

    if (commitmentFlags[name]) {
        return { label: "Commitment", order: 4, className: "bg-amber-50 border-amber-300 text-amber-700", barClass: "bg-amber-400" };
    }
    if (tensionFlags[name]) {
        return { label: "Tension Resolved", order: 3, className: "bg-orange-50 border-orange-300 text-orange-700", barClass: "bg-orange-400" };
    }
    if (trustFlags[name] || friendship >= 12) {
        return { label: "Trust", order: 2, className: "bg-sky-50 border-sky-300 text-sky-700", barClass: "bg-sky-400" };
    }
    if (friendship > 0) {
        return { label: "Contact", order: 1, className: "bg-emerald-50 border-emerald-300 text-emerald-700", barClass: "bg-emerald-400" };
    }
    return { label: "Unknown", order: 0, className: "bg-gray-50 border-gray-300 text-gray-500", barClass: "bg-gray-300" };
}

function StoryPanel({ node, state, availableChoices, availableDialogueChoices = [], onChoice, onDialogueChoice, onTextTick, onShowScene }) {
  const [showChoices, setShowChoices] = useState(false);
  const [textKey, setTextKey] = useState(0);
  const [displayText, setDisplayText] = useState("");
  const [selectedDialogueChoice, setSelectedDialogueChoice] = useState(null);
  const fullTextRef = useRef("");
  const onTextTickRef = useRef(onTextTick);
  const typewriterIntervalRef = useRef(null);

  useEffect(() => {
    onTextTickRef.current = onTextTick;
  }, [onTextTick]);

  const revealFullText = () => {
    if (typewriterIntervalRef.current) {
      clearInterval(typewriterIntervalRef.current);
      typewriterIntervalRef.current = null;
    }
    setDisplayText(fullTextRef.current || node?.text || "");
    setShowChoices(true);
  };

  useEffect(() => {
    // Reset animations when node changes
    setShowChoices(false);
    setTextKey(prev => prev + 1);
    setDisplayText("");
    setSelectedDialogueChoice(null);

    if (!node) return;

    // Typewriter effect
    let currentText = "";

    // Append a grounded personal afterword for endings, based on the strongest relationship arc.
    const isEndingNode = node.choices && node.choices.some(c => c.action === "reset_game");
    const epilogues = isEndingNode ? buildEndingAfterword(state) : "";

    const fullText = (node.text || "") + epilogues;
    fullTextRef.current = fullText;
    let i = 0;

    if (typewriterIntervalRef.current) {
      clearInterval(typewriterIntervalRef.current);
      typewriterIntervalRef.current = null;
    }

    const interval = setInterval(() => {
      const nextChar = fullText.charAt(i);
      currentText += nextChar;
      setDisplayText(currentText);
      if (nextChar.trim() && i % 3 === 0) {
        onTextTickRef.current?.();
      }
      i++;
      if (i >= fullText.length) {
        clearInterval(interval);
        typewriterIntervalRef.current = null;
        setShowChoices(true);
      }
    }, 20); // 20ms per character
    typewriterIntervalRef.current = interval;

    return () => {
      clearInterval(interval);
      if (typewriterIntervalRef.current === interval) {
        typewriterIntervalRef.current = null;
      }
    };
  }, [node, state]);

  useEffect(() => {
    const handleKeyDown = (e) => {
        if (e.target?.closest?.('[data-week-transition]')) return;

        const isSpace = e.key === " " || e.key === "Spacebar" || e.key === "Space" || e.code === "Space";
        const isEnter = e.key === "Enter";

        if (isSpace || isEnter) {
            e.preventDefault();

            if (!showChoices) {
              revealFullText();
            } else if (node?.storyBeat && availableChoices?.length === 1 && availableDialogueChoices.length === 0) {
              onChoice(availableChoices[0]);
            }

            return;
        }

        if (!showChoices) {
           return;
        }

        // Number keys for choices
        const num = parseInt(e.key);
        const activeDialogueChoices = availableDialogueChoices.length > 0 && !selectedDialogueChoice
          ? availableDialogueChoices
          : [];
        const activeChoices = activeDialogueChoices.length > 0 ? activeDialogueChoices : availableChoices;

        if (!isNaN(num) && num > 0 && activeChoices && num <= activeChoices.length) {
            e.preventDefault();
            if (activeDialogueChoices.length > 0) {
              handleDialogueChoice(activeDialogueChoices[num - 1]);
            } else {
              onChoice(activeChoices[num - 1]);
            }
        }
    };
    document.addEventListener("keydown", handleKeyDown, true);
    return () => document.removeEventListener("keydown", handleKeyDown, true);
  }, [showChoices, availableChoices, availableDialogueChoices, selectedDialogueChoice, node, onChoice, onDialogueChoice]);

  if (!node) return null;

  const pendingDialogueChoices = showChoices && availableDialogueChoices.length > 0 && !selectedDialogueChoice
    ? availableDialogueChoices
    : [];
  const visibleActionChoices = showChoices && pendingDialogueChoices.length === 0
    ? availableChoices
    : [];

  const handleDialogueChoice = (choice) => {
    onDialogueChoice?.(choice);
    setSelectedDialogueChoice(choice);

    const playerLine = choice.say || choice.text;
    const response = choice.responseText || (choice.reply ? `${node.speaker || "Character"}: '${choice.reply}'` : "");
    const branchText = [
      playerLine ? `You: '${playerLine}'` : "",
      response
    ].filter(Boolean).join("\n\n");
    const nextText = `${fullTextRef.current}${branchText ? `\n\n${branchText}` : ""}`;

    fullTextRef.current = nextText;
    setDisplayText(nextText);
    setShowChoices(true);
  };

  const speakerImages = {
    "Professor Lin": "images/simulator/characters_v2/professor_lin_v2.jpg",
    "Professor": "images/simulator/characters_v2/professor_lin_v2.jpg",
    "Professor's Table": "images/simulator/characters_v2/professor_lin_v2.jpg",
    "Dr. Mei": "images/simulator/characters_v2/dr_mei_v2.jpg",
    "Manager Zhang": "images/simulator/characters_v2/manager_zhang_v2.jpg",
    "Xiao Chen": "images/simulator/characters_v2/xiao_chen_v2.jpg",
    "Lin Yue": "images/simulator/characters_v2/lin_yue_v2.png",
    "Sophie": "images/simulator/characters_v2/sophie_v2.jpg",
    "Uncle Wang": "images/simulator/characters_v2/uncle_wang_v2.jpg",
    "Neighbor Li": "images/simulator/characters_v2/neighbor_li_v2.jpg",
    "Language Partner": "images/simulator/characters_v2/language_partner_v2.jpg",
    "Local Friends": "images/simulator/characters_v2/local_friend_v2.jpg",
    "Local Classmates": "images/simulator/characters_v2/local_friend_v2.jpg",
    "Study Group": "images/simulator/characters_v2/local_friend_v2.jpg",
    "Canteen Auntie": "images/simulator/characters_v2/canteen_auntie_v2.jpg",
    "Minghai Canteen": "images/simulator/characters_v2/canteen_auntie_v2.jpg",
    "Canteen Line": "images/simulator/characters_v2/canteen_auntie_v2.jpg",
    "Dorm Auntie": "images/simulator/characters_v2/dorm_auntie_v2.jpg",
    "Dorm Gate": "images/simulator/characters_v2/dorm_auntie_v2.jpg",
    "Meituan Delivery": "images/simulator/characters_v2/delivery_driver_v2.jpg",
    "Taxi Driver": "images/simulator/characters_v2/delivery_driver_v2.jpg",
    "Taxi Driver Lao Li": "images/simulator/characters_v2/delivery_driver_v2.jpg",
  };
  const speakerImg = node?.speaker ? speakerImages[node.speaker] : null;
  const isCharacterLine = Boolean(speakerImg);
  const usesVnDialogueLayout = isCharacterLine;
  const showSpeakerPortrait = Boolean(speakerImg);
  const isWeeklyPlanner = state?.phase === "In-China" && node.speaker === "Weekly Planner";
  const isEndingScreen = Boolean(node.choices?.some(choice => choice.action === "reset_game"));
  const isStoryBeat = Boolean(node.storyBeat) && visibleActionChoices?.length === 1;
  const useCompactChoiceGrid = isWeeklyPlanner && pendingDialogueChoices.length === 0 && visibleActionChoices?.length >= 6;
  const useDenseChoiceList = !isWeeklyPlanner && !isStoryBeat && pendingDialogueChoices.length === 0 && visibleActionChoices?.length >= 4;
  const hasDialogueReplies = pendingDialogueChoices.length > 0;
  const choiceMenuClass = usesVnDialogueLayout
    ? `grid w-full max-w-6xl grid-cols-1 gap-2 self-center px-2 sm:pl-32 sm:pr-0 ${hasDialogueReplies || visibleActionChoices?.length > 1 ? "sm:grid-cols-3" : "sm:grid-cols-1"}`
    : hasDialogueReplies
    ? "grid w-full max-w-6xl grid-cols-1 gap-2 self-center px-2 sm:grid-cols-3"
    : useCompactChoiceGrid
    ? "grid max-h-[46vh] w-full grid-cols-1 gap-2 overflow-y-auto pr-1 sm:grid-cols-2 lg:grid-cols-3 lg:pl-56"
    : useDenseChoiceList
      ? "flex max-h-[50vh] flex-col gap-2 items-end overflow-y-auto pr-1"
      : `flex max-h-[58vh] flex-col gap-2 ${isStoryBeat ? "items-center" : "items-end"} overflow-y-auto pr-1`;
  const dialogueButtonClass = "group relative flex min-h-[50px] flex-col justify-center rounded-lg border border-cyan-300/45 bg-slate-950/80 px-3 py-2 text-left text-cyan-50 shadow-[0_14px_34px_rgba(0,0,0,0.5)] backdrop-blur-md transition-all hover:border-cyan-200 hover:bg-cyan-950/90";
  const actionButtonClass = useCompactChoiceGrid
    ? "bg-slate-900/90 border border-slate-700/60 hover:bg-slate-800 hover:border-amber-500 hover:text-amber-300 text-slate-200 px-3 py-2 rounded-lg text-left w-full min-h-[76px] shadow-xl backdrop-blur-md transition-all group flex flex-col relative"
    : useDenseChoiceList
      ? "bg-slate-900/90 border border-slate-700/50 hover:bg-slate-800 hover:border-amber-500 hover:text-amber-400 text-slate-200 px-3 py-2 rounded-lg text-left w-full sm:w-[58%] shadow-xl backdrop-blur-md transition-all group flex flex-col relative"
      : usesVnDialogueLayout
      ? "group relative flex min-h-[50px] flex-col justify-center rounded-lg border border-cyan-300/45 bg-slate-950/80 px-3 py-2 text-left text-cyan-50 shadow-[0_14px_34px_rgba(0,0,0,0.5)] backdrop-blur-md transition-all hover:border-cyan-200 hover:bg-cyan-950/90"
      : isStoryBeat
      ? "bg-amber-500/95 border border-amber-200/70 hover:bg-amber-400 text-slate-950 px-6 py-3 rounded-lg text-center w-auto min-w-40 shadow-xl transition-all group flex flex-col relative"
      : "bg-slate-900/90 border border-slate-700/50 hover:bg-slate-800 hover:border-amber-500 hover:text-amber-400 text-slate-200 px-4 py-3 rounded-xl text-left w-full sm:w-2/3 shadow-xl backdrop-blur-md transition-all group flex flex-col relative";
  const actionIndexClass = useCompactChoiceGrid
    ? "absolute left-2 top-2 text-slate-600 font-mono text-[10px] opacity-60 group-hover:opacity-100 group-hover:text-amber-500 transition-all"
    : "absolute left-3 top-1/2 -translate-y-1/2 text-slate-600 font-mono text-[10px] opacity-50 group-hover:opacity-100 group-hover:text-amber-500 transition-all";

  if (isEndingScreen) {
    return (
      <div className="z-10 flex flex-1 items-center justify-center p-6">
        <div
          key={textKey}
          onClick={() => {
            if (!showChoices) revealFullText();
          }}
          className="flex h-[82vh] w-full max-w-5xl flex-col overflow-hidden rounded-2xl border border-amber-200/25 bg-slate-950/88 shadow-[0_28px_90px_rgba(0,0,0,0.68)] backdrop-blur-md animate-in fade-in zoom-in-95 duration-500"
        >
          <EndingStoryContent text={displayText} showCursor={!showChoices} />
          {showChoices && visibleActionChoices?.length > 0 && (
            <div className="flex items-center justify-between border-t border-white/10 bg-slate-950/95 px-6 py-4">
              <div>
                <div className="text-[10px] font-black uppercase tracking-[0.28em] text-amber-200/70">Ending Complete</div>
                <div className="mt-1 text-xs text-slate-500">You can restart from a fresh run.</div>
              </div>
              <div className="flex items-center gap-3">
                {onShowScene && (
                  <button
                    tabIndex={-1}
                    onClick={onShowScene}
                    className="rounded-lg border border-sky-200/50 bg-sky-500/15 px-5 py-3 text-sm font-black uppercase tracking-[0.14em] text-sky-100 shadow-lg transition-all hover:bg-sky-400/25"
                  >
                    Show Scene
                  </button>
                )}
                {visibleActionChoices.map((choice, i) => (
                  <button
                    key={i}
                    tabIndex={-1}
                    onClick={() => onChoice(choice)}
                    className="rounded-lg border border-amber-200/70 bg-amber-500 px-6 py-3 text-sm font-black uppercase tracking-[0.14em] text-slate-950 shadow-lg transition-all hover:bg-amber-400"
                  >
                    {choice.text}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className={`${isWeeklyPlanner ? "max-w-6xl pb-6 pt-28" : (usesVnDialogueLayout ? "max-w-6xl pb-5 pt-20" : "max-w-5xl pb-12 pt-24")} flex-1 flex flex-col justify-end z-10 w-full mx-auto relative`}>

      {/* Choice Menu */}
      {!isEndingScreen && <div className={`${choiceMenuClass} ${usesVnDialogueLayout ? "mb-7" : "mb-3"} transition-all duration-700 ${showChoices ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 pointer-events-none'}`}>
        {pendingDialogueChoices.length > 0 && pendingDialogueChoices.map((choice, i) => (
          <button
            key={`dialogue-${i}`}
            tabIndex={-1}
            onClick={() => handleDialogueChoice(choice)}
            className={dialogueButtonClass}
          >
            <div className="flex items-start gap-2">
              <span className="mt-0.5 font-mono text-[10px] text-cyan-300/60 group-hover:text-cyan-200">[{i+1}]</span>
              <div className="min-w-0">
                <div className="text-[9px] font-black uppercase tracking-[0.18em] text-cyan-300/80">Reply</div>
                <div className="text-sm font-semibold leading-snug sm:text-[15px]">{choice.text}</div>
              </div>
              {choice.detail && <div className="mt-1 text-xs leading-snug text-cyan-100/70">{choice.detail}</div>}
            </div>
          </button>
        ))}
        {visibleActionChoices && visibleActionChoices.length > 0 && visibleActionChoices.map((choice, i) => (
          <button
            key={i}
            tabIndex={-1}
            onClick={() => onChoice(choice)}
            className={actionButtonClass}
          >
            {!isStoryBeat && <div className={actionIndexClass}>[{i+1}]</div>}
            <div className={isStoryBeat ? "" : "pl-5"}>
              <div className={`${useCompactChoiceGrid || useDenseChoiceList ? "text-sm" : "text-base"} font-medium leading-tight`}>{choice.text}</div>
              {choice.detail && <div className={`${useDenseChoiceList ? "mt-0.5" : "mt-1"} text-xs leading-snug text-slate-400 group-hover:text-slate-300`}>{choice.detail}</div>}
            </div>
            {!isStoryBeat && choice.effects && <ChoicePreview effects={choice.effects} compact={useCompactChoiceGrid || useDenseChoiceList} />}
          </button>
        ))}
      </div>}

      {/* Dialogue Box */}
      <div className={`flex w-full items-end gap-4 ${showSpeakerPortrait ? "justify-start" : "justify-center"}`}>
        {showSpeakerPortrait && (
          <div className={`hidden shrink-0 overflow-hidden border border-amber-200/30 bg-slate-950/80 shadow-[0_24px_70px_rgba(0,0,0,0.72)] animate-in slide-in-from-left-8 fade-in duration-700 ease-out sm:block ${usesVnDialogueLayout ? "h-36 w-28 rounded-2xl" : "h-80 w-56 rounded-t-[2rem] rounded-b-2xl"}`}>
            <img src={speakerImg} alt={node.speaker} className="h-full w-full object-cover object-center" />
          </div>
        )}

        <div
          key={textKey}
          onClick={() => {
            if (!showChoices) revealFullText();
          }}
          className={`${isCharacterLine ? "ending-scrollbar max-h-[27vh] max-w-none overflow-y-auto rounded-2xl border-amber-200/35 bg-slate-950/90 p-4" : (isWeeklyPlanner ? "max-w-5xl rounded-xl border-slate-700 bg-slate-900/95 p-3 sm:p-4" : "max-w-3xl rounded-xl border-slate-700 bg-slate-900/95 p-5")} relative min-w-0 w-full border backdrop-blur-md shadow-2xl animate-in fade-in slide-in-from-bottom-4 duration-500`}
        >
          {speakerImg && (
            <>
              <div className="absolute -left-2 bottom-9 hidden h-5 w-5 rotate-45 border-b border-l border-amber-200/40 bg-slate-950/95 sm:block"></div>
              <div className="mb-4 flex items-center gap-3 sm:hidden">
                <div className="h-16 w-16 overflow-hidden rounded-2xl border border-amber-200/30 bg-slate-950 shadow-lg">
                  <img src={speakerImg} alt={node.speaker} className="h-full w-full object-cover object-center" />
                </div>
                <div>
                  <div className="text-xs font-bold uppercase tracking-[0.22em] text-amber-300">Speaking Now</div>
                  <div className="text-lg font-semibold text-white">{node.speaker}</div>
                </div>
              </div>
            </>
          )}

          <div className="absolute -top-3 left-6 flex gap-2">
            <div className={`${isCharacterLine ? "bg-amber-300 text-slate-950" : "bg-amber-500 text-slate-900"} font-bold px-3 py-0.5 rounded shadow-md uppercase tracking-wider text-xs`}>
              {node.speaker || "Narrator"}
            </div>
            {isCharacterLine && (
              <div className="hidden rounded border border-amber-200/20 bg-slate-950/90 px-3 py-0.5 text-[10px] font-bold uppercase tracking-[0.18em] text-amber-100 shadow-md sm:block">
                Speaking To You
              </div>
            )}
            {node.location && (
              <div className="bg-slate-700 text-amber-400 border border-amber-500/30 font-bold px-3 py-0.5 rounded shadow-md uppercase tracking-wider text-xs flex items-center gap-1.5">
                📍 {node.location}
              </div>
            )}
          </div>

          <StoryTextContent
            text={displayText}
            isCharacterLine={isCharacterLine}
            compact={isWeeklyPlanner}
            showCursor={!showChoices}
          />
          {state?.phase === "In-China" && node.speaker === "Weekly Planner" && (
            <div className="mt-4 space-y-2 text-xs">
              <div className="rounded-lg border border-slate-600/50 bg-slate-950/70 px-3 py-2 text-slate-300">
                Choose a category above first; the next screen shows specific activities and their stat tradeoffs.
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div className="rounded-lg border border-cyan-400/25 bg-cyan-400/10 px-3 py-2 text-cyan-100">
                  <span className="font-bold">Weekday actions</span>
                  <span className="float-right font-mono">{state.weeklyActions?.weekday ?? 0}/3</span>
                </div>
                <div className="rounded-lg border border-amber-400/25 bg-amber-400/10 px-3 py-2 text-amber-100">
                  <span className="font-bold">Weekend action</span>
                  <span className="float-right font-mono">{state.weeklyActions?.weekend ?? 0}/1</span>
                </div>
              </div>
            </div>
          )}
          <div className="mt-4 text-right text-[10px] font-semibold uppercase tracking-[0.18em] text-slate-500">
            {showChoices ? (isStoryBeat ? "Continue." : (pendingDialogueChoices.length > 0 ? "Choose your reply with mouse or number keys." : "Choose with mouse or number keys. Space will not select.")) : "Press Space or Enter to finish this line."}
          </div>
        </div>
      </div>
    </div>
  );
}

function EndingStoryContent({ text, showCursor }) {
  const [endingText = "", afterwordText = ""] = (text || "").split(/\n\n--- PERSONAL AFTERWORD ---\n\n/);
  const cleanedEnding = endingText.replace(/^ENDING:\s*/i, "").trim();
  const titleMatch = cleanedEnding.match(/^([^.!?]+)[.!?]\s*([\s\S]*)$/);
  const endingTitle = titleMatch ? titleMatch[1].trim() : "Ending";
  const endingBody = titleMatch ? titleMatch[2].trim() : cleanedEnding;
  const endingSegments = parseStoryText(endingBody);
  const afterwordCards = afterwordText
    .split(/\n{2,}/)
    .map(card => card.trim())
    .filter(Boolean)
    .map(card => {
      const match = card.match(/^([^:]{3,42}):\s*([\s\S]*)$/);
      if (!match) return { title: "Memory", body: card };
      return { title: match[1].trim(), body: match[2].trim() };
    });

  return (
    <div className="ending-scrollbar min-h-0 flex-1 overflow-y-auto px-6 py-6">
      <div className="space-y-5">
        <section className="border-b border-white/10 pb-5">
          <div className="text-[10px] font-black uppercase tracking-[0.32em] text-amber-300">Ending</div>
          <h2 className="mt-3 font-serif text-3xl font-black leading-tight text-white sm:text-4xl">
            {endingTitle}
          </h2>
          {endingSegments.length > 0 && (
            <div className="mt-4 max-w-4xl space-y-3">
              {endingSegments.map((segment, index) => {
                const isLast = index === endingSegments.length - 1;
                if (segment.type === "dialogue") {
                  return (
                    <div key={`${segment.speaker}-${index}`} className="rounded-xl border border-white/10 bg-slate-950/35 px-4 py-3">
                      <div className="text-[10px] font-black uppercase tracking-[0.24em] text-amber-200">{segment.speaker}</div>
                      <p className="mt-1 whitespace-pre-wrap text-base leading-relaxed text-slate-100 sm:text-lg">
                        {segment.body}
                        {showCursor && afterwordCards.length === 0 && isLast && <span className="ml-1 inline-block w-1.5 animate-pulse bg-amber-500 opacity-50">&nbsp;</span>}
                      </p>
                    </div>
                  );
                }

                return (
                  <p key={`ending-narration-${index}`} className="whitespace-pre-wrap font-serif text-base leading-relaxed text-slate-100 sm:text-lg">
                    {segment.body}
                    {showCursor && afterwordCards.length === 0 && isLast && <span className="ml-1 inline-block w-1.5 animate-pulse bg-amber-500 opacity-50">&nbsp;</span>}
                  </p>
                );
              })}
            </div>
          )}
        </section>

        {afterwordCards.length > 0 && (
          <section className="space-y-2">
            <div className="text-[10px] font-black uppercase tracking-[0.32em] text-amber-200">Personal Afterword</div>
            <div className="divide-y divide-slate-700/70">
              {afterwordCards.map((card, index) => {
                const isLast = index === afterwordCards.length - 1;
                return (
                  <article key={`${card.title}-${index}`} className="py-3">
                    <div className="text-[10px] font-black uppercase tracking-[0.24em] text-cyan-200">{card.title}</div>
                    <p className="mt-2 whitespace-pre-wrap text-sm leading-relaxed text-slate-200 sm:text-base">
                      {card.body}
                      {showCursor && isLast && <span className="ml-1 inline-block w-1.5 animate-pulse bg-amber-500 opacity-50">&nbsp;</span>}
                    </p>
                  </article>
                );
              })}
            </div>
          </section>
        )}
      </div>
    </div>
  );
}

function StoryTextContent({ text, isCharacterLine, compact = false, showCursor }) {
  const segments = parseStoryText(text);

  if (segments.length === 0) {
    return (
      <div className={`${isCharacterLine ? "font-sans text-xl text-slate-50" : (compact ? "font-serif text-base text-slate-100" : "font-serif text-lg text-slate-100")} leading-relaxed mt-2 min-h-[3rem]`}>
        {showCursor && <span className="inline-block w-1.5 bg-amber-500 opacity-50 animate-pulse ml-1">&nbsp;</span>}
      </div>
    );
  }

  return (
    <div className={`${isCharacterLine ? "font-sans text-lg text-slate-50" : (compact ? "font-serif text-base text-slate-100" : "font-serif text-lg text-slate-100")} mt-2 min-h-[3rem] space-y-3 leading-relaxed`}>
      {segments.map((segment, index) => {
        const isLast = index === segments.length - 1;
        const cursor = showCursor && isLast ? (
          <span className="inline-block w-1.5 bg-amber-500 opacity-50 animate-pulse ml-1">&nbsp;</span>
        ) : null;

        if (segment.type === "dialogue") {
          const isPlayer = segment.speaker === "You";
          return (
            <div key={index} className={`flex ${isPlayer ? "justify-end" : "justify-start"}`}>
              <div className={`${isPlayer ? "border-cyan-300/35 bg-cyan-950/45 text-cyan-50" : "border-amber-200/30 bg-slate-900/80 text-slate-50"} max-w-[88%] rounded-lg border px-4 py-3 shadow-lg`}>
                <div className={`${isPlayer ? "text-cyan-300" : "text-amber-300"} mb-1 text-[11px] font-bold uppercase tracking-[0.16em]`}>
                  {segment.speaker}
                </div>
                <div className="whitespace-pre-wrap text-base sm:text-lg">
                  {segment.body}
                  {cursor}
                </div>
              </div>
            </div>
          );
        }

        return (
          <p key={index} className={`${isCharacterLine ? "text-slate-200/90" : "text-slate-100"} whitespace-pre-wrap ${compact ? "text-base" : "text-base sm:text-lg"}`}>
            {segment.body}
            {cursor}
          </p>
        );
      })}
    </div>
  );
}

function parseStoryText(text) {
  if (!text) return [];

  return text
    .split(/\n{2,}/)
    .filter(segment => segment.length > 0)
    .map(segment => {
      const match = segment.match(/^([A-Za-z][A-Za-z .'-]{0,34}):\s*([\s\S]*)$/);
      if (!match) {
        return { type: "narration", body: segment };
      }

      const speaker = match[1].trim();
      if (speaker.split(/\s+/).length > 3) {
        return { type: "narration", body: segment };
      }
      const body = match[2];

      return { type: "dialogue", speaker, body };
    });
}

function buildEndingAfterword(state) {
   if (!state) return "";

   const flags = state.flags || {};
   const relationshipLines = getTopRelationships(state.relationships || {}, 3)
      .map(({ name, rel }) => getRelationshipAfterword(name, rel, flags))
      .filter(Boolean);
   const systemLines = getSystemMemoryReflections(flags);
   const routeLine = getRouteReportLine(state);
   const lifeCheckLine = getLifeCheckReportLine(state);
   const personalLine = getPersonalReflection(flags);
   const lines = [routeLine, lifeCheckLine, ...relationshipLines, ...systemLines, personalLine].filter(Boolean);

   if (lines.length === 0) return "";
   return `\n\n--- PERSONAL AFTERWORD ---\n\n${lines.join("\n\n")}`;
}

function getRouteReportLine(state) {
   const routes = state.routeCommitments || {};
   const strongest = Object.entries(routes).sort((a, b) => (b[1] || 0) - (a[1] || 0))[0];
   if (!strongest || strongest[1] <= 0) return "";

   const labels = {
      academic: "Academic Portfolio",
      career: "Internship Dossier",
      local: "Neighborhood Map",
      intl: "Support Circle Guide",
      city: "Shanghai Prototype",
      survival: "Budget Ledger"
   };
   const label = labels[strongest[0]] || strongest[0];
   return `Route report: this run leaned hardest into the ${label}. The ending is not only a title; it is the shape made by weeks of repeated choices, missed chances, and the systems you kept feeding.`;
}

function getLifeCheckReportLine(state) {
   const checks = state.lifeChecks?.history || [];
   if (checks.length === 0) return "";

   const passed = checks.filter(check => check.success).length;
   const strained = checks.length - passed;
   const hardest = checks
      .slice()
      .sort((a, b) => (a.margin || 0) - (b.margin || 0))[0];
   const prepTitles = Array.from(new Set(checks.flatMap(check => (check.prepCards || []).map(card => card.title)))).slice(0, 3);
   const prepText = prepTitles.length > 0 ? ` The quiet heroes were ${prepTitles.join(", ")}.` : "";
   const hardestText = hardest ? ` The hardest check was ${hardest.label}, where the margin was ${hardest.margin}.` : "";
   return `Life check report: ${passed}/${checks.length} key checks held, with ${strained} strained moments that still marked the year.${hardestText}${prepText}`;
}

function getStrongestRelationship(relationships) {
   return getTopRelationships(relationships, 1)[0] || null;
}

function getTopRelationships(relationships, limit = 3) {
   const candidates = Object.entries(relationships)
      .filter(([, rel]) => (rel.friendship || 0) > 0 || (rel.romance || 0) > 0)
      .map(([name, rel]) => ({
         name,
         rel,
         score: (rel.friendship || 0) + (rel.romance || 0) * 1.25
      }))
      .sort((a, b) => b.score - a.score);

   return candidates.slice(0, limit);
}

function getRelationshipAfterword(name, rel, flags) {
   if (!name || !rel) return "";

   const friendship = rel.friendship || 0;
   const romance = rel.romance || 0;

   if (name === "Professor Lin") {
      if (flags.lin_recommendation_ready) {
         return "Professor Lin's recommendation arrives in an envelope with the university seal, but the real prize is the sentence he writes by hand at the bottom: 'This student learned how to think under pressure.' You keep a photo of it on your phone long after the paper is filed away.";
      }
      if (flags.lin_feedback_repaired) {
         return "You still remember Professor Lin's harshest comments because they became the hinge of the year. Every serious draft after that carries his invisible red pen, and somehow that starts to feel like armor.";
      }
      return "Professor Lin remains one of the voices you hear when a first draft feels convincing too early, which is annoying, useful, and probably the closest thing academia has to a haunting.";
   }

   if (name === "Dr. Mei") {
      if (flags.dr_mei_project_commitment) {
         return "Dr. Mei adds your name to the project workspace, then to the forum poster, then to a draft that suddenly feels far too real. The project does not make you famous, but it gives you something better: a question sharp enough to follow into the next chapter.";
      }
      if (flags.dr_mei_ethics_reframed) {
         return "Dr. Mei's question about responsibility follows you like a second passport. It changes how you write about people, places, and every too-clean explanation you once trusted.";
      }
      return "Dr. Mei leaves you with the sense that good questions are rarely comfortable at first, and the dangerous suspicion that comfort was never the point.";
   }

   if (name === "Sophie") {
      if (romance >= 20) {
         return "Sophie remains complicated in the way real closeness often is: half timing, half courage, half unread messages at 1:17 a.m. The math does not work, but neither did most of the year, and somehow that is why it matters.";
      }
      if (flags.sophie_orientation_committee) {
         return "Sophie sends you a screenshot from the next orientation: your guide is on the projector, your jokes are still in the margins, and a room full of new students is laughing before they panic. Somewhere along the way, arrival notes became infrastructure.";
      }
      if (flags.sophie_bridge_plan) {
         return "Sophie keeps teasing you about the bridge activity, then posts the next signup link before you can protest. The international circle does not vanish; it grows doors.";
      }
      return "Sophie stays pinned near the top of WeChat, proof that sometimes the first person who admits they are lost becomes the map everyone else follows.";
   }

   if (name === "Lin Yue") {
      if (flags.lin_yue_soft_romance || romance >= 16) {
         return "Lin Yue never turns the riverside confession into a grand promise. That is what makes it feel real: two warm drinks, a slower pace, and someone who knows you well enough to ask for clarity instead of drama.";
      }
      if (flags.lin_yue_friendship_anchor) {
         return "Lin Yue remains one of the rare people who made local life feel neither exotic nor effortless. She taught you that friendship can be a boundary kept well, not a boundary erased.";
      }
      if (flags.lin_yue_boundary_repaired) {
         return "The repair with Lin Yue changes how you ask for help after Minghai. You stop treating local knowledge like a bridge people owe you, and start noticing the person standing on it.";
      }
      if (flags.lin_yue_presentation_partner) {
         return "Lin Yue's presentation lesson follows you into every mixed-language room after that: speak before the sentence is perfect, but never make someone else carry the whole room for you.";
      }
      return "Lin Yue becomes the classmate whose honesty made Minghai less abstract: not a tour guide, not a translator, but a person who expected you to become clearer.";
   }

   if (name === "Neighbor Li") {
      if (flags.neighbor_li_festival_invite) {

// Central Switchboard
function MiniGameOverlay({ gameId, onComplete }) {

  const handleGameEnd = (outcome) => {
    setResult(outcome);
    setTimeout(() => {
        onComplete(outcome);
    }, 1500); // 1.5s delay to show win/lose screen

  const renderGame = () => {
    switch(gameId) {

        case 'subway': return <SubwaySqueezeGame onComplete={handleGameEnd} />;
        case 'delivery': return <DeliveryTyperGame onComplete={handleGameEnd} />;
        case 'tones': return <TonalRhythmGame onComplete={handleGameEnd} />;
        case 'visa': return <VisaBureaucracyGame onComplete={handleGameEnd} />;
        case 'bike': return <BikeScrambleGame onComplete={handleGameEnd} />;
        case 'banquet': return <BanquetBalanceGame onComplete={handleGameEnd} />;
        case 'hongbao': return <HongbaoSnatchGame onComplete={handleGameEnd} />;
        case 'model': return <PhotoShootGame onComplete={handleGameEnd} />;
        default: return <div className="text-white">Unknown Game ID: {gameId}</div>;
    }
  };

  return (
    <div className="flex-1 flex flex-col justify-center items-center p-8 z-[60] w-full max-w-4xl mx-auto absolute inset-0 backdrop-blur-md bg-black/60">
        <div className="bg-slate-900 border-2 border-indigo-500 rounded-3xl p-6 w-full shadow-[0_0_50px_rgba(99,102,241,0.4)] relative overflow-hidden">
            {result ? (
                <div className="absolute inset-0 z-50 bg-slate-900/90 flex flex-col items-center justify-center animate-in zoom-in duration-300">
                    <h2 className={`text-5xl font-black mb-4 ${result.win ? 'text-emerald-400 drop-shadow-[0_0_15px_rgba(52,211,153,0.8)]' : 'text-red-500 drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]'}`}>

// 1. Bargain Market Game
function BargainMarketGame({ onComplete }) {
    const [bossOffer, setBossOffer] = useState(800);
    const [anger, setAnger] = useState(0);
    const [turn, setTurn] = useState(1);
    
    const handleCounter = () => {
        const newOffer = Math.floor(bossOffer * 0.75); // Reduce price by 25%
        const angerInc = Math.floor(Math.random() * 20) + 15; // Random anger 15-35
        setBossOffer(newOffer);
        setAnger(a => a + angerInc);
        setTurn(t => t + 1);
    };

    const handleCompliment = () => {
        setAnger(a => Math.max(0, a - 30));
        setBossOffer(Math.floor(bossOffer * 1.05)); // Boss feels confident, price goes up slightly
        setTurn(t => t + 1);
    };

    const handleWalkAway = () => {
        if (anger < 50 && turn > 2) {
            // Boss caves
            onComplete({ win: true, cost: Math.floor(bossOffer * 0.5), message: '"Wait! Come back! Special price for you."' });
        } else {
            onComplete({ win: false, cost: bossOffer, message: '"Leave then! I don\'t need your business!" Boss refuses to sell.' });
        }
    };

    const handleAccept = () => {
        onComplete({ win: true, cost: bossOffer, message: `You bought it for ¥${bossOffer}.`});
    }

    useEffect(() => {
        if (anger >= 100) {
            onComplete({ win: false, cost: bossOffer, message: '"Get out of my shop!" Boss kicked you out.' });
        }
    }, [anger]);

    return (
        <div className="text-center p-4">
            <h3 className="text-2xl font-bold text-amber-400 mb-2">Fake Market Haggling</h3>
            <p className="text-sm text-slate-400 mb-6">Convince the boss to lower the price, but don't make him too angry!</p>
            
            <div className="bg-slate-800 rounded-xl p-8 mb-6 border border-slate-700">
                <div className="text-6xl font-black text-emerald-400 mb-2">¥{bossOffer}</div>
                <div className="text-slate-500 font-mono text-sm">Boss's Current Offer</div>
            </div>

            <div className="mb-6">
                <div className="flex justify-between text-xs text-slate-400 font-bold mb-1">
                    <span>Boss Anger Meter</span>
                    <span className={anger > 80 ? "text-red-400" : ""}>{anger}%</span>
                </div>
                <div className="w-full bg-slate-800 rounded-full h-3">
                    <div className={`h-full rounded-full transition-all duration-300 ${anger > 80 ? 'bg-red-500' : 'bg-orange-500'}`} style={{width: `${Math.min(100, anger)}%`}}></div>
                </div>
            </div>

            <div className="grid grid-cols-2 gap-4">
                <button onClick={handleCounter} className="bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 rounded-lg border border-rose-400 transition-colors">
                   Counter-Offer (-25%)
                </button>
                <button onClick={handleCompliment} className="bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-lg border border-sky-400 transition-colors">
                   Compliment Boss (Reduce Anger)
                </button>
                <button onClick={handleWalkAway} className="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg transition-colors">
                   Fake Walk Away
                </button>
                <button onClick={handleAccept} className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg border border-emerald-400 transition-colors">
                   Accept Price
                </button>
            </div>
        </div>
    );
}

// 2. Subway Squeeze Game
function SubwaySqueezeGame({ onComplete }) {
    const [progress, setProgress] = useState(0);
    const [direction, setDirection] = useState(1);
    const [squeezes, setSqueezes] = useState(0);

    useEffect(() => {
        const interval = setInterval(() => {
            setProgress(prev => {
                let next = prev + (direction * 4);
                if (next > 100) { next = 100; setDirection(-1); }
                if (next < 0) { next = 0; setDirection(1); }
                return next;
            });
        }, 16);
        return () => clearInterval(interval);
    }, [direction]);

    const handleSqueeze = () => {
        // Target area is 40% to 60%
        if (progress >= 35 && progress <= 65) {
            setSqueezes(s => s + 1);
            if (squeezes + 1 >= 3) {
                onComplete({ win: true, message: "You made it onto the train!" });
            }
            // Increase speed/difficulty
            setProgress(0); 
        } else {
            onComplete({ win: false, message: "The doors closed on you!" });
        }
    };

    return (
        <div className="text-center p-4 h-64 flex flex-col justify-center items-center">
            <h3 className="text-2xl font-bold text-sky-400 mb-2">Rush Hour Squeeze</h3>
            <p className="text-sm text-slate-400 mb-8">Hit 'PUSH' when the marker is in the green zone! (3 times needed)</p>

            <div className="w-full max-w-md h-8 bg-slate-800 rounded-full relative mb-8 overflow-hidden border border-slate-600 shadow-inner">
                {/* Target Zone */}
                <div className="absolute top-0 bottom-0 left-[35%] w-[30%] bg-emerald-500/30 border-x-2 border-emerald-400"></div>
                {/* Marker */}
                <div className="absolute top-0 bottom-0 w-4 bg-white rounded-full shadow-[0_0_10px_white]" style={{ left: `calc(${progress}% - 8px)` }}></div>
            </div>

            <div className="flex justify-between items-center w-full max-w-md mb-4 text-slate-300 font-mono font-bold">
                <span>Attempt: {squeezes}/3</span>
            </div>

            <button onClick={handleSqueeze} className="w-48 h-16 bg-amber-500 hover:bg-amber-400 text-slate-900 text-2xl font-black rounded-2xl shadow-lg hover:scale-105 active:scale-95 transition-all">
                PUSH!
            </button>
        </div>
    );
}

// 3. Delivery Typer Game
function DeliveryTyperGame({ onComplete }) {
    const vocab = [
        { ch: "外卖 (Wàimài)", en: "Takeout" },
        { ch: "到了 (Dàole)", en: "Arrived" },
        { ch: "南门 (Nánmén)", en: "South Gate" },
        { ch: "放门口 (Fàng ménkǒu)", en: "Leave at door" },
        { ch: "快点 (Kuàidiǎn)", en: "Hurry up" },
        { ch: "没筷子 (Méi kuàizi)", en: "No chopsticks" }
    ];
    
    const [currentWord, setCurrentWord] = useState(vocab[0]);
    const [options, setOptions] = useState([]);
    const [score, setScore] = useState(0);
    const [timeLeft, setTimeLeft] = useState(15);

    useEffect(() => {
        nextWord();
        const timer = setInterval(() => {
            setTimeLeft(t => {
                if (t <= 1) {
                    clearInterval(timer);
                    onComplete({ win: false, message: "The delivery guy left with your food!" });
                    return 0;
                }
                return t - 1;
            });
        }, 1000);
        return () => clearInterval(timer);
    }, []);

    useEffect(() => {
        if (score >= 5) {
            onComplete({ win: true, message: "You successfully communicated your location!" });
        }
    }, [score]);

    const nextWord = () => {
        const word = vocab[Math.floor(Math.random() * vocab.length)];
        setCurrentWord(word);
        
        // Pick 3 random english words + the correct one
        let newOptions = [word.en];
        while (newOptions.length < 4) {
            const random = vocab[Math.floor(Math.random() * vocab.length)].en;
            if (!newOptions.includes(random)) newOptions.push(random);
        }
        setOptions(newOptions.sort(() => Math.random() - 0.5));
    };

    const handlePick = (en) => {
        if (en === currentWord.en) {
            setScore(s => s + 1);
            nextWord();
        } else {
            setTimeLeft(t => Math.max(0, t - 3)); // 3 second penalty
        }
    };

    return (
        <div className="text-center p-4 h-80 flex flex-col justify-center items-center relative">
            <div className="absolute top-4 right-4 text-xl font-mono text-amber-400">⏱️ {timeLeft}s</div>
            <div className="absolute top-4 left-4 text-xl font-mono text-emerald-400">✅ {score}/5</div>
            
            <h3 className="text-2xl font-bold text-blue-400 mb-8">Delivery Call Panic!</h3>
            
            <div className="text-5xl font-black text-rose-500 mb-10 bg-slate-800 px-6 py-4 rounded-xl shadow-inner border border-slate-700">
                {currentWord?.ch}
            </div>

            <div className="grid grid-cols-2 gap-4 w-full max-w-md">
                {options.map((opt, i) => (
                    <button key={i} onClick={() => handlePick(opt)} className="bg-slate-700 hover:bg-sky-600 text-white text-lg font-bold py-4 rounded-xl transition-colors">
                        {opt}
                    </button>
                ))}
            </div>
        </div>
    );
}

// 4. Tonal Rhythm Game
function TonalRhythmGame({ onComplete }) {
    const [notes, setNotes] = useState([]);
    const [score, setScore] = useState(0);
    const targetY = 250; // The hit line

    useEffect(() => {
        let spawnInterval = setInterval(() => {
            setNotes(prev => [...prev, { id: Date.now(), y: 0, tone: Math.floor(Math.random() * 4) + 1 }]);
        }, 1000);

        let moveInterval = setInterval(() => {
            setNotes(prev => {
                let activeNotes = prev.map(n => ({...n, y: n.y + 4}));
                // Check if missed
                if (activeNotes.some(n => n.y > targetY + 30)) {
                    // Missed one
                    setScore(s => s - 2);
                }
                return activeNotes.filter(n => n.y <= targetY + 30);
            });
        }, 30);

        return () => { clearInterval(spawnInterval); clearInterval(moveInterval); }
    }, []);

    useEffect(() => {
        if (score >= 10) onComplete({ win: true, message: "Perfect Pronunciation!" });
        if (score <= -6) onComplete({ win: false, message: "The teacher frowned in confusion." });
    }, [score]);

    const handleHit = (tone) => {
        setNotes(prev => {
            // Find note in target zone
            const hitIndex = prev.findIndex(n => Math.abs(n.y - targetY) < 30 && n.tone === tone);
            if (hitIndex !== -1) {
                setScore(s => s + 2);
                return prev.filter((_, i) => i !== hitIndex);
            } else {
                setScore(s => s - 1); // Wrong key or mistiming
                return prev;
            }
        });
    };

    return (
        <div className="p-4 h-96 relative flex flex-col pt-8">
            <div className="absolute top-4 right-4 text-xl font-mono text-emerald-400">Score: {score}/10</div>
            <h3 className="text-2xl font-bold text-indigo-400 text-center mb-4">Tone Matching</h3>
            
            <div className="flex-1 border bg-slate-900 border-slate-700 relative overflow-hidden rounded-t-xl mx-8 shadow-inner">
                {/* Hit Line */}
                <div className="absolute w-full h-1 bg-amber-500/80 shadow-[0_0_10px_orange]" style={{top: targetY}}></div>
                
                {/* Notes */}
                {notes.map(note => (
                    <div key={note.id} className="absolute text-center font-black rounded-full" 
                         style={{top: note.y, left: `${(note.tone - 1) * 25}%`, width: '25%'}}>
                        <div className="inline-flex justify-center items-center w-10 h-10 bg-slate-100 text-indigo-600 rounded-lg shadow-lg border-b-4 border-slate-400">
                           {note.tone === 1 && "—"}
                           {note.tone === 2 && "／"}
                           {note.tone === 3 && "V"}
                           {note.tone === 4 && "＼"}
                        </div>
                    </div>
                ))}
            </div>
            
            <div className="flex h-20 mx-8 gap-2 mt-2">
                {[1, 2, 3, 4].map(t => (
                    <button key={t} onClick={() => handleHit(t)} className="flex-1 bg-slate-800 hover:bg-indigo-600 text-white font-bold rounded-b-xl border-t border-slate-600 active:bg-indigo-400 transition-colors">
                        Tone {t}
                    </button>
                ))}
            </div>
            <p className="text-center text-slate-500 text-xs mt-2">Click the buttons when the tones hit the orange line.</p>
        </div>
    );
}

// 5. Visa Bureaucracy Game
function VisaBureaucracyGame({ onComplete }) {
    const docs = [
        "Passport", "JW202 Form", "Admission Letter", "Physical Exam", 
        "Movie Ticket", "Library Card", "Expired Visa", "Restaurant Receipt"
    ].sort(() => Math.random() - 0.5);

    const targetDocs = ["Passport", "JW202 Form", "Admission Letter", "Physical Exam"];
    const [selected, setSelected] = useState([]);
    const [timeLeft, setTimeLeft] = useState(15);

    useEffect(() => {
        const timer = setInterval(() => {
            setTimeLeft(t => {
                if (t <= 1) {
                    clearInterval(timer);
                    onComplete({ win: false, message: "The bureau closed for lunch. Come back tomorrow." });
                    return 0;
                }
                return t - 1;
            });
        }, 1000);
        return () => clearInterval(timer);
    }, []);

    const toggleDoc = (doc) => {
        if (selected.includes(doc)) setSelected(selected.filter(d => d !== doc));
        else setSelected([...selected, doc]);
    };

    const handleSubmit = () => {
        // Check if selected matches target exact
        const isCorrect = selected.length === targetDocs.length && targetDocs.every(d => selected.includes(d));
        if (isCorrect) {
            onComplete({ win: true, message: "Perfect documents! Visas approved." });

function BikeScrambleGame({ onComplete }) {
    const emojis = ["🚲", "🚕", "🛵", "🏍️", "🛴", "🛒"];

    const [timeLeft, setTimeLeft] = useState(10);

                    clearInterval(timer);
                    onComplete({ win: false, message: "You couldn't find a bike and was late!" });
