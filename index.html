/* --- engine/GameState.js --- */
// Pure vanilla JS State Manager. No dependencies. Portable everywhere.

const INITIAL_STATS = {
  academics: 10,
  chinese: 10,
  wealth: 5000, // RMB
  sanity: 100, // Max 100
  digitalProficiency: 5,
  culture: 0, // Cultural Integration
};

const INITIAL_STATE = {
  currentNodeId: "start",
  turn: 1, // 1 turn = 1 week
  phase: "Application", // "Application", "Pre-Departure", "In-China"
  stats: { ...INITIAL_STATS },
  guanxi: {
    admin: 0,
    localStudents: 0,
    intlStudents: 0,
    professors: 0
  },
  inventory: [],
  flags: {}, // For story tracking, e.g. { "got_vpn": true }
};

class EngineState {
  constructor() {
    this.state = JSON.parse(JSON.stringify(INITIAL_STATE));
    this.listeners = [];
  }

  // Subscribe to state changes (React will use this)
  subscribe(listener) {
    this.listeners.push(listener);
    return () => {
      this.listeners = this.listeners.filter(l => l !== listener);
    };
  }

  // Notify listeners
  notify() {
    for (const listener of this.listeners) {
      listener(this.state);
    }
  }

  // Get current state
  getState() {
    return this.state;
  }

  // Advance time by 1 week
  advanceTurn() {
    this.state.turn += 1;
    
    // Apply weekly decay
    this.state.stats.sanity -= 2;
    this.state.stats.wealth -= 200; // Weekly cost of living
    
    if (this.state.stats.sanity < 0) this.state.stats.sanity = 0;
    if (this.state.stats.wealth < 0) this.state.stats.wealth = 0;
    
    // Auto-advance phase
    if (this.state.turn >= 8 && this.state.phase === "Application") {
      this.state.phase = "Pre-Departure";
    } else if (this.state.turn >= 16 && this.state.phase === "Pre-Departure") {
      this.state.phase = "In-China";
    }
    
    this.notify();
  }

  // Update multiple stats
  updateStats(statChanges) {
    for (const [key, value] of Object.entries(statChanges)) {
      if (this.state.stats[key] !== undefined) {
        this.state.stats[key] += value;
        // Hard bounds
        if (this.state.stats[key] < 0) this.state.stats[key] = 0;
        if (key === 'sanity' && this.state.stats[key] > 100) this.state.stats[key] = 100;
        if (key === 'digitalProficiency' && this.state.stats[key] > 100) this.state.stats[key] = 100;
      }
    }
    this.notify();
  }

  // Update specific Guanxi faction
  updateGuanxi(faction, amount) {
    if (this.state.guanxi[faction] !== undefined) {
      this.state.guanxi[faction] += amount;
      this.notify();
    }
  }

  // Set a story flag
  setFlag(flagName, value = true) {
    this.state.flags[flagName] = value;
    this.notify();
  }

  setCurrentNode(nodeId) {
    this.state.currentNodeId = nodeId;
    this.notify();
  }

  // Reset Game
  reset() {
    this.state = JSON.parse(JSON.stringify(INITIAL_STATE));
    this.notify();
  }

  // Persistence
  save() {
    try {
      localStorage.setItem('sim_panda_save', JSON.stringify(this.state));
    } catch(e) { console.error("Save failed", e); }
  }

  load() {
    try {
      const data = localStorage.getItem('sim_panda_save');
      if (data) {
        const parsed = JSON.parse(data);
        this.state = { ...this.state, ...parsed }; // Merge to preserve structure
        this.notify();
        return true;
      }
    } catch(e) { console.error("Load failed", e); }
    return false;
  }
}

// Export a singleton instance for simplicity, though React Context can inject it too.
const gameEngine = new EngineState();

/* --- engine/EventSystem.js --- */
// Evaluates conditions and triggers story nodes

class EventSystem {
  constructor(engine) {
    this.engine = engine; // Reference to GameState
    this.events = {}; // Map of all event configurations
  }

  // Load event dictionary into the generic pool
  loadEvents(newEvents) {
    this.events = { ...this.events, ...newEvents };
  }

  // Advance time by 1 week
  advanceTurn() {
    this.state.turn += 1;
    
    // Apply weekly decay
    this.state.stats.sanity -= 2;
    this.state.stats.wealth -= 200; // Weekly cost of living
    
    if (this.state.stats.sanity < 0) this.state.stats.sanity = 0;
    if (this.state.stats.wealth < 0) this.state.stats.wealth = 0;
    
    // Auto-advance phase
    if (this.state.turn > 8 && this.state.phase === "Application") {
      this.state.phase = "Pre-Departure";
    } else if (this.state.turn > 16 && this.state.phase === "Pre-Departure") {
      this.state.phase = "In-China";
    }
    
    this.notify();
  }

  // Check if a node's condition passing
  checkCondition(conditionObj) {
    if (!conditionObj) return true; // No condition = always pass
    const state = this.engine.getState();

    // Check stats (e.g., { stats: { academics: { min: 20 } } })
    if (conditionObj.stats) {
      for (const [stat, req] of Object.entries(conditionObj.stats)) {
        const val = state.stats[stat] || 0;
        if (req.min !== undefined && val < req.min) return false;
        if (req.max !== undefined && val > req.max) return false;
      }
    }
    
    // Check flags
    if (conditionObj.flags) {
      for (const [flag, value] of Object.entries(conditionObj.flags)) {
        if (!!state.flags[flag] !== value) return false;
      }
    }
    
    // Check guanxi
    if (conditionObj.guanxi) {
      for (const [faction, req] of Object.entries(conditionObj.guanxi)) {
        const val = state.guanxi[faction] || 0;
        if (req.min !== undefined && val < req.min) return false;
        if (req.max !== undefined && val > req.max) return false;
      }
    }

    return true;
  }

  // Get available choices for a given node
  getAvailableChoices(nodeId) {
    const node = this.events[nodeId];
    if (!node || !node.choices) return [];
    
    return node.choices.filter(choice => this.checkCondition(choice.condition));
  }

  // Execute a choice's consequences
  executeChoice(choice) {
    // 1. Apply stat changes
    if (choice.effects && choice.effects.stats) {
      this.engine.updateStats(choice.effects.stats);
    }
    
    // 2. Apply guanxi changes
    if (choice.effects && choice.effects.guanxi) {
      for (const [faction, amount] of Object.entries(choice.effects.guanxi)) {
         this.engine.updateGuanxi(faction, amount);
      }
    }
    
    // 3. Set flags
    if (choice.effects && choice.effects.flags) {
       for (const [flag, value] of Object.entries(choice.effects.flags)) {
         this.engine.setFlag(flag, value);
       }
    }

    // Intercept: If returning to hub, roll for random events
    let nextNode = choice.next;
    if (nextNode === "hub") {
      const roll = Math.random();
      if (roll < 0.05) {
         nextNode = "random_sick";
      } else if (roll < 0.1) {
         nextNode = "random_exam";
      } else if (roll < 0.15) {
         nextNode = "random_subway";
      } else if (roll < 0.2) {
         nextNode = "random_lecture";
      } else if (roll < 0.25) {
         nextNode = "random_club_fair";
      }
    }

    // Return the next Node ID
    return nextNode;
  }
}

/* --- components/StoryPanel.jsx --- */




function StoryPanel({ node, availableChoices, onChoice }) {
  const [showChoices, setShowChoices] = useState(false);
  const [textKey, setTextKey] = useState(0);
  const [displayText, setDisplayText] = useState("");

  useEffect(() => {
    // Reset animations when node changes
    setShowChoices(false);
    setTextKey(prev => prev + 1);
    setDisplayText("");
    
    if (!node) return;
    
    // Typewriter effect
    let currentText = "";
    const fullText = node.text || "";
    let i = 0;
    
    const interval = setInterval(() => {
      currentText += fullText.charAt(i);
      setDisplayText(currentText);
      i++;
      if (i >= fullText.length) {
        clearInterval(interval);
        setShowChoices(true);
      }
    }, 20); // 20ms per character
    
    return () => clearInterval(interval);
  }, [node]);

  useEffect(() => {
    const handleKeyDown = (e) => {
        if (!showChoices) {
           // Skip typewriter if user presses space or enter
           if (e.key === " " || e.key === "Enter") {
             setDisplayText(node?.text || "");
             setShowChoices(true);
           }
           return;
        }
        
        // Number keys for choices
        const num = parseInt(e.key);
        if (!isNaN(num) && num > 0 && availableChoices && num <= availableChoices.length) {
            onChoice(availableChoices[num - 1]);
        }
    };
    window.addEventListener("keydown", handleKeyDown);
    return () => window.removeEventListener("keydown", handleKeyDown);
  }, [showChoices, availableChoices, node, onChoice]);

  if (!node) return null;

  return (
    <div className="flex-1 flex flex-col justify-end p-8 pb-32 z-10 w-full max-w-4xl mx-auto">
       
      {/* Choice Menu */}
      <div className={`flex flex-col mb-8 gap-3 items-end transition-all duration-700 ${showChoices ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 pointer-events-none'}`}>
        {availableChoices && availableChoices.length > 0 && availableChoices.map((choice, i) => (
          <button
            key={i}
            onClick={() => onChoice(choice)}
            className="bg-slate-900/90 border border-slate-700/50 hover:bg-slate-800 hover:border-amber-500 hover:text-amber-400 text-slate-200 px-6 py-4 rounded-xl text-left w-3/4 shadow-xl backdrop-blur-md transition-all group flex flex-col relative"
          >
            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 font-mono text-sm opacity-50 group-hover:opacity-100 group-hover:text-amber-500 transition-all">[{i+1}]</div>
            <div className="font-semibold text-lg pl-6">{choice.text}</div>
            {choice.effects && <ChoicePreview effects={choice.effects} />}
          </button>
        ))}
      </div>

      {/* Dialogue Box */}
      <div 
         key={textKey}
         className="bg-slate-900/95 border border-slate-700 backdrop-blur-xl p-8 rounded-2xl shadow-2xl relative animate-in fade-in slide-in-from-bottom-4 duration-500 w-full"
      >
        <div className="absolute -top-4 left-6 flex gap-3">
          <div className="bg-amber-500 text-slate-900 font-bold px-4 py-1 rounded shadow-md uppercase tracking-wider text-sm">
            {node.speaker || "Narrator"}
          </div>
          {node.location && (
            <div className="bg-slate-700 text-amber-400 border border-amber-500/30 font-bold px-4 py-1 rounded shadow-md uppercase tracking-wider text-sm flex items-center gap-2">
              📍 {node.location}
            </div>
          )}
        </div>
        <p className="text-xl text-slate-100 leading-relaxed font-serif mt-2 min-h-[4rem]">
          {displayText}
          {!showChoices && <span className="inline-block w-2 bg-amber-500 opacity-50 animate-pulse ml-1">&nbsp;</span>}
        </p>
      </div>
    </div>
  );
}

function ChoicePreview({ effects }) {
   if (!effects) return null;
   
   const previews = [];
   const statNames = {
       digitalProficiency: "Digital Prod.",
       academics: "Academics",
       chinese: "Chinese",
       sanity: "Sanity",
       culture: "Culture",
       wealth: "Wealth"
   };

   if (effects.stats) {
       Object.entries(effects.stats).forEach(([k, v]) => {
          const color = v > 0 ? "text-emerald-400" : "text-red-400";
          const sign = v > 0 ? "+" : "";
          const name = statNames[k] || (k.charAt(0).toUpperCase() + k.slice(1));
          previews.push(<span key={k} className={`${color} font-mono text-xs uppercase tracking-wider`}>{name} {sign}{v}</span>);
       });
   }
   const guanxiNames = {
       admin: "Admin",
       professors: "Professors",
       localStudents: "Locals",
       intlStudents: "Intl"
   };

   if (effects.guanxi) {
       Object.entries(effects.guanxi).forEach(([k, v]) => {
          previews.push(<span key={`guanxi_${k}`} className={`text-amber-400 font-mono text-xs uppercase tracking-wider`}>Guanxi({guanxiNames[k] || k}) +{v}</span>);
       });
   }
   if (effects.flags) {
       Object.entries(effects.flags).forEach(([k, v]) => {
          previews.push(<span key={`flag_${k}`} className={`text-blue-400 font-mono text-xs uppercase tracking-wider`}>Flag: {k}</span>);
       });
   }

   if (previews.length === 0) return null;

   return (
       <div className="flex flex-wrap gap-4 mt-2 opacity-60 group-hover:opacity-100 transition-opacity">
           {previews}
       </div>
   )
}

function SimulatorPage() {
  const [gameState, setGameState] = useState(gameEngine.getState());
  const [isMenuOpen, setIsMenuOpen] = useState(false);
  const [isTabletOpen, setIsTabletOpen] = useState(false);
  // Combine all event nodes
  const allEvents = { ...epoch1Events, ...epoch2Events, ...epoch3Events, ...gameNodes };

  const [events] = useState(() => {
    const e = new EventSystem(gameEngine);
    e.loadEvents(allEvents);
    return e;
  });

  useEffect(() => {
    // Hide header/footer for immersive mode
    const nav = document.querySelector('nav');
    const footer = document.querySelector('footer');
    if (nav) nav.style.display = 'none';
    if (footer) footer.style.display = 'none';

    // Subscribe to engine
    const unsubscribe = gameEngine.subscribe((newState) => {
      setGameState({ ...newState });
    });

    return () => {
      if (nav) nav.style.display = '';
      if (footer) footer.style.display = '';
      unsubscribe();
    };
  }, [events]);

  const handleChoice = (choice) => {
    let nextNode = events.executeChoice(choice);
    
    if (choice.action === "reset_game") {
        gameEngine.reset();
    }
    
    // Explicit action trigger
    if (choice.action === "advance_turn") {
        gameEngine.advanceTurn();
    }
    
    // Enforce Game Over and Epoch transitions
    const state = gameEngine.getState();
    if (state.stats.sanity <= 0) nextNode = "game_over_sanity";
    else if (state.stats.wealth <= 0) nextNode = "game_over_wealth";
    else if (state.turn === 8 && choice.action === "advance_turn") nextNode = "pre_departure_start";
    else if (state.turn === 16 && choice.action === "advance_turn") nextNode = "in_china_start";
    else if (state.turn === 24 && choice.action === "advance_turn") nextNode = "epoch3_midterm";
    else if (state.turn === 28 && choice.action === "advance_turn") nextNode = "epoch3_internship";
    else if (state.turn === 32 && choice.action === "advance_turn") nextNode = "epoch3_final";
    
    // Slight delay for effect
    setTimeout(() => {
        gameEngine.setCurrentNode(nextNode);
    }, 150);
  };

  const handleSave = () => {
    gameEngine.save();
    setIsMenuOpen(false);
    alert("Game saved!");
  };

  const handleLoad = () => {
    if (gameEngine.load()) {

    }

      setIsMenuOpen(false);
    }

    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(err => {
        console.error("Error attempting to enable fullscreen:", err);
      });
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
    }
    setIsMenuOpen(false);
  };

  const currentNodeId = gameState.currentNodeId || "start";
  const currentNode = allEvents[currentNodeId];

  return (
    <div className="flex h-[100dvh] w-full bg-slate-900 text-slate-100 overflow-hidden font-sans">
      {/* Main area: Visual Novel */}
      <div 
         className="w-full flex flex-col relative bg-cover bg-center transition-all duration-1000 ease-in-out" 
         style={{ backgroundImage: `url("${currentNode?.bgImage || './images/simulator/hub_bg.png'}")` }}
      >
        <div className="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

        {/* Top Info Bar */}
        <div className="absolute top-0 left-0 w-full h-14 bg-gradient-to-b from-black/80 to-transparent z-40 flex items-center px-6 justify-between text-slate-200">
            <div className="flex gap-8 font-mono font-semibold ml-2 text-sm">
                <div className="text-amber-400 text-lg">Week {gameState.turn} <span className="text-slate-400 font-normal ml-2 text-sm">[{gameState.phase}]</span></div>
                <div className="flex items-center gap-3">
                   <span>😌 {gameState.stats.sanity}/100</span>
                   <div className={`w-32 h-2.5 rounded-full ${gameState.stats.sanity < 30 ? "bg-red-900" : "bg-slate-700"} overflow-hidden shadow-inner`}>
                      <div className={`h-full transition-all duration-500 ease-out ${gameState.stats.sanity < 30 ? "bg-red-500" : "bg-teal-400"}`} style={{ width: `${gameState.stats.sanity}%` }}></div>

          <div className="flex gap-4 items-center">
            <button 
              onClick={() => setIsTabletOpen(true)}
              className="bg-sky-600/80 hover:bg-sky-500 text-white border border-sky-400 px-4 py-2 rounded shadow-[0_0_15px_rgba(14,165,233,0.5)] font-semibold font-mono flex items-center gap-2 backdrop-blur-md transition-all"
            >
              📱 SimPad
            </button>
            <div className="relative">
              <button 
                onClick={() => setIsMenuOpen(!isMenuOpen)}
                className="bg-slate-800/80 hover:bg-slate-700 text-slate-200 border border-slate-600 px-4 py-2 rounded shadow-md font-semibold font-mono flex items-center gap-2 backdrop-blur-md transition-colors"
              >
                <span>⚙️</span> Menu
              </button>
            
            {isMenuOpen && (
              <div className="absolute right-0 mt-2 w-48 bg-slate-800 border border-slate-600 rounded-md shadow-2xl py-1 transform origin-top-right transition-all">
                <button onClick={handleSave} className="block w-full text-left px-4 py-2 text-sm text-slate-200 hover:bg-slate-700 hover:text-emerald-400">
                  💾 Quick Save
                </button>
                <button onClick={handleLoad} className="block w-full text-left px-4 py-2 text-sm text-slate-200 hover:bg-slate-700 hover:text-amber-400">
                  📂 Quick Load
                </button>
                <button onClick={handleFullscreen} className="block w-full text-left px-4 py-2 text-sm text-slate-200 hover:bg-slate-700 hover:text-blue-400">
                  🔲 Toggle Fullscreen
                </button>
                <div className="border-t border-slate-700 my-1"></div>
                <button onClick={handleRestart} className="block w-full text-left px-4 py-2 text-sm text-red-400 hover:bg-red-500 hover:text-slate-900">
                  🔄 Restart Game
                </button>
              </div>
            )}
          </div>
          </div>
        </div>

        {isTabletOpen && <TabletInterface state={gameState} onClose={() => setIsTabletOpen(false)} />}

        <StoryPanel 
          node={currentNode} 
          onChoice={handleChoice} 
          availableChoices={events.getAvailableChoices(currentNodeId)}
        />
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SimulatorPage />);
  </script>
</body>
</html>
